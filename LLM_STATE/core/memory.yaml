entries:
- id: cross-crate-include-str-paths-break-crates-io-publication
  title: Cross-crate include_str! paths break crates.io publication
  body: |
    Paths like `../../../defaults/ontology.yaml` work for path/git deps but break crates.io publication, which requires all included files within the crate root. Any crate using cross-directory `include_str!` must be reworked before registry publication.
- id: lib-crate-public-items-do-not-trigger-dead-code-lint
  title: Lib crate public items do not trigger dead-code lint
  body: |
    When a crate is a library (not a binary), the Rust compiler does not fire the dead-code lint for `pub` items, because they are considered part of a public API. Binary-host crates required `#[allow(dead_code)]` on the same items; migrating to a lib crate removes that need.
- id: rename-detection-uses-greedy-bipartite-matching-on-content-sha
  title: Rename detection uses greedy bipartite matching on content-SHA
  body: |
    Rename detection uses greedy bipartite matching on content-SHA overlap. This avoids the quadratic cost of full-tree diffing and is accurate for the common case where a component moves directories but its files are unchanged.
- id: serde-untagged-enum-variants-need-unique-field-names
  title: Serde untagged enum variants need unique field names
  body: |
    Serde untagged enums require each variant's distinguishing field name to be unique across variants. Field name collisions between variants cause ambiguous deserialisation. This constraint is load-bearing for `PinValue` in atlas-index.
- id: componentkind-enum-deferred-to-atlas-engine
  title: ComponentKind enum lives in atlas-engine not atlas-index
  body: |
    `ComponentKind` is defined in `atlas-engine`, not `atlas-index`. `ComponentEntry::kind` in atlas-index remains `String` to avoid churning downstream consumers when the vocabulary expands. The enum is the authoritative classification vocabulary and currently has 13 variants enumerated in `defaults/component-kinds.yaml`.
- id: pinvalue-suppress-uses-alwaystrue-to-ban-suppress-false
  title: PinValue::Suppress uses AlwaysTrue to ban suppress:false
  body: |
    `PinValue::Suppress` carries an `AlwaysTrue` marker field so that `suppress: false` is a parse error rather than a silent no-op. Omitting `suppress: true` entirely is the intended representation of "no suppression".
- id: docs-overrides-migration-md-is-a-ghost-reference-until-v2-schema-ships
  title: docs/overrides-migration.md is a ghost path
  body: |
    `yaml_io.rs::require_schema_version(UserAuthored)` refers to `docs/overrides-migration.md` which does not yet exist. Write it when the overrides schema reaches v2. User-authored overrides get "migrate by hand, do NOT delete"; generated files get "delete and re-run `atlas index`".
- id: llmfingerprint-fields-are-driver-populated-via-with-fingerprint-inputs
  title: LlmFingerprint fields are driver-populated via with_fingerprint_inputs
  body: |
    `template_sha` and `ontology_sha` inside `LlmFingerprint` are set by the driver calling `.with_fingerprint_inputs()`, not by the backend constructor. This keeps `LlmBackend` implementors free of ontology plumbing.
- id: llm-response-json-schema-validation-is-hand-rolled-type-required-subset
  title: LLM response JSON Schema validation is hand-rolled type/required subset
  body: |
    Atlas's four LLM response schemas are hand-authored and small, so validation checks only `type` and `required` fields — a hand-rolled subset rather than a full JSON Schema crate dependency.
- id: tokencounter-charge-uses-cas-loop-on-atomicu64
  title: TokenCounter::charge uses CAS loop on AtomicU64
  body: |
    `TokenCounter::charge` uses a compare-and-swap loop on `AtomicU64` rather than a mutex. This avoids serialising parallel Salsa queries that call the backend concurrently.
- id: budgetedbackend-charges-tokens-after-inner-call-returns
  title: BudgetedBackend charges tokens after inner call returns
  body: |
    `BudgetedBackend` calls `TokenCounter::charge` after the wrapped backend returns, not before. Pre-call estimation would diverge from actual usage for providers that return real token counts in their response.
- id: template-sha-computed-via-prompt-render-plus-sha-256-in-atlas-engine
  title: template_sha computed via prompt::render plus SHA-256 in atlas-engine
  body: |
    The driver computes `template_sha` by calling `prompt::render` on each template with ontology-derived tokens and SHA-256ing the result. The helper lives in `atlas-engine`, not `atlas-llm`.
- id: salsa-0-26-input-setters-do-not-check-equality
  title: Salsa 0.26 input setters do not check equality
  body: |
    Salsa 0.26 input setters unconditionally bump the revision even when the new value equals the old. All `AtlasDatabase` setter wrappers must read the current value and return early if unchanged. Implementation: `crates/atlas-engine/src/db.rs` — `register_file` and `set_workspace_*`. Any new Workspace input field must have a skip-if-equal guard in its setter.
- id: salsa-input-debug-required-for-debug-on-input-structs
  title: salsa::input(debug) required for Debug on input structs
  body: |
    `#[salsa::input(debug)]` is required to derive `Debug` on generated Salsa input structs. Without the flag, the macro does not emit the `Debug` impl.
- id: arc-t-satisfies-salsa-update-bound-for-foreign-types
  title: Arc<T> satisfies Salsa Update bound for foreign types
  body: |
    Salsa has a blanket `Update` impl for `Arc<T>`. Wrapping foreign types (`ComponentsFile`, `ExternalsFile`, etc.) in `Arc<T>` avoids adding `salsa::Update` derives on non-Salsa crates.
- id: l2-queries-receive-file-handles-not-raw-paths
  title: L2+ queries receive File handles not raw paths
  body: |
    `file_content(path)` is an untracked helper; tracked dependency chains flow through `File::bytes(db)` once a tracked query holds the handle. L2+ code must receive `File` handles rather than calling `file_content` directly, or those accesses will not participate in Salsa's incremental dependency graph.
- id: ignore-crate-requires-git-root-for-gitignore-filtering
  title: ignore crate requires .git root for gitignore filtering
  body: |
    The `ignore` crate's gitignore filtering only activates inside `.git`-rooted directory trees. Standalone tempdir fixtures bypass it by design, which is the correct behaviour for test fixtures that should not be filtered.
- id: l3-classification-keys-by-workspace-dir-not-candidate
  title: L3+ tracked queries key by (workspace, dir) not Candidate
  body: |
    L3+ tracked queries use `(workspace: Workspace, dir: VfsPath)` primitives as Salsa keys rather than `Candidate` or aggregate structs. This avoids forcing `salsa::Update` on `RationaleBundle` fields; the candidate is reconstructed inside the query from L1-memoised calls at zero cost. Applies to: `all_components`, `component_parent`, `component_children`, and any new L4–L9 tracked queries that receive component information.
- id: cargo-toml-manifest-parsing-uses-line-scanning-not-toml-crate
  title: Cargo.toml manifest parsing uses the toml crate
  body: |
    Use the `toml` crate for Cargo.toml / manifest parsing. Hand-rolled line-scanning is rejected: multiline strings containing section-like text (e.g. `[lib]` inside a string literal) produce false positives. `table.get("lib").is_some_and(Value::is_table)` detects `[lib]`; `table.get("bin").is_some_and(Value::is_array)` detects `[[bin]]`—TOML represents array-of-tables as an array, not a table. Malformed input degrades to `CargoTomlShape::default()`.
- id: pin-lookup-accepts-relative-path-basename-or-additions-id
  title: Pin lookup accepts relative path, basename, or additions id
  body: |
    Pin lookup in L3 accepts three key forms: relative path, basename, and additions entry id. L4 has not yet allocated final component ids, so permissive matching lets users write pins naturally before canonical ids are known.
- id: lifecycle-roles-uses-vec-lifecyclescope-from-component-ontology
  title: lifecycle_roles uses Vec<LifecycleScope> from component-ontology
  body: |
    `lifecycle_roles` on classification output reuses `Vec<LifecycleScope>` from `component-ontology` rather than a parallel type. Vocabulary is single-sourced across atlas-index and atlas-engine.
- id: is-component-not-salsa-tracked-salsa-0-26-lacks-downcast
  title: is_component not salsa::tracked; Salsa 0.26 lacks downcast
  body: |
    `is_component` is not `#[salsa::tracked]` because the LLM backend lives on `AtlasDatabase` outside Salsa storage. Tracked functions receive `&dyn salsa::Database`; Salsa 0.26 does not expose a downcast to the concrete type. Deterministic and pin paths have no memoisation need (L1 caching covers signal reads).
- id: llm-memoisation-preferred-strategy-tracked-query-keyed-by-llmrequest
  title: LLM memoisation uses tracked query keyed by LlmRequest
  body: |
    LLM call memoisation uses a `#[salsa::tracked]` query keyed by a canonicalised `LlmRequest` struct, invoked by `is_component`. This gives per-request caching that survives Workspace input edits that do not change the request inputs.
- id: stable-id-allocation-uses-slug-suffix-sha-cascade
  title: Stable id allocation uses slug→suffix→sha cascade
  body: |
    Component id allocation uses a three-step cascade: (1) `leaf_slug` derived from directory basename, (2) `-2`/`-3` collision suffixes for siblings sharing the same slug within a parent, (3) short SHA-256 hex suffix as last resort. Guarantees stable ids across re-runs for the common case.
- id: rename-match-orphans-marked-deleted-true-for-one-index-cycle
  title: rename_match orphans marked deleted:true for one index cycle
  body: |
    `atlas_index::rename_match` returns three sets: matched pairs (reuse prior id), fresh candidates (allocate new id), and orphans. Orphans receive `deleted: true` in the index for one cycle then are dropped entirely.
- id: plural-token-substitution-must-precede-singular
  title: Plural token substitution must precede singular
  body: |
    Plural replacement must be applied before singular when substituting token pairs (e.g. `components` → `components` before `component` → `component`). Reversing the order produces a double-suffix artifact (`componentss`) because the singular pass mutates the already-substituted plural string.
- id: l6-batch-queries-all-proposed-edges-candidate-edges-for-share-cache-key
  title: L6 batch queries all_proposed_edges/candidate_edges_for share cache key
  body: |
    L6 `all_proposed_edges` and `candidate_edges_for` share a single cache key (the full component-pair input batch). One LLM call covers all pairs, but a single component input change invalidates the entire batch's cached result.
- id: l5-l6-llm-calls-must-route-through-call-llm-cached-not-backend-call-directly
  title: L5/L6+ LLM calls must route through call_llm_cached not backend.call directly
  body: |
    All LLM-adjacent queries in atlas-engine (L5/L6 and any future layers) must route through `AtlasDatabase::call_llm_cached(&self, req)` rather than calling `backend.call()` directly. This wrapper consults `LlmResponseCache` before hitting the backend and records the response keyed by `(LlmFingerprint, PromptId, canonical-JSON(inputs))`. Bypassing `call_llm_cached` silently skips the cache, causing redundant LLM calls and breaking the "zero LLM calls on no-op re-run" exit criterion.
- id: back-edge-inputs-stored-as-workspace-fields-not-tracked-queries
  title: Back-edge inputs stored as Workspace fields not tracked queries
  body: |
    The fixedpoint driver stores back-edges (`carve_back_edge`) as `Workspace` input fields rather than `#[salsa::tracked]` queries. Salsa 0.26 prohibits recursive tracked-query calls; modeling graph mutations as mutable inputs lets the driver loop set state, which auto-invalidates downstream L2 queries so L4 picks up new children without recursion across tracked boundaries.
- id: testbackend-requires-byte-identical-llmrequest-inputs-to-match-cache
  title: TestBackend requires byte-identical LlmRequest inputs to match cache
  body: |
    TestBackend caches canned responses keyed by the full serialised LlmRequest. Any field difference (e.g., `max_depth: 8` in the canned input vs `max_depth: 4` in driver config) produces a cache miss and triggers an unexpected LLM call rather than returning the canned response. All TestBackend fixture inputs must be byte-identical to what the production driver builds.
- id: seam-density-modularity-hint-uninformative-on-fixedpoint-iteration-0
  title: seam_density/modularity_hint uninformative on fixedpoint iteration 0
  body: |
    seam_density and modularity_hint signals are computed on each L7 pass, but on iteration 0 every component has no sub-components yet, so there are no internal edges. This means on the first fixedpoint iteration the signals are uniformly uninformative: seam_density is 0.0 or INFINITY (no internal edges to count) and modularity_hint returns None (< 4 descendants). The signals only become meaningful on iteration 2+ once sub-carved children exist and their edges are visible.

    **Practical consequence:** LLM Subcarve calls on iteration 0 receive no structural signals. If evaluation shows many spurious sub-carves, consider deferring L8 LLM escalation until iteration 2, or passing "iteration=0, signals unavailable" in the prompt so the LLM knows to use conservative priors.
- id: no-op-re-run-byte-identity-needs-cache-persistence-stable-generated-at
  title: No-op re-run byte-identity needs cache persistence + stable generated_at
  body: |
    Cache persistence across processes (llm-cache.json) and stable generated_at timestamps are both required for zero-diff no-op re-runs in atlas-cli. Stable generated_at reuses the prior timestamp when file content is unchanged. Missing either mechanism produces spurious diffs even when no source files changed.
- id: budgetsentinel-is-only-reliable-budget-exhaustion-detection-path
  title: BudgetSentinel is only reliable budget-exhaustion detection path
  body: |
    L5 and L6 swallow `LlmError::BudgetExhausted` into surface notes rather than propagating it. The `BudgetSentinel` wrapper intercepts the error before it enters L5/L6, making it the only reliable signal for detecting budget exhaustion in the pipeline.
- id: assert-cmd-real-binary-tests-must-be-gated-behind-atlas-llm-run-claude-tests-1
  title: assert_cmd real-binary tests must be gated behind ATLAS_LLM_RUN_CLAUDE_TESTS=1
  body: |
    Integration tests using assert_cmd that invoke the real atlas-cli binary must be gated behind `ATLAS_LLM_RUN_CLAUDE_TESTS=1`. Without the guard, running the test suite hits the production LLM backend and burns tokens.
- id: externals-from-manifests-omits-workspace-dependencies-entries
  title: externals_from_manifests omits [workspace.dependencies] entries
  body: |
    `externals_from_manifests` parses each Cargo.toml independently and does not resolve `{ workspace = true }` dependency declarations. Workspace-inherited dependencies are silently omitted from external component detection. Deferred as a follow-up.
- id: llm-cache-json-schema-split-deferred-to-v2
  title: llm-cache.json schema split deferred to v2
  body: |
    The `llm-cache.json` currently co-mingles per-prompt responses with fingerprint metadata in a single flat file. For v2 it may be worth one file per prompt type, or keying by content-sha of inputs rather than the full request object, to produce smaller diffs and cheaper cache invalidation on fingerprint-only changes.

    **Why:** Noted during L9/atlas-cli implementation (cycle that delivered `cache_io.rs`). Explicitly deferred as "not urgent" — byte-identity on no-op re-runs already works.

    **How to apply:** Surface this if the llm-cache.json file grows large or diffs are hard to read in PR review. Not a blocker for any current task.
- id: l5-l6-tests-include-template-token-coverage-check
  title: L5/L6 tests include template-token coverage check
  body: |
    L5/L6 prompt tests must collect all `{{TOKEN}}` placeholders from the rendered prompt and assert each maps to a key in `build_inputs`. This catches `TemplateSyntax` panics at test time rather than at the first real LLM call. Implementation: `collect_template_tokens` helper + `assert!(build_inputs.contains_key(token))` loop. Applied in `l5_surface.rs` and `l6_edges.rs`.
- id: prompt-drift-tests-against-ravel-lite-are-invalid
  title: Prompt drift tests against Ravel-Lite are invalid
  body: |
    Byte-comparison drift tests against Ravel-Lite originals (as in the deleted `prompt_migration.rs`) require a live Ravel-Lite sibling checkout and produce false failures once Atlas prompts genuinely diverge. Use required-token presence, no-Ravel-Lite-remnants, and template-token coverage tests instead. See: L5/L6 tests include template-token coverage check.
- id: component-ontology-targets-linkuistics-extraction-for-oss
  title: component-ontology targets Linkuistics extraction for OSS
  body: |
    component-ontology (and possibly atlas-index) is planned for extraction to a public Linkuistics crate. Extraction unblocks Ravel-Lite OSS migration tasks that require shared ontology types across crates.
- id: dev-workspace-golden-is-top-level-only-expect-high-spurious-rate-on-first-v1-metrics-run
  title: Dev-workspace golden is top-level only; expect high spurious rate on first v1 metrics run
  body: |
    Dev-workspace golden covers only 22 top-level components (one per top-level `~/Development/` directory). The atlas tool sub-carves monorepos and multi-crate workspaces into finer components. Expect high spurious-rate and low coverage on first v1 sign-off runs — this is structural, not a regression.

    **Resolution options already wired:** (a) refine the golden to sub-carve depth to match tool output, or (b) tune `OverlapThreshold` at call sites in `atlas-eval` (plumbing already exists). Notes on the tradeoff are in `evaluation/goldens/dev-workspace/notes.md`.
