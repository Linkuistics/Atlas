entries:
- id: cross-crate-include-str-paths-break-crates-io-publication
  title: Cross-crate include_str! paths break crates.io publication
  body: |
    Cross-crate `include_str!` paths (e.g. `../../../defaults/ontology.yaml`) work for path and git deps but fail `cargo publish`, which requires all included files within the crate root. Atlas and Ravel-Lite ship as Homebrew bottles; neither publishes to crates.io, so existing cross-crate paths are safe indefinitely.

    **If crates.io publication becomes required:** rework paths so every included file lives within its crate root — move assets under the crate directory or embed via `build.rs` into `OUT_DIR`.
- id: lib-crate-public-items-do-not-trigger-dead-code-lint
  title: Lib crate public items do not trigger dead-code lint
  body: |
    When a crate is a library (not a binary), the Rust compiler does not fire the dead-code lint for `pub` items, because they are considered part of a public API. Binary-host crates required `#[allow(dead_code)]` on the same items; migrating to a lib crate removes that need.
- id: rename-detection-uses-greedy-bipartite-matching-on-content-sha
  title: Rename detection uses greedy bipartite matching on content-SHA
  body: |
    Rename detection uses greedy bipartite matching on content-SHA overlap. This avoids the quadratic cost of full-tree diffing and is accurate for the common case where a component moves directories but its files are unchanged.
- id: serde-untagged-enum-variants-need-unique-field-names
  title: Serde untagged enum variants need unique field names
  body: |
    Serde untagged enums require each variant's distinguishing field name to be unique across variants. Field name collisions between variants cause ambiguous deserialisation. This constraint is load-bearing for `PinValue` in atlas-index.
- id: componentkind-enum-deferred-to-atlas-engine
  title: ComponentKind enum lives in atlas-engine not atlas-index
  body: |
    `ComponentKind` is defined in `atlas-engine`, not `atlas-index`. `ComponentEntry::kind` in atlas-index remains `String` to avoid churning downstream consumers when the vocabulary expands. The enum is the authoritative classification vocabulary and covers common language ecosystems using a library/app split for every language (not just Rust) — apps and services are leaves; libraries may recurse. `defaults/component-kinds.yaml` enumerates variants with YAML descriptions; `defaults/component-kinds.md` is a companion prompt-fragment for analysts and LLMs.
- id: pinvalue-suppress-uses-alwaystrue-to-ban-suppress-false
  title: PinValue::Suppress uses AlwaysTrue to ban suppress:false
  body: |
    `PinValue::Suppress` carries an `AlwaysTrue` marker field so that `suppress: false` is a parse error rather than a silent no-op. Omitting `suppress: true` entirely is the intended representation of "no suppression".
- id: docs-overrides-migration-md-is-a-ghost-reference-until-v2-schema-ships
  title: docs/overrides-migration.md is a ghost path
  body: |
    `yaml_io.rs::require_schema_version(UserAuthored)` refers to `docs/overrides-migration.md` which does not yet exist. Write it when the overrides schema reaches v2. User-authored overrides get "migrate by hand, do NOT delete"; generated files get "delete and re-run `atlas index`".
- id: llmfingerprint-fields-are-driver-populated-via-with-fingerprint-inputs
  title: LlmFingerprint fields are driver-populated via with_fingerprint_inputs
  body: |
    `template_sha` and `ontology_sha` inside `LlmFingerprint` are set by the driver calling `.with_fingerprint_inputs()`, not by the backend constructor. This keeps `LlmBackend` implementors free of ontology plumbing.
- id: llm-response-json-schema-validation-is-hand-rolled-type-required-subset
  title: LLM response JSON Schema validation is hand-rolled type/required subset
  body: |
    Atlas's four LLM response schemas are hand-authored and small, so validation checks only `type` and `required` fields — a hand-rolled subset rather than a full JSON Schema crate dependency.
- id: tokencounter-charge-uses-cas-loop-on-atomicu64
  title: TokenCounter::charge uses CAS loop on AtomicU64
  body: |
    `TokenCounter::charge` uses a compare-and-swap loop on `AtomicU64` rather than a mutex. This avoids serialising parallel Salsa queries that call the backend concurrently.
- id: budgetedbackend-charges-tokens-after-inner-call-returns
  title: BudgetedBackend charges tokens after inner call returns
  body: |
    `BudgetedBackend` calls `TokenCounter::charge` after the wrapped backend returns, not before. Pre-call estimation would diverge from actual usage for providers that return real token counts in their response.
- id: template-sha-computed-via-prompt-render-plus-sha-256-in-atlas-engine
  title: template_sha computed via prompt::render plus SHA-256 in atlas-engine
  body: |
    The driver computes `template_sha` by calling `prompt::render` on each template with ontology-derived tokens and SHA-256ing the result. The helper lives in `atlas-engine`, not `atlas-llm`.
- id: salsa-0-26-input-setters-do-not-check-equality
  title: Salsa 0.26 input setters do not check equality
  body: |
    Salsa 0.26 input setters unconditionally bump the revision even when the new value equals the old. All `AtlasDatabase` setter wrappers must read the current value and return early if unchanged. Implementation: `crates/atlas-engine/src/db.rs` — `register_file` and `set_workspace_*`. Any new Workspace input field must have a skip-if-equal guard in its setter.
- id: salsa-input-debug-required-for-debug-on-input-structs
  title: salsa::input(debug) required for Debug on input structs
  body: |
    `#[salsa::input(debug)]` is required to derive `Debug` on generated Salsa input structs. Without the flag, the macro does not emit the `Debug` impl.
- id: arc-t-satisfies-salsa-update-bound-for-foreign-types
  title: Arc<T> satisfies Salsa Update bound for foreign types
  body: |
    Salsa has a blanket `Update` impl for `Arc<T>`. Wrapping foreign types (`ComponentsFile`, `ExternalsFile`, etc.) in `Arc<T>` avoids adding `salsa::Update` derives on non-Salsa crates.
- id: l2-queries-receive-file-handles-not-raw-paths
  title: L2+ queries receive File handles not raw paths
  body: |
    `file_content(path)` is an untracked helper; tracked dependency chains flow through `File::bytes(db)` once a tracked query holds the handle. L2+ code must receive `File` handles rather than calling `file_content` directly, or those accesses will not participate in Salsa's incremental dependency graph.
- id: ignore-crate-requires-git-root-for-gitignore-filtering
  title: ignore crate requires .git root for gitignore filtering
  body: |
    The `ignore` crate's gitignore filtering only activates inside `.git`-rooted directory trees. Standalone tempdir fixtures bypass it by design, which is the correct behaviour for test fixtures that should not be filtered.
- id: l3-classification-keys-by-workspace-dir-not-candidate
  title: L3+ tracked queries key by (workspace, dir) not Candidate
  body: |
    L3+ tracked queries use `(workspace: Workspace, dir: VfsPath)` primitives as Salsa keys rather than `Candidate` or aggregate structs. This avoids forcing `salsa::Update` on `RationaleBundle` fields; the candidate is reconstructed inside the query from L1-memoised calls at zero cost. Applies to: `all_components`, `component_parent`, `component_children`, and any new L4–L9 tracked queries that receive component information.
- id: cargo-toml-manifest-parsing-uses-line-scanning-not-toml-crate
  title: Cargo.toml manifest parsing uses the toml crate
  body: |
    Use the `toml` crate for Cargo.toml / manifest parsing. Hand-rolled line-scanning is rejected: multiline strings containing section-like text (e.g. `[lib]` inside a string literal) produce false positives. `table.get("lib").is_some_and(Value::is_table)` detects `[lib]`; `table.get("bin").is_some_and(Value::is_array)` detects `[[bin]]`—TOML represents array-of-tables as an array, not a table. Malformed input degrades to `CargoTomlShape::default()`.
- id: pin-lookup-accepts-relative-path-basename-or-additions-id
  title: Pin lookup accepts relative path, basename, or additions id
  body: |
    Pin lookup in L3 accepts three key forms: relative path (both raw and slugified), basename, and additions entry id. L4 has not yet allocated final component ids, so permissive matching lets users write pins naturally before canonical ids are known. Slugified matching handles mixed-case path segments (e.g. `crates/atlas-engine` in overrides matches directory `crates/Atlas-Engine`).
- id: lifecycle-roles-uses-vec-lifecyclescope-from-component-ontology
  title: lifecycle_roles uses Vec<LifecycleScope> from component-ontology
  body: |
    `lifecycle_roles` on classification output reuses `Vec<LifecycleScope>` from `component-ontology` rather than a parallel type. Vocabulary is single-sourced across atlas-index and atlas-engine.
- id: is-component-not-salsa-tracked-salsa-0-26-lacks-downcast
  title: is_component not salsa::tracked; Salsa 0.26 lacks downcast
  body: |
    `is_component` is not `#[salsa::tracked]` because the LLM backend lives on `AtlasDatabase` outside Salsa storage. Tracked functions receive `&dyn salsa::Database`; Salsa 0.26 does not expose a downcast to the concrete type. Deterministic and pin paths have no memoisation need (L1 caching covers signal reads).
- id: llm-memoisation-preferred-strategy-tracked-query-keyed-by-llmrequest
  title: LLM memoisation uses tracked query keyed by LlmRequest
  body: |
    LLM call memoisation uses a `#[salsa::tracked]` query keyed by a canonicalised `LlmRequest` struct, invoked by `is_component`. This gives per-request caching that survives Workspace input edits that do not change the request inputs.
- id: stable-id-allocation-uses-slug-suffix-sha-cascade
  title: Stable id allocation uses slug→suffix→sha cascade
  body: |
    Component id allocation uses a three-step cascade: (1) `leaf_slug` derived from directory basename, (2) `-2`/`-3` collision suffixes for siblings sharing the same slug within a parent, (3) short SHA-256 hex suffix as last resort. Guarantees stable ids across re-runs for the common case.
- id: rename-match-orphans-marked-deleted-true-for-one-index-cycle
  title: rename_match orphans marked deleted:true for one index cycle
  body: |
    `atlas_index::rename_match` returns three sets: matched pairs (reuse prior id), fresh candidates (allocate new id), and orphans. Orphans receive `deleted: true` in the index for one cycle then are dropped entirely.
- id: plural-token-substitution-must-precede-singular
  title: Plural token substitution must precede singular
  body: |
    Plural replacement must be applied before singular when substituting token pairs (e.g. `components` → `components` before `component` → `component`). Reversing the order produces a double-suffix artifact (`componentss`) because the singular pass mutates the already-substituted plural string.
- id: l6-batch-queries-all-proposed-edges-candidate-edges-for-share-cache-key
  title: L6 batch queries all_proposed_edges/candidate_edges_for share cache key
  body: |
    L6 `all_proposed_edges` and `candidate_edges_for` share a single cache key (the full component-pair input batch). One LLM call covers all pairs, but a single component input change invalidates the entire batch's cached result.
- id: l5-l6-llm-calls-must-route-through-call-llm-cached-not-backend-call-directly
  title: L5/L6+ LLM calls must route through call_llm_cached not backend.call directly
  body: |
    All LLM-adjacent queries in atlas-engine (L5/L6 and any future layers) must route through `AtlasDatabase::call_llm_cached(&self, req)` rather than calling `backend.call()` directly. This wrapper consults `LlmResponseCache` before hitting the backend and records the response keyed by `(LlmFingerprint, PromptId, canonical-JSON(inputs))`. Bypassing `call_llm_cached` silently skips the cache, causing redundant LLM calls and breaking the "zero LLM calls on no-op re-run" exit criterion.
- id: back-edge-inputs-stored-as-workspace-fields-not-tracked-queries
  title: Back-edge inputs stored as Workspace fields not tracked queries
  body: |
    The fixedpoint driver stores back-edges (`carve_back_edge`) as `Workspace` input fields rather than `#[salsa::tracked]` queries. Salsa 0.26 prohibits recursive tracked-query calls; modeling graph mutations as mutable inputs lets the driver loop set state, which auto-invalidates downstream L2 queries so L4 picks up new children without recursion across tracked boundaries.
- id: testbackend-requires-byte-identical-llmrequest-inputs-to-match-cache
  title: TestBackend requires byte-identical LlmRequest inputs to match cache
  body: |
    TestBackend caches canned responses keyed by the full serialised LlmRequest. Any field difference (e.g., `max_depth: 8` in the canned input vs `max_depth: 4` in driver config) produces a cache miss and triggers an unexpected LLM call rather than returning the canned response. All TestBackend fixture inputs must be byte-identical to what the production driver builds.
- id: seam-density-modularity-hint-uninformative-on-fixedpoint-iteration-0
  title: seam_density/modularity_hint uninformative on fixedpoint iteration 0
  body: |
    On fixedpoint iteration 0, every component has no sub-components yet: seam_density is 0.0 or INFINITY (no internal edges) and modularity_hint returns None (< 4 descendants). LLM Subcarve calls on iteration 0 receive no structural signals; the signals only become meaningful from iteration 2 onward.

    If evaluation shows many spurious sub-carves, defer L8 LLM escalation until iteration 2, or pass "iteration=0, signals unavailable" in the prompt.
- id: no-op-re-run-byte-identity-needs-cache-persistence-stable-generated-at
  title: No-op re-run byte-identity needs cache persistence + stable generated_at
  body: |
    Cache persistence across processes (llm-cache.json) and stable generated_at timestamps are both required for zero-diff no-op re-runs in atlas-cli. Stable generated_at reuses the prior timestamp when file content is unchanged. Missing either mechanism produces spurious diffs even when no source files changed.
- id: budgetsentinel-is-only-reliable-budget-exhaustion-detection-path
  title: BudgetSentinel is only reliable budget-exhaustion detection path
  body: |
    L5 and L6 swallow `LlmError::BudgetExhausted` into surface notes rather than propagating it. The `BudgetSentinel` wrapper intercepts the error before it enters L5/L6, making it the only reliable signal for detecting budget exhaustion in the pipeline.
- id: assert-cmd-real-binary-tests-must-be-gated-behind-atlas-llm-run-claude-tests-1
  title: assert_cmd real-binary tests must be gated behind ATLAS_LLM_RUN_CLAUDE_TESTS=1
  body: |
    Integration tests using assert_cmd that invoke the real atlas-cli binary must be gated behind `ATLAS_LLM_RUN_CLAUDE_TESTS=1`. Without the guard, running the test suite hits the production LLM backend and burns tokens.
- id: externals-from-manifests-omits-workspace-dependencies-entries
  title: externals_from_manifests omits [workspace.dependencies] entries
  body: |
    `externals_from_manifests` parses each Cargo.toml independently and does not resolve `{ workspace = true }` dependency declarations. Workspace-inherited dependencies are silently omitted from external component detection. Deferred as a follow-up.
- id: llm-cache-json-schema-split-deferred-to-v2
  title: llm-cache.json schema split deferred to v2
  body: |
    `llm-cache.json` co-mingles per-prompt responses with fingerprint metadata in a single flat file. Not urgent — byte-identity on no-op re-runs works. A v2 refactor (one file per prompt type, or content-sha keying) would produce smaller diffs and cheaper cache invalidation on fingerprint-only changes. Surface if the file grows large or diffs are hard to review.
- id: l5-l6-tests-include-template-token-coverage-check
  title: L5/L6 tests include template-token coverage check
  body: |
    L5/L6 prompt tests must collect all `{{TOKEN}}` placeholders from the rendered prompt and assert each maps to a key in `build_inputs`. This catches `TemplateSyntax` panics at test time rather than at the first real LLM call. Implementation: `collect_template_tokens` helper + `assert!(build_inputs.contains_key(token))` loop. Applied in `l5_surface.rs` and `l6_edges.rs`.
- id: prompt-drift-tests-against-ravel-lite-are-invalid
  title: Prompt drift tests against Ravel-Lite are invalid
  body: |
    Byte-comparison drift tests against Ravel-Lite originals (as in the deleted `prompt_migration.rs`) require a live Ravel-Lite sibling checkout and produce false failures once Atlas prompts genuinely diverge. Use required-token presence, no-Ravel-Lite-remnants, and template-token coverage tests instead. See: L5/L6 tests include template-token coverage check.
- id: component-ontology-targets-linkuistics-extraction-for-oss
  title: component-ontology and atlas-index live in linkuistics/atlas-contracts
  body: |
    `component-ontology` and `atlas-index` live in the public `linkuistics/atlas-contracts` Cargo workspace on GitHub (bootstrap commit `337c54368eb1393f2c3f8839a5e9042ce72cf964`). Atlas consumes both as **local path deps** during development (`path = "../atlas-contracts/crates/<crate>"`; checkout at `~/Development/atlas-contracts/`). At publish time: flip to `git+rev` refs, publish, revert to path deps. `atlas-cli`, `atlas-engine`, and `evaluation/harness` declare them via `workspace = true`. `defaults/ontology.yaml` also moved to `atlas-contracts`.
- id: dev-workspace-golden-is-top-level-only-expect-high-spurious-rate-on-first-v1-metrics-run
  title: Dev-workspace golden covers top-level only; expect high spurious rate
  body: |
    Dev-workspace golden covers only 22 top-level components (one per `~/Development/` directory). Atlas sub-carves monorepos and multi-crate workspaces into finer components, so high spurious rate and low coverage on first v1 sign-off runs is structural, not a regression.

    Resolution: (a) refine the golden to sub-carve depth, or (b) tune `OverlapThreshold` at call sites in `atlas-eval` (plumbing exists). Tradeoff notes in `evaluation/goldens/dev-workspace/notes.md`.
- id: grep-all-workspace-members-before-deleting-extracted-crates
  title: Grep all workspace members before deleting extracted crates
  body: |
    After extracting crates from a Cargo workspace, grep the remaining members for path deps pointing to the extracted crates before deleting them. `evaluation/harness/Cargo.toml` had a direct path dep on `atlas-index` that was missed in the initial sweep and required a follow-up fix.
- id: atlas-contracts-infrastructure-versioning-ci-and-lockfile-bumping
  title: 'atlas-contracts infrastructure: versioning, CI, and lockfile bumping'
  body: |
    Three deferred items for `atlas-contracts` infrastructure:

    1. **Versioning:** Single `main` branch, pinned by SHA in Atlas `[workspace.dependencies]` for git+rev mode. Add semantic tags only if third-party consumers join.

    2. **CI:** No pipeline on `linkuistics/atlas-contracts`; Atlas's own CI catches regressions. Add `cargo test --workspace` there if the contracts repo grows.

    3. **Lockfile:** When flipping from path deps to git+rev for publication, run `cargo update -p component-ontology -p atlas-index`.
- id: m2-migration-is-pure-import-path-swap
  title: M2 migration is pure import-path swap
  body: |
    `component-ontology` at `linkuistics/atlas-contracts` SHA `337c54368eb1393f2c3f8839a5e9042ce72cf964` matches Ravel-Lite's `src/ontology/mod.rs` public surface 1:1. The migration (M2/M4/M5) is a pure import-path swap with no API churn; use **local path deps** (`path = "../atlas-contracts/crates/component-ontology"`), not git+rev refs.

    The task lives in **Ravel-Lite's** backlog (not Atlas's): `ravel-lite state backlog list /Users/antony/Development/Ravel-Lite/LLM_STATE/core --category migration`. Atlas's `verify-atlas-v1-success-criteria-end-to-end` criterion 5 is gated on Ravel-Lite's M5.
- id: atlas-tap-publish-requires-linkuistics-homebrew-taps-formula-dir
  title: Atlas tap publish requires linkuistics/homebrew-taps Formula/ dir
  body: |
    Atlas `release-publish.sh` requires `linkuistics/homebrew-taps` to exist with at least an empty `Formula/` directory before first publication. The script uses `$ATLAS_TAP_DIR` (default: `~/Development/homebrew-taps`) for the local checkout path.
- id: build-rs-rerun-if-changed-path-is-relative-to-crate-manifest
  title: build.rs rerun-if-changed path is relative to crate manifest
  body: |
    In a Cargo workspace, `cargo:rerun-if-changed` paths in a sub-crate's `build.rs` are relative to that crate's `Cargo.toml`, not the workspace root. A crate at `crates/atlas-cli/` must use `../../.git/HEAD` to reach the workspace-level `.git/HEAD`. This is the correct hook for invalidating compile-time version metadata when HEAD or tags change.
- id: concat-assembles-static-str-from-env-for-clap-version
  title: concat! assembles &'static str from env!() for clap version
  body: |
    `concat!(env!("FOO"), " ", env!("BAR"))` produces a `&'static str` suitable for clap's `version = ...` attribute. `format!()` produces `String` and cannot be used there. Apply this pattern in `build.rs`-driven version metadata: define a `VERSION` constant via `concat!` over multiple `env!()` calls baked at compile time.
- id: crate-versions-inherit-from-workspace-root
  title: Crate versions inherit from workspace root
  body: |
    All crate `Cargo.toml` files use `version.workspace = true`; the authoritative version lives only in `[workspace.package]` in the root `Cargo.toml`. Adding a new crate: declare `version.workspace = true`, not a pinned literal.
- id: progressbackend-sits-outside-llmresponsecache-counts-cache-misses-only
  title: ProgressBackend sits outside LlmResponseCache; counts cache misses only
  body: |
    `ProgressBackend` is inserted between `BudgetSentinel` and `LlmResponseCache` in the backend chain. It only observes calls that escape the cache (cache misses). A fully-cached re-run produces no progress output. Inserting it inside the cache would count cache hits as live calls, which is incorrect.
- id: dyn-trait-field-in-struct-requires-hand-rolled-debug
  title: dyn Trait field in struct requires hand-rolled Debug
  body: |
    `FixedpointConfig` contains `progress: Option<Arc<dyn ProgressSink>>`. `dyn Trait` objects do not implement `Debug`, so `#[derive(Debug)]` fails. The fix is a hand-rolled `Debug` impl that formats the field as a literal (e.g., `Some(<dyn ProgressSink>)`). Any future struct field holding a `dyn Trait` object will hit the same constraint.
- id: subcarve-event-emitted-before-subcarve-decision-spec-7-2
  title: Subcarve event emitted before subcarve_decision (spec §7.2)
  body: |
    `ProgressEvent::Subcarve` must be emitted before calling `subcarve_decision` (spec §7.2) — the callback fires while the LLM backend call count is still at its pre-decision value. Test `engine_emits_subcarve_event_before_calling_decision` verifies this by reading `call_count()` inside the sink callback via a shared-state clone of `RecordingSink`. `RecordingSink` lives in `crates/atlas-engine/src/progress.rs` and is the canonical test helper for progress-event ordering assertions.
- id: subcarve-surface-events-set-authoritative-k-n-over-llm-tap
  title: Subcarve/Surface events set authoritative k/n over LLM-tap
  body: |
    `Reporter::on_llm_call` increments `PromptBreakdown` counters but defers k/n values to engine-set events. `ProgressEvent::Subcarve` and `ProgressEvent::Surface` carry authoritative k/n counts; these take priority over any k/n derived from the LLM-tap side-channel (spec §6.3). Implementations that update k/n from both sources must apply this priority.
- id: token-gauge-bar-hides-itself-when-budget-is-zero
  title: Token gauge bar hides itself when budget is zero
  body: |
    `Reporter` hides the token gauge `ProgressBar` when the configured token budget is 0 (the `--no-budget` case). This prevents a degenerate "0/0 tokens" bar from appearing. Future Reporter extensions that add gauge regions should apply the same hide-on-zero pattern.
- id: l5-pre-walks-all-components-before-surface-of-for-progress-and-cache
  title: L5 pre-walks all_components before surface_of for progress and cache
  body: |
    L5 projection pre-walks `all_components(&db)` (non-deleted) and emits one `ProgressEvent::Surface { k, n }` per component *before* calling `surface_of`. The same loop warms the Salsa cache so the terminal `components_yaml_snapshot_with_prompt_shas` call is a cache hit rather than triggering redundant recomputation.
- id: finished-event-fires-after-save-atomic-per-spec-6-2
  title: Finished event fires after save_*_atomic per spec §6.2
  body: |
    `Finished` must be emitted after `save_*_atomic` completes (spec §6.2: "done line is final"). The pipeline `Started`/`Phase`/`Finished` event sequence in `run_index` enforces this: `reporter.finish()` is called only after all atomic file writes succeed.
- id: llmresponsecache-call-count-increments-on-cache-misses-only
  title: LlmResponseCache::call_count increments on cache misses only
  body: |
    LlmResponseCache::call_count increments only on successful cache misses — errors short-circuit before the increment. A test that asserts `call_count() == 0` may still have triggered real backend traffic if those calls errored out. When using TestBackend in tests that need to verify "zero live LLM calls", an erroring backend can show `call_count=0` while logically having fired. Use a wrapping `CountingBackend` (counts every `.call()` invocation, including errors) when the assertion is about traffic rather than successful responses.
- id: testbackend-json-matches-only-literal-empty-object-not-wildcard
  title: TestBackend json!({}) matches only literal empty-object, not wildcard
  body: |
    `TestBackend::respond` keys on the full serialised `LlmRequest`. `json!({})` matches **only** the literal empty-object input — it is not a wildcard. Tests that need to drive a real L5 or L6 path must either:

    1. Compute exact inputs via `build_inputs_for_tests` (currently `pub(crate)` in `atlas-engine`) and register a canned response against the real input, or
    2. Wrap with a `CountingBackend` that counts invocations without depending on canned-response success.

    Corollary: a test using `json!({})` as a catch-all canned response and expecting successful L5 surfacing will see a cache miss on every real L5 call, causing unexpected LLM traffic or test failures.
- id: release-scripts-enforce-head-and-tag-are-pushed-to-origin-before-build-publish
  title: Release scripts enforce HEAD and tag are pushed to origin before build/publish
  body: |
    `scripts/release-build.sh` and `scripts/release-publish.sh` both call a `require_pushed_to_origin <version>` helper that:

    1. `git fetch --quiet --tags origin` — refresh remote refs/tags without pruning.
    2. `git merge-base --is-ancestor HEAD origin/main` — fail unless HEAD is reachable from origin/main.
    3. `git ls-remote --exit-code --tags origin refs/tags/v<version>` — fail unless the release tag is on origin.

    `release-build.sh` runs the check after `require_clean_tagged_tree` (fail-fast before the cold zigbuild). `release-publish.sh` runs it after `verify_tag_matches_artifacts` for defense in depth.

    Without this check, `release-publish.sh` can create a GitHub Release whose underlying commit is absent from `origin/main` — `gh release create` silently auto-creates a remote tag even when the commit is not pushed.

    **Implementation invariants:**

    - Use **ancestry** (`merge-base --is-ancestor HEAD origin/main`), not SHA equality. SHA equality false-positives if someone else lands on origin/main between local push and build.
    - **No `--prune` / `--prune-tags`** on the fetch — release scripts must not impose tag-pruning side effects on the operator's working tree.
    - Helper is **duplicated** in both scripts rather than sourced from `scripts/lib/`. Extract `lib/release-checks.sh` if the scripts grow more shared helpers.
- id: agent-progress-sub-line-is-a-third-indicatif-line-on-callstart-callend
  title: Agent progress sub-line is a third indicatif line on CallStart/CallEnd
  body: |
    Third indicatif sub-line mounted on `CallStart`, unmounted on `CallEnd`. Activation gate: `Reporter::drawing()`. Side-channel routes `ClaudeCodeBackend → Reporter` directly (not through a shared event bus). Surface content: most recent tool call name + running counter during long LLM pauses. Spec: `docs/superpowers/specs/2026-05-01-agent-progress-feedback-design.md`.
- id: agent-progress-backend-uses-stream-json-verbose-legacy-path-removed
  title: Agent progress backend uses stream-json --verbose; legacy path removed
  body: |
    `ClaudeCodeBackend` runs `claude -p --output-format stream-json --verbose` for all calls; the legacy non-streaming JSON path is removed. Real JSONL fixtures are committed under `crates/atlas-llm/tests/fixtures/stream/`: `simple-classify.jsonl` (no tools), `subcarve-with-tools.jsonl` (one Read-tool call), `error-max-turns.jsonl` (budget-exhausted terminal). See `README.md` in that directory for capture/redaction instructions.
- id: stream-json-tool-result-is-error-absent-on-success
  title: stream-json tool_result.is_error absent on success
  body: |
    In claude stream-json JSONL, `tool_result.is_error` is absent when there is no error, not set to `false`. The parser must treat field absence as success, not as a missing required field.
- id: stream-json-content-mixes-thinking-tool-use-text-per-event
  title: stream-json content[] mixes thinking/tool_use/text per event
  body: |
    A single assistant `content[]` array in claude stream-json JSONL can contain `thinking`, `tool_use`, and `text` block types interleaved in one event. The parser must handle all three block types in a single pass rather than assuming one type per event.
- id: stream-json-result-result-is-markdown-fenced-json
  title: stream-json result.result is markdown-fenced JSON
  body: |
    The terminal `result.result` field in claude stream-json JSONL is markdown-fenced JSON (e.g., ` ```json\n...\n``` `), not bare JSON. `serde_json::from_str` fails without stripping the fence markers first.
- id: max-budget-usd-0-001-forces-error-terminal-in-print-mode
  title: max-budget-usd 0.001 forces error terminal in print mode
  body: |
    `--settings '{"maxTurns": 1}'` has no effect in `--print` mode. Use `--max-budget-usd 0.001` to force a non-success terminal event (`error_max_budget_usd`) when capturing stream-json JSONL test fixtures.
- id: claude-p-json-schema-may-emit-bare-json-skipping-markdown-fence
  title: claude -p --json-schema may emit bare JSON skipping markdown fence
  body: |
    `parse_stream` strips markdown fences from `result.result` (e.g., ` ```json\n...\n``` `) before calling `serde_json::from_str`. The `--json-schema <schema>` flag (visible in `claude --help`) may cause the CLI to emit bare JSON, bypassing the fence — this would eliminate the need for fence-stripping — but it is untested in the stream-json path.

    Related: `stream-json-result-result-is-markdown-fenced-json`.
- id: agentobserver-is-a-side-channel-parallel-to-reporter-on-llm-call
  title: AgentObserver is a side-channel parallel to Reporter::on_llm_call
  body: |
    AgentObserver events flow ClaudeCodeBackend -> Reporter directly, bypassing BudgetSentinel and LlmResponseCache. A cached re-run produces zero AgentEvent instances; budget exhaustion is still signalled via BudgetSentinel. Spec §4.1.
- id: stream-json-result-event-is-the-only-load-bearing-parser-path
  title: stream-json result event is the only load-bearing parser path
  body: |
    parse_stream skips unknown event types and non-JSON lines without erroring; only the terminal `result` event extraction is required. This is the explicit forward-compat goal so future CLI schema additions do not break the parser. Spec §7.4.
- id: claude-stderr-must-be-piped-and-drained-when-using-command-spawn
  title: claude stderr must be piped and drained when using Command::spawn
  body: |
    ClaudeCodeBackend pipes stderr via Stdio::piped() and drains it on a worker thread. Without the drainer, large stderr output (e.g. setup warnings, deprecation banners) fills the pipe buffer and the child blocks waiting for the parent to consume it, deadlocking the run. Spec §7.7.
- id: reporter-agent-mounted-is-tracked-in-state-not-derived-from-indicatif
  title: Reporter agent_mounted is tracked in state, not derived from indicatif
  body: |
    indicatif 0.17 `ProgressBar::is_hidden()` returns true both for `ProgressDrawTarget::hidden()` AND when stderr is not a TTY (CI / test runs). To distinguish "we mounted the agent sub-line" from "we are running headless", track `agent_mounted: bool` in `ReporterState`. Without this, agent-bar visibility tests pass under TTY but fail in CI, and feature-presence detection (e.g. tests asserting we mounted the bar) is unreliable.
- id: two-traits-with-same-named-on-event-method-on-reporter-requires-ufcs
  title: Two traits with same-named on_event method on Reporter requires UFCS
  body: |
    Reporter implements both `ProgressSink::on_event(&self, ProgressEvent)` and `AgentObserver::on_event(&self, AgentEvent)`. Even though argument types disambiguate, Rust requires UFCS in test code: `ProgressSink::on_event(&*r, ev)` rather than `r.on_event(ev)`. Method resolution looks at receiver, not arg types. Production callsites that go via `&dyn ProgressSink` or `&dyn AgentObserver` are unaffected.
- id: stream-json-error-max-budget-usd-maps-to-invocation-not-budgetexhausted
  title: parse_stream error_max_budget_usd branch returns LlmError::BudgetExhausted
  body: |
    `parse_stream` has a special-case branch for the `error_max_budget_usd` stream terminal subtype that returns `LlmError::BudgetExhausted`. All other non-success subtypes (e.g. `error_during_execution`) fall through to the generic `LlmError::Invocation` path.

    `BudgetExhausted { requested: 0, remaining: 0 }` — the terminal frame carries `total_cost_usd`, not token counts; `BudgetSentinel` matches on variant, not fields.

    Cross-ref: `budgetsentinel-is-only-reliable-budget-exhaustion-detection-path`.
- id: seed-filesystem-excluding-excludes-output-dir-from-l0
  title: seed_filesystem_excluding excludes output dir from L0
  body: |
    `seed_filesystem_excluding` takes an exclusion predicate that filters the `.atlas/` output directory from L0 file ingestion. Without the exclusion, prior-run artefacts are re-ingested as source files on subsequent runs, corrupting L0 input. The exclusion is required whenever `.atlas/` is absent from `.gitignore`.
- id: validate-overrides-fails-on-unknown-kind-before-llm
  title: validate-overrides fails on unknown kind before LLM
  body: |
    The `validate-overrides` CLI subcommand and the integrated pipeline early-fail path both reject unknown `ComponentKind` values before any LLM calls start. Unknown kind → hard error, not a warning. This prevents bad overrides from silently influencing classification and avoids wasting token budget on unrecoverable input errors.
