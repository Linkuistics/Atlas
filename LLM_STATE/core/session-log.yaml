    - What didn't: The `include_str!` path `../../../defaults/ontology.yaml` crosses the crate boundary, which is fine for path/git deps (Â§9.5) but would require a rework if the crate is ever published to crates.io. The `thiserror` workspace dep is declared but no crate uses it yet â€” left in place for future crates.
    - What this suggests next: Task 2 (atlas-index) and Task 3 (atlas-llm) are now both unblocked and parallelisable. Ravel-Lite migration M2 is also unblocked. The workspace-deps and lint policy infrastructure is in place for all subsequent tasks.
