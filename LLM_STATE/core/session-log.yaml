    ### Session 4 (2026-04-24T06:15:02Z) ‚ÄĒ Implement atlas-engine L0 and L1: Salsa scaffold and enumeration queries

    - What was attempted: Full implementation of task `implement-atlas-engine-l0-and-l1-salsa-scaffold-and-enumeration-queries` ‚ÄĒ Salsa database, filesystem ingestion, L1 enumeration queries, and 21 tests across three fixture directories.
    - What worked: All scope landed. `cargo test -p atlas-engine` passes with 21 tests (7 unit + 14 integration). Full workspace: 133 tests, 0 failures. `cargo clippy -p atlas-engine --all-targets -- -D warnings` is clean. All three fixture directories (`tiny-rust-lib`, `mixed`, `monorepo-fragment`) produce deterministic L1 outputs. Cache-hit behaviour is verified via Salsa WillExecute event stream.
    - What didn't work on first try: The cache-hit test initially failed ‚ÄĒ Salsa input setters unconditionally bump the revision even when the value is identical. Fix: all `AtlasDatabase` setters (including `register_file`'s per-file `set_bytes`) now read the current value first and return early if unchanged. This setter equality-check pattern is a load-bearing invariant for all future input fields.
    - What this suggests trying next: Task `implement-atlas-engine-l2-and-l3-candidate-generation-and-classification` is now unblocked. Key hand-offs below inform the L2/L3 implementation.
    - Key learnings:
      - Salsa 0.26 input setters do not perform equality checks; callers must skip when value unchanged.
      - `#[salsa::input(debug)]` is required for `Debug` derivation on generated input structs.
      - Wrapping foreign types (`ComponentsFile`, `ExternalsFile`, etc.) in `Arc<T>` avoids adding `salsa::Update` derives on non-Salsa crates ‚ÄĒ Salsa has a blanket `Update` impl for `Arc<T>`.
      - `file_content(path)` is an untracked helper; tracked dependencies flow through `File::bytes(db)` once a tracked query holds the handle. L2+ code should receive `File` handles rather than calling `file_content` directly.
      - `ignore` crate gitignore filtering only activates inside `.git`-rooted trees; standalone tempdir fixtures bypass it by design.
      - New files: `db.rs`, `ingest.rs`, `l1_queries.rs`, `manifest_patterns.rs`, `tests/l0_l1_queries.rs`, three fixture directories.
