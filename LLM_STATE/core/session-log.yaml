    - What didn't: The `include_str!` path `../../../defaults/ontology.yaml` crosses the crate boundary, which is fine for path/git deps (§9.5) but would require a rework if the crate is ever published to crates.io. The `thiserror` workspace dep is declared but no crate uses it yet — left in place for future crates.
