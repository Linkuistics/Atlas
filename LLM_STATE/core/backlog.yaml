tasks:
- id: hand-author-second-golden-for-merged-monorepo
  title: Hand-author synthetic second golden for cross-target validation
  category: eval
  status: blocked
  blocked_reason: 'dull''s dense pin coverage short-circuits all classify/subcarve decisions deterministically; the LLM path is never exercised at any depth, making meaningful golden authoring impossible. Resolution: either select a different second target that forces LLM calls, or thin dull''s pins sufficiently to exercise the LLM path.'
  dependencies: []
  description: |
    **Priority: MEDIUM.** Required for success criterion 6 (cross-target generalisation).

    **Context:** The merged monorepo target originally specified for this task is third-party and unavailable. Repurposed to use a synthetic second target from `~/Development/` — a multi-crate Cargo workspace structurally different from the dev-workspace root, sufficient to exercise cross-target stability.

    ## Target selection

    Pick a sibling repo under `~/Development/` that:
    - Is a multi-crate Cargo workspace (sub-carves differently from the top-level dev-workspace)
    - Has ≥ 10 components when Atlas sub-carves it
    - Is not the dev-workspace root itself (must exercise a different sub-carve path)

    Good candidates: any larger workspace-organised repo already present under `~/Development/` (e.g. Ravel, or another multi-crate workspace). Document the selection rationale in `notes.md`.

    ## Scope

    ### Golden

    - Hand-author `evaluation/goldens/<target-name>/components.golden.yaml` for the selected target.
    - Approximate size: tens of components (need not be hundreds — enough to stress the cross-target gap assertion).
    - `notes.md` documents: target selected, why it was chosen, and any boundary decisions that differ from what Atlas naturally produces.

    ### Cross-target validation

    - Run the tool against the synthetic target root; produce `evaluation/results/<date>-<target-name>.yaml`.
    - Compare metrics between the two goldens (dev-workspace and synthetic target):
      - Component coverage: both ≥ 0.9?
      - Spurious rate: both ≤ 0.1?
      - Kind accuracy: both ≥ 0.85?
      - Edge precision: both ≥ 0.8?
    - Gap between targets ≤ 5 percentage points on each axis (criterion 6).

    ### Iteration loop (if gap > 5pp)

    If the gap exceeds the bar, iterate on prompts, heuristics, or thresholds and re-run. Document changes in `evaluation/results/notes/<date>-iteration.md`.

    ## Out of scope

    - Ravel-Lite migration (separate tasks).
    - Performance optimisation.

    ## Exit criteria

    - Target selected and documented in `notes.md`.
    - Golden exists and passes all invariants.
    - Both goldens' metrics meet their individual targets AND cross-target gap ≤ 5pp.
    - Report HTML shows both targets with trend lines.
  results: |
    **2026-05-03 work phase: setup + bug-discovery, not authoring.** dull (`~/Development/dull/`) was selected and validated as the second target — multi-language monorepo (~90 components per the user's hand-curated `.atlas/components.overrides.yaml`, spanning Rust/C#/Dart/Flutter/TypeScript/Python/Docker), structurally distinct from `~/Development/`. A smoke run completed at depth 0 (`105 components, 0 LLM calls, 7min wall`), and a calibration run at depth 1 produced identical output. Pin coverage is so dense that all classifications and subcarves short-circuit deterministically, which is functionally correct but means the LLM path was not exercised in this phase.

    ## Three blockers discovered (all filed as new backlog tasks)

    1. **`atlas init` scaffolds invalid override files.** `subsystems.overrides.yaml` and `components.overrides.yaml` shipped with `schema_version` commented out, so `atlas validate-overrides` failed immediately on a freshly-init'd repo. Fixed in this phase: `crates/atlas-cli/src/init.rs` templates now include active `schema_version: 1`; new regression test `freshly_init_overrides_pass_validate_overrides` covers the validate path.

    2. **L3/L8 prompt-token coverage bug.** `defaults/prompts/classify.md` and `subcarve.md` interpolated only catalog tokens (`COMPONENT_KINDS`, `LIFECYCLE_SCOPES`); the per-candidate fields supplied by `build_llm_inputs` and `build_subcarve_inputs` had no matching `{{TOKEN}}` placeholders and were silently dropped by `prompt::render`. The HTTP backend therefore sent classify/subcarve prompts with no candidate context. Fixed in this phase: classify.md and subcarve.md now interpolate every per-call input; `build_llm_inputs` keys upper-cased to match; bidirectional token-coverage tests added in `l3_classify.rs` and `l8_recurse.rs`. Memory `l5-l6-tests-include-template-token-coverage-check` rewritten to reflect bidirectional L3/L8 + forward-only L5/L6 state.

    3. **Three layers of silent LLM-failure absorption.** When dull's HTTP-routed config omits `params.max_tokens`, every L5/L6/L8 call errors with `LlmError::Setup`, L5 swallows the error into a `SurfaceRecord { notes: ... }`, the cache `call_count` doesn't tick (errors short-circuit before increment), and the `ComponentEntry` schema has no surface field — so the user sees `0 LLM calls, 0 errors, 0 tokens` with no observable failure. Filed as three separate backlog tasks: `validate-params-max-tokens-at-config-load-for-http-providers`, `surface-l5-l6-l8-setup-errors-instead-of-silently-swallowing`, `reject-http-providers-for-stage1surface-and-stage2edges-in-backendrouter`.

    ## Other work landed in this phase

    - Memory entry on `AnthropicHttpBackend` corrected — the prior note claimed prompt caching was enabled; verified that no `cache_control` is set on the request body. Updated to reflect actual state.
    - Backlog task `enable-anthropic-prompt-caching-in-anthropichttpbackend` added with the prefix-cache design (split static prefix at `{{COMPONENT_KINDS}}`/`{{LIFECYCLE_SCOPES}}` boundaries, mark `cache_control: ephemeral`, ~1024-token minimum).
    - Backlog task `prompt-template-token-coverage-check-build-time` rewritten — inverse-direction failure mode is now first-class (was punted as "harmless"); priority bumped LOW → MEDIUM.

    ## Status of this task

    **Blocked**, not failed. The exit-criteria work (golden authoring + metric scoring + cross-target gap) is unblocked once the three discovered bugs land — the architectural prerequisites are now visible. Without them, depth-1+ runs on dull silently no-op on the LLM path; cross-target metrics would be meaningless. Recommend: do `validate-params-max-tokens-at-config-load-for-http-providers` (HIGH) first, then re-run dull at depth 1 with a real LLM budget (~$5–15) to populate L5 surfaces and L6 edges, then author the golden against actual outputs.

    ## Source-file changes left for analyse-work to commit

    - `crates/atlas-cli/src/init.rs` — schema_version active in both override templates.
    - `crates/atlas-cli/tests/init_cmd.rs` — new test `freshly_init_overrides_pass_validate_overrides`.
    - `defaults/prompts/classify.md` — added per-call `{{DIR_RELATIVE}}` / `{{RATIONALE_BUNDLE}}` / `{{MANIFEST_CONTENTS}}` interpolation.
    - `defaults/prompts/subcarve.md` — added per-call `{{COMPONENT_ID}}` / `{{COMPONENT_KIND}}` / `{{COMPONENT_PATHS}}` / `{{STRUCTURAL_SIGNALS}}` / `{{EDGE_NEIGHBOURHOOD}}` / `{{PIN_SUPPRESSED_CHILDREN}}` interpolation.
    - `crates/atlas-engine/src/l3_classify.rs` — `build_llm_inputs` keys upper-cased; bidirectional token-coverage test replacing the older forward-only render-check.
    - `crates/atlas-engine/src/l8_recurse.rs` — bidirectional token-coverage test for subcarve.

    dull's `.atlas/config.yaml` was also flipped from `claude-code/...` to `anthropic/...` defaults — that change lives outside this repo's tree.
- id: audit-atlas-cli-against-llm-friendly-cli-design-guide
  title: Audit Atlas CLI against LLM-friendly CLI design guide
  category: infra
  status: not_started
  dependencies: []
  description: |
    **Priority: MEDIUM.** Audit Atlas's CLI surface (`atlas`, all subcommands, all flags, all output formats) against the LLM-friendly CLI design guide at `~/Development/Ravel-Lite/defaults/fixed-memory/cli-tool-design.md`. Produce a punch-list of findings, prioritised by ROI per the guide's own ordering (structured output > examples in --help > actionable errors > flag consistency > exit codes > defaults > non-TTY behaviour > capabilities).

    ## Why

    Atlas is increasingly invoked by other agents (Ravel-Lite tooling, future Uplift/Redeveloper consumers, ad-hoc evaluation runs in subagents). Friction in the CLI surface — missing `--json`, prose-only output, vague errors, undocumented exit codes — costs tokens and produces flaky agent loops. The guide is opinionated and ordered by impact; follow its ordering rather than re-deriving it.

    ## Scope

    ### Discovery (read-only audit)

    Walk every code path that produces user-facing output:

    - `atlas --help` and every subcommand's `--help`.
    - `atlas index` — the primary data-producing command. Outputs three YAMLs + `llm-cache.json`. Stdout summary line. Stderr progress.
    - `atlas validate-overrides` — error reporting on malformed config / overrides.
    - `atlas init` — scaffold output.
    - `atlas --version` — version output, `--json` form?
    - Error paths: missing config, missing API key, invalid model string, budget exhausted, filesystem-required prompt routed to HTTP (the new `LlmError::Setup` from `BackendRouter`), `LlmError::Invocation`, `LlmError::Schema`.
    - Exit codes: which subcommands emit which codes for which conditions.

    For each surface, score against the guide's audit checklist (lines 208–252 of `cli-tool-design.md`). Each "no" is a finding.

    ### Output

    A markdown report at `evaluation/results/cli-audit-<date>.md` with:

    - One section per audit-checklist subheading (Output, Help, Errors, Conventions, Behaviour, Discoverability).
    - Each finding tagged `[blocker]` / `[high]` / `[medium]` / `[low]` per the guide's ROI ordering.
    - A prioritised remediation backlog at the bottom — each entry small enough to be its own follow-up backlog task.
    - Explicit "out of scope for v1" calls where appropriate (e.g. `atlas capabilities` is "optional but valuable" — don't block v1 sign-off on it).

    ### Out of scope

    - Implementing fixes. This task ends at the report; remediation work spawns separate backlog tasks per the report's recommendations.
    - Auditing Ravel-Lite or other linkuistics CLIs.
    - Reworking the YAML output schemas — they are separately governed by the components/externals/related-components contracts.

    ## Exit criteria

    - `evaluation/results/cli-audit-<date>.md` exists, walks every guide audit-checklist item against Atlas's current CLI, and identifies findings.
    - Each finding is prioritised per the guide's ROI ordering (structured output > examples > errors > consistency > etc.).
    - A short follow-up backlog of 3–8 remediation tasks is proposed in the report's final section. The user reviews and decides which to file.
    - Atlas v1 sign-off (`verify-atlas-v1-success-criteria-end-to-end`) cross-references the report so anyone reading the v1 announcement understands what is and is not LLM-friendly today.

    ## References

    - Guide: `~/Development/Ravel-Lite/defaults/fixed-memory/cli-tool-design.md`. Treat the audit checklist (lines 208–252) and the anti-patterns list (lines 256–268) as load-bearing.
    - The guide's own remediation order (lines 271–284) — "Add `--json` everywhere it's missing" first, "stabilise the JSON schema" second, "rewrite error messages" third — is the recommended order for any follow-up tasks the report spawns.
- id: verify-atlas-v1-success-criteria-end-to-end
  title: Verify Atlas v1 success criteria end-to-end
  category: eval
  status: not_started
  dependencies:
  - hand-author-second-golden-for-merged-monorepo
  description: |
    **Priority: HIGH.** Signs off v1.

    **Design reference:** §10.3 success criteria 1–6.

    ## Scope

    Execute each of the six v1 success criteria from §10.3 in order, document results in `evaluation/results/v1-signoff-<date>.md`:

    1. Run `atlas index /Users/antony/Development/` on a clean checkout. Assert coverage ≥ 0.9, spurious ≤ 0.1 against the golden.
    2. Re-run with no file changes. Assert 0 LLM calls (check the CLI's summary output) and byte-identical `components.yaml`.
    3. Touch one source file in one component. Re-run. Assert LLM call count equals exactly the affected component's `surface_of` plus its edge-neighbour count for edges. Log the numbers for future reference.
    4. Add a pin to `components.overrides.yaml` for one component (e.g., pin `role: my-custom-role`). Delete `components.yaml`. Re-run. Assert the pin appears in the regenerated `components.yaml` without human intervention.
    5. Run Ravel-Lite's `related-components` workflow against Atlas-produced YAMLs. Assert it runs to completion without schema errors.
    6. Run against the synthetic second target selected and evaluated in `hand-author-second-golden-for-merged-monorepo`. Assert coverage/spurious/kind/edge metrics are within 5 percentage points of the `~/Development/` run on each axis.

    ### Cross-plan dependency

    Criterion 5 cannot run until **Ravel-Lite's M5 migration** (`Migration M5: consume Atlas via atlas-index` in Ravel-Lite's backlog, formerly `ravel-lite-migration-m5-consume-atlas-via-atlas-index` in Atlas's) is complete. M5 lives in Ravel-Lite's plan, not Atlas's, so it cannot be expressed as a structural dependency here. Before starting this task, confirm M5 is `done` in Ravel-Lite by running:

    ```
    ravel-lite state backlog list /Users/antony/Development/Ravel-Lite/LLM_STATE/core --category migration
    ```

    If M5 is not done, criterion 5 must be skipped and recorded as "blocked on Ravel-Lite M5" in the sign-off report; the other five criteria can still proceed.

    ### Report

    - `evaluation/results/v1-signoff-<date>.md` contains each criterion, the commands run, the measured values, and pass/fail.
    - On any failure, the criterion lists the specific gap and what next steps would close it.

    ### Follow-up backlog

    - If any criterion fails by a wide margin, open a new backlog task to investigate. Do not silently move on.

    ## Out of scope

    - Everything in §10.2 (deferred).

    ## Exit criteria

    - All six criteria pass or have documented follow-up tasks (criterion 5 may be deferred pending Ravel-Lite M5).
    - Sign-off report committed to the Atlas repo.
    - An announcement-ready short summary written (optional) as `README-v1.md` documenting what Atlas v1 does and does not do.
- id: map-reduce-llm-architecture-with-backend-routing-for-context-light-analysis
  title: L8 map/reduce redesign and L3 HTTP routing (AnthropicHttpBackend already complete)
  category: feature
  status: done
  dependencies: []
  description: |
    **Priority: MEDIUM (HIGH once spike unblocks).** Foundational architectural shift for Atlas's LLM strategy. Replaces the per-component agentic-Claude-Code model with a routed two-backend design: plain Anthropic HTTP for fixed-shape classification queries, agentic Claude Code only for genuinely exploratory work. Combines this with map/reduce for L8 subcarve so a component with N immediate sub-directories costs N small parallel calls instead of one long-context-rotted agent run.

    ## Context

    Atlas's current LLM strategy:

    - Every L3, L5, and L8 prompt runs through `ClaudeCodeBackend`, which spawns a Claude Code subprocess with full tool access for each call.
    - One agent call covers the entire scope of the prompt (one component for L5, one whole subcarve decision for L8).
    - A single L8 subcarve on a real monorepo takes >15 min in observed practice (agent-progress sub-line shows extensive exploratory reads).

    Three structural problems:

    1. **Context rot.** As the agent reads files within one call, its context grows monotonically; attention smears, decisions degrade, latency climbs.
    2. **No reuse across components.** Two Rust crates with near-identical evidence each pay full agent-call cost. There is no caching across components because the per-call prompt is so large that no two prompts are byte-equal.
    3. **No parallelism.** Per-iteration loops are serial: `iter 0 · subcarve 1/74` runs to completion before 2/74 starts.

    The diagnostic lever is the agent-progress sub-line shipped in v1.2.0: when it shows the agent reading hundreds of files for one decision, the call is doing work that small fixed-shape prompts could each answer in seconds.

    ## Goal

    Re-architect Atlas's LLM dispatch with the right scope per prompt — narrow where the question is genuinely local, broad where it is genuinely cross-cutting:

    - **Per-candidate / per-component classification prompts** (L3 `is_component`, L8 per-subdir verdict): run on a plain Anthropic HTTP backend with prompt caching and structured JSON output. No subprocess, no tool use, sub-second per call.
    - **Per-component surface extraction** (L5 `Stage1Surface`): keep agentic — extracting an API surface needs to read source files, but the scope is bounded to one component's tree.
    - **Cross-component edge synthesis** (L6 `Stage2Edges`): **stays cross-component, agentic, and broadly contextual.** This is where Atlas earns its keep on tech-debt-heavy codebases — components are linked through protocols, schemas, formats, APIs, communication patterns, and endpoints, none of which are visible in any single component's surface alone. Narrowing this prompt would defeat Atlas's core value. Map/reduce simplification applies *only* to prompts whose answer is a property of one candidate; L6 synthesises a relation across many.
    - **L8 subcarve becomes map/reduce:** one HTTP call per immediate subdirectory of the component being carved (the "map"); deterministic Rust assembles per-subdir verdicts into the subcarve plan (the "reduce"). Map calls run in parallel under a bounded concurrency limit.

    Target: a 74-subcarve first-iteration on a real monorepo completes in **≤ 5 min** (current state: >>15 min), without sacrificing edge-detection quality at L6.

    ## Scope

    ### Backend routing

    - `LlmBackend` trait gains routing semantics — either a `BackendRouter` decorator that dispatches by `PromptId`, or a per-`PromptId` policy table consulted by the engine before calling.
    - Default routing reflects the prompt's *scope*, not just its model:
      - `Classify` (per-candidate, local) → HTTP backend.
      - `Subcarve` (per-subdir, local) → HTTP backend with map/reduce.
      - `Stage1Surface` (per-component, bounded local) → Claude Code backend, scoped to one component tree.
      - `Stage2Edges` (cross-component, global) → Claude Code backend, full multi-component context. This is the layer that finds protocol/schema/API links and must see surfaces across components together.
    - Configurable via CLI / env for testing, but the defaults encode the design.

    ### Plain HTTP backend

    - New `AnthropicHttpBackend` in `crates/atlas-llm/`. Uses the Anthropic Rust SDK (or raw `reqwest` + `serde_json`). Reads `ANTHROPIC_API_KEY`.
    - **Prompt caching enabled** — system prompt + ontology + component-kinds vocabulary become a `cache_control` block, so the static prefix is paid once per ~5 minutes across all calls.
    - **Structured JSON output** validated against the existing per-prompt JSON schemas in `crates/atlas-cli/src/prompts.rs`.

    ### L8 subcarve map/reduce

    - Replace today's "one agent call asks 'what are the sub-components of X'" with:
      - Map: for each immediate sub-directory of X, build a prompt containing only that subdir's name, listing of top-level entries, and primary manifest snippet (~500 tokens). Fire one HTTP call. Output: `{ is_component, kind, role, evidence }`.
      - Reduce: deterministic — collect verdicts, build the `SubcarvePlan`. No second LLM call.
    - Bounded concurrency executor (start with 8-16 in flight; tune empirically) so 74 map calls parallelise safely.

    ### Cache compatibility

    - Existing `llm-cache.json` is content-addressed — small map prompts produce small, deterministic cache keys, which is what we want. Verify the cache fingerprint includes the *post-truncation* prompt body so behaviour is reproducible.
    - A monorepo with N nearly-identical Rust crates should see most of those N L3 calls collapse to **one cache entry on first run** because the sanitised prompt is byte-equal. Quantify the hit-rate change.

    ### Per-call context budget

    - Each map call has a hard input cap (e.g., 4 KB pre-prompt content). Request builder enforces it deterministically (top-N entries by lexicographic sort, then "this is a sample" suffix). Keeps prompts cheap and reproducible.

    ### Execution / concurrency

    - Add a Tokio runtime in atlas-cli (or use the existing one if Claude Code's backend already drives one) and a bounded `mpsc` / `Semaphore` to gate concurrent HTTP calls.
    - Errors per map-call are isolated: one failure marks one subdir's verdict as `unknown` rather than poisoning the whole subcarve. Plan-assembly degrades gracefully.

    ### Goldens / eval

    - Re-run dev-workspace and the synthetic-second target through the new pipeline. Update goldens only where structural divergence is intentional (e.g., the map-step is more granular than the agent-step would have been).
    - Record before/after wall-time and accuracy in `evaluation/results/`.

    ## Risks and unknowns

    - **Cross-cutting reasoning loss within map calls.** A map-step subagent looking at `crates/foo/src/io/` doesn't see `crates/foo/src/db/`. For L8 per-subdir verdicts this is the right shape; for L3 verify the existing prompt doesn't lean on cross-file context the new shape can't supply. Spike feedback feeds this.
    - **L6 edge-synthesis quality must not regress.** The architectural change narrows L3 and L8 specifically because their answer is local; L6 has to remain *broader*, not narrower. A regression here would mean Atlas misses the cross-component links (shared protocols, schemas, REST endpoints, message-bus topics) that motivate the project. Track L6's `edge_precision` and `edge_recall` against the goldens through the conversion and treat any drop ≥ 2pp as a blocker.
    - **API rate limits.** 74 concurrent calls × multiple iterations could hit per-minute limits on the Anthropic API. Bounded concurrency is the lever; calibrate against published limits.
    - **`llm-cache.json` byte-identity.** With map/reduce the cache file shape may change (smaller entries, more of them). Verify `--dry-run` re-runs are still byte-identical post-conversion.
    - **Mixed-backend `LlmFingerprint`.** Today the fingerprint encodes one backend per run. The router needs to merge two backends' fingerprints into a stable composite, or each `Classification` records the backend used.

    ## Out of scope

    - L5 surface and L6 edges conversion — keep agentic, address in a follow-on if/when needed.
    - Replacing Claude Code itself; `ClaudeCodeBackend` stays for the genuinely exploratory prompts.
    - A user-pluggable backend system (Ollama / OpenAI / etc.) — useful but a larger surface.

    ## Exit criteria

    - `AnthropicHttpBackend` lands and is wired as the default for `Classify` and `Subcarve` prompt ids.
    - L8 subcarve runs in map/reduce mode with bounded concurrency.
    - Real-monorepo first-iteration L8 wall-time **≤ 5 min** (current >>15 min) on the user's target.
    - `kind_accuracy` against the dev-workspace golden is within 2pp of the pre-conversion baseline.
    - `--dry-run` re-run produces byte-identical outputs to the prior run.
    - Documentation: a section in the design spec (`docs/superpowers/specs/`) describing the routing rules, map/reduce shape, and concurrency model.
  results: |
    **2026-05-04 work phase: L8 map/reduce structural redesign landed.** The engine no longer renders `subcarve.md` for live LLM calls; `compute_decision` routes the `Recurse | AskLlm` branch through `map_reduce_subcarve`, which enumerates each component's immediate sub-directories and asks the existing L3 cascade (`is_component`) per sub-dir, then deterministically reduces the per-sub-dir verdicts. Modularity hint becomes a logged prior, not a gate. AnthropicHttpBackend was already complete; its remaining wiring (route Classify by config) is unchanged config-only work.

    ## Concrete deliverables

    - **`crates/atlas-engine/src/l8_recurse.rs`** — `ask_llm_for_subcarve` replaced by `map_reduce_subcarve`. Helpers added: `enumerate_immediate_subdirs` (walks `workspace.files()` + `git_boundary_dirs` for first-component-strictly-inside paths), `pin_suppressed_keys` / `is_pin_suppressed` (raw + slug match), `build_rationale`. Removed: `build_subcarve_inputs`, `parse_subcarve_response`, `format_seam_density`, `value_kind`, `EMBEDDED_SUBCARVE_PROMPT` const.
    - **`crates/atlas-engine/src/l3_classify.rs::classify_via_llm`** — flipped from `db.backend().call(&request)` to `db.call_llm_cached(&request)`. Required to maintain the no-op-re-run zero-LLM-call contract once L8's map step started calling `is_component` N times per component.
    - **`crates/atlas-engine/src/lib.rs`** — `EMBEDDED_SUBCARVE_PROMPT` re-export removed.
    - **`crates/atlas-engine/src/prompt_token_coverage.rs`** — `subcarve.md` row removed from the bidirectional matrix with a rationale comment.
    - **`crates/atlas-engine/tests/l7_l8_fixedpoint.rs`** — `ScriptedBackend` integration tests rewritten to drive Classify (not Subcarve). New shape: backend returns `is_boundary: true`, the engine enumerates `lib/src` from the filesystem walk, back-edge picks it up. The `max_depth_one_caps_recursion_for_library_children` test renamed to `max_depth_zero_blocks_every_sub_carve` to reflect what it actually exercises.
    - **`crates/atlas-engine/src/fixedpoint.rs`** — `iteration_counter_reflects_number_of_productive_rounds` rewritten with an `AlwaysBoundaryBackend` mini-backend that drives the new map/reduce path. Removed: `PathologicalBackend` and the `pathological_backend_emits_iter_start_for_each_iteration_until_cap` test — its premise (LLM proposing novel sub_dirs each round) cannot occur under map/reduce, where sub_dirs are filesystem-enumerated.
    - **`docs/superpowers/specs/2026-05-04-l8-map-reduce-design.md`** — design spec covering the redesign, the cache routing fix, and explicit deferred items.
    - **`defaults/prompts/subcarve.md`** — kept in `EMBEDDED_PROMPTS` so `template_sha` stays stable through this release; deletion slated post-release.

    ## What works

    - `cargo test --workspace` — all green (154 engine unit tests, 65 atlas-cli tests, 41 fixedpoint tests, 17 pipeline integration tests, the bidirectional prompt-token-coverage matrix).
    - `cargo clippy --workspace --tests -- -D warnings` — clean.
    - `pipeline_integration::second_run_on_unchanged_fixture_is_byte_identical` and `pipeline_integration::llm_cache_json_is_written_and_read_across_invocations` continue to pass — the L3 cache fix preserves the no-op-re-run zero-LLM-call contract.

    ## What did not work this phase

    - **Live smoke run on dull stalled at 17 min.** A `--dry-run --no-budget --max-depth 0` invocation against `~/Development/dull/` was killed at 17 min wall when the stack-sample showed it was making live ClaudeCodeBackend calls inside `compute_decision → seam_density → all_proposed_edges → surface_of → call_cached → ClaudeCodeBackend::call` — the engine's `LlmResponseCache` was missing, almost certainly because the on-disk cache fingerprint no longer matches the live `claude --version` output. This is *not* a regression in the L8 redesign; it's an existing pre-condition: the engine's `compute_decision` unconditionally evaluates structural signals (`seam_density`, `modularity_hint`, `cliques`) BEFORE the policy decides, which transitively pulls L5/L6 LLM calls even for components whose policy will return `Stop`. Filed as a separate backlog task: `skip-l8-structural-signal-computation-when-policy-will-stop`.
    - **No measured wall-time vs the >>15-min baseline.** Cannot confirm the ≤5-min exit criterion without a clean LLM budget on the dull (or another monorepo) target. Deferred to the eval re-run that's already on the eval-criterion task.

    ## Follow-ups filed in this phase

    1. **`bounded-concurrency-for-l8-map-step-rayon-or-tokio-semaphore`** — parallelise the per-sub-dir map calls. The infrastructure (Salsa parallel queries, `LlmResponseCache` thread-safety) is already in place; this is the obvious next perf step.
    2. **`skip-l8-structural-signal-computation-when-policy-will-stop`** — short-circuit the universal-depth and leaf-like-kind cases before computing structural signals. Independent of the map/reduce redesign but surfaced by it.

    ## Status of this task

    **Done** for the architectural redesign + L3 cache fix. The remaining exit-criteria items (bounded concurrency, ≤5-min wall-time on a real monorepo, kind_accuracy within 2pp on the dev-workspace golden, `--dry-run` byte-identity at scale) are filed as the two follow-up tasks above plus the eval-side criteria already on `verify-atlas-v1-success-criteria-end-to-end`. Marking `done` here unblocks the criterion-3 re-run on v1 sign-off; concurrency lands as a perf follow-up rather than gating the v1 release.

    ## Source-file changes left for analyse-work to commit

    All edits are listed in "Concrete deliverables" above plus the new spec at `docs/superpowers/specs/2026-05-04-l8-map-reduce-design.md`. No `.atlas/` outputs, no generated artefacts. `dull/.atlas/config.yaml` still defaults to `claude-code/...`; flipping `operations.classify.model: anthropic/...` to drive the HTTP path is a config-only edit on the user side, not in this repo's tree.
