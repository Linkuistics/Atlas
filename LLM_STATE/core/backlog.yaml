- id: filesystem-tool-use-loop-for-http-llm-backends-provider-agnostic
  title: Filesystem tool-use loop for HTTP LLM backends (provider-agnostic)
  category: feature
  status: not_started
  dependencies: []
  description: |
    **Priority: MEDIUM.** Add a generic filesystem-tool-use loop to `AnthropicHttpBackend` and `OpenAiHttpBackend` so HTTP providers can service `Stage1Surface` and `Stage2Edges`. Once landed, the routing rejection in `BackendRouter` (added in `reject-http-providers-for-stage1surface-and-stage2edges-in-backendrouter`) loosens to a per-backend capability check rather than an unconditional ban on `provider in {anthropic, openai}`.

    ## Context

    Today, `Stage1Surface` and `Stage2Edges` only run on subprocess backends (`claude-code`, `codex`) because their rendered prompts ship no file content — surface and edge extraction need to read source. Subprocess backends provide that filesystem access via the upstream agent's built-in tools (Read, Grep, Glob, Bash). HTTP backends carry only the rendered prompt text, so they cannot read files and must currently be rejected for these prompt ids.

    Both Anthropic Messages API and OpenAI Chat Completions support **tool use / function calling** as a first-class part of the wire protocol. With a tool-use loop driven by Atlas, an HTTP backend can delegate filesystem reads back to the host process and produce surfaces/edges with the same fidelity as a subprocess backend — at lower cost (HTTP is cheaper per call than full agent sessions), with prompt caching benefits, and against any provider that speaks the protocol (Anthropic, OpenAI, OpenRouter, Vertex, Bedrock, etc.).

    User-stated motivation: "We could use the http backends if we provided the tools. I think it could be generally useful, not only here but for other projects as well." Design with reusability in mind — the tool-use loop should be liftable to a separate crate (e.g. `linkuistics/llm-tools` or `atlas-llm-tools`) once it has two consumers.

    ## Scope

    ### Tool set (initial)

    Minimum viable filesystem tool surface, mirroring what the agentic backends use:

    - `read_file(path: str, max_bytes: int = 64KiB) -> { content: str, truncated: bool }`
    - `glob(pattern: str, root: str = "<workspace>") -> { paths: [str] }`
    - `grep(pattern: str, paths: [str] | str, max_matches: int = 100) -> { matches: [{path, line, text}] }`
    - `list_dir(path: str) -> { entries: [{name, kind: "file" | "dir"}] }`

    Each tool's input/output JSON schemas live in one place and are exposed in both Anthropic and OpenAI tool-definition shapes via small adapter functions.

    ### Loop semantics

    1. Initial request: prompt + `tools: [...]` definitions.
    2. Receive response. If `stop_reason: "tool_use"` (Anthropic) or `finish_reason: "tool_calls"` (OpenAI), execute each tool call against the host filesystem, append `tool_result` / `tool` messages, send next turn.
    3. Repeat until `stop_reason: "end_turn"` or `finish_reason: "stop"`, or until a hard turn cap (e.g. 25) trips an `LlmError::Invocation`.
    4. Final assistant text is the structured-JSON response — same validation path as today via existing `validate_response`.

    ### Sandboxing

    Tool implementations must restrict filesystem access to a configured root (the Atlas workspace path). Path normalisation rejects `..` escapes and absolute paths outside the root. No write tools — read-only. `grep` and `glob` re-use Atlas's existing `ignore`-crate-aware traversal so `.gitignore` filtering applies (subprocess backends already inherit this from the agent host's defaults).

    ### Configurable budget

    - `max_turns` (default 25): maximum back-and-forth iterations per call.
    - `max_tool_calls_per_turn` (default 10): caps fan-out within one turn.
    - `max_total_bytes_read` (default 1 MiB per call): caps cumulative bytes returned via `read_file` across the whole loop.

    Exhausting any cap returns `LlmError::Invocation` with a clear message; the call is recorded as an error in the existing budget/sentinel stack.

    ### Provider adapters

    - **AnthropicHttpBackend.** Tools are sent under `tools: [{name, description, input_schema}, ...]`; tool results returned as `content: [{type: "tool_result", tool_use_id, content: <json>}]` blocks in the next user message.
    - **OpenAiHttpBackend.** Tools sent under `tools: [{type: "function", function: {name, description, parameters}}, ...]`; tool results returned as `{role: "tool", tool_call_id, content: <json-string>}` messages.
    - Wire-format differences absorbed by per-provider adapters; the engine-facing surface (the `LlmBackend::call` impl) is unchanged.

    ### Reusability shape

    Aim for a clean internal split so the tool-use loop and the tool implementations can be lifted to a sibling crate later:

    - `tool_use::loop::run<Provider, Tools>(provider: &Provider, tools: &Tools, messages, budget) -> Result<String>` — generic over provider adapter and tool implementer traits.
    - `tool_use::filesystem::FilesystemTools` — the concrete read-only filesystem tool set.
    - Atlas's HTTP backends become thin wrappers: parse Atlas's `LlmRequest`, build messages, call `tool_use::loop::run`, validate the final JSON response.

    Don't over-engineer — keep it inline in `atlas-llm` until a second consumer materialises, but design the module boundary so extraction is mechanical.

    ### Cache fingerprint

    `LlmFingerprint::backend_version` must encode "tool-use enabled" + tool-set version (a SHA over the tool definitions). Two runs with different tool sets are not interchangeable; the response cache must invalidate.

    ### Routing relaxation

    Once landed, `reject_http_for_filesystem_required_prompt` in `crates/atlas-llm/src/router.rs` becomes a per-backend capability check. Each backend declares whether it supplies filesystem tools (`fn supports_filesystem_tools(&self) -> bool`); the router asks the resolved backend instead of hard-coding HTTP-provider names.

    ## Cross-references

    - `enable-anthropic-prompt-caching-in-anthropichttpbackend` — caching applies to the static prefix (system + tool definitions); compose the two features so cached prefix benefits stack across tool-use turns.
    - `add-openrouter-as-an-llm-provider` — OpenRouter speaks OpenAI tool-call format verbatim; the OpenAI adapter covers OpenRouter for free.
    - `map-reduce-llm-architecture-with-backend-routing-for-context-light-analysis` — Stage1Surface stays "needs filesystem access" in that design; tool-use HTTP backends become a third option alongside `claude-code` and `codex`.
    - Memory: `backendrouter-rejects-http-providers-for-stage1surface-and-stage2edges` — the rejection's "future relaxation" path points at this task.

    ## Risks

    - **Determinism.** Tool-use loops can take different code paths across runs (the model may pick different files). Cache key remains canonical-input-based; cached-response soundness depends on the fingerprint encoding "tools enabled". Document this; consider a stricter fingerprint that includes tool-set hash.
    - **Cost.** Each round-trip adds prompt + response tokens. A surface extraction that took one agent call may take 5–10 HTTP turns. Budget caps are essential; profile against the dev-workspace before promoting from experimental.
    - **Sandboxing soundness.** Path-traversal escapes via symlinks, `..`, Unicode normalisation, etc. Use `Path::canonicalize` against the workspace root; reject anything outside.
    - **Streaming.** v1 implementation can be non-streaming (`reqwest::blocking`) like the current HTTP backends. Streaming tool-use is a follow-up.

    ## Out of scope

    - Write tools (Edit, Write, Bash). Atlas is read-only against the target codebase by design.
    - Streaming. Block-mode parity with current HTTP backends.
    - Lifting to a separate crate. Design for it; defer until two consumers.

    ## Exit criteria

    - `AnthropicHttpBackend::call` and `OpenAiHttpBackend::call` execute tool-use loops when configured for `Stage1Surface` or `Stage2Edges`.
    - Read-only filesystem tools available: `read_file`, `glob`, `grep`, `list_dir`. Sandboxed to a configured root.
    - `LlmBackend::supports_filesystem_tools(&self) -> bool` declared; default `false` for current backends, `true` for the new tool-using HTTP path; routing layer asks the trait method instead of hard-coding providers.
    - Configuration: `.atlas/config.yaml` `params.tools.enabled: true` (or similar) opts a per-operation HTTP backend into tool-use mode. Default off so existing configs are unchanged.
    - Cache fingerprint encodes "tools enabled" + tool-set hash; existing zero-LLM-call no-op re-runs remain byte-identical.
    - Live end-to-end: `atlas index ~/Development/dull/` with `surface` routed to `anthropic/...` (tools enabled) produces non-empty surfaces and edge proposals; metrics within 5pp of the same run on `claude-code/...`.
    - Memory note added documenting the design and the routing-relaxation that follows.
- id: skip-l8-structural-signal-computation-when-policy-will-stop
  title: Skip L8 structural-signal computation when policy will Stop
  category: feature
  status: not_started
  dependencies: []
  description: |
    **Priority: LOW (perf polish).** `l8_recurse::compute_decision` unconditionally computes `seam_density(db, id)`, `modularity_hint(db, id)`, and `cliques_touching_id(db, id)` BEFORE the policy decides. For components whose policy decision is `Stop` (the universal depth guard, all leaf-like kinds, externals), the structural signals are wasted compute — and worse, `seam_density` transitively pulls L5 `surface_of` LLM calls via the `edge_graph` → `all_proposed_edges` chain.

    Surfaced during the L8 map/reduce smoke run on `~/Development/dull/`: a `--max-depth 0 --dry-run` invocation made live ClaudeCodeBackend calls because every component's `compute_decision` eagerly evaluated `seam_density` even though the policy was about to return `Stop`.

    ## Fix

    Reorder `compute_decision` so the universal-depth guard and the kind-based stop check fire before any structural signal is read:

    ```rust
    let kind = ComponentKind::parse(&entry.kind).unwrap_or(ComponentKind::NonComponent);
    let current_depth = compute_depth(&components, id);
    let max_depth = db.max_depth();

    if current_depth >= max_depth {
        return SubcarveDecision::stopped(...);
    }
    if let PolicyDecision::Stop = decide_kind_only(kind) {
        return SubcarveDecision::stopped(...);
    }

    // only now: compute structural signals
    let seam_density_value = ...;
    ```

    `decide_kind_only(kind)` is the kind-arm of the policy that doesn't require structural signals — it stops on `RustCli`, `Spec`, `External`, etc. without looking at `modularity_hint`.

    ## Exit criteria

    - `compute_decision` skips `seam_density` / `modularity_hint` / `cliques_touching_id` for components whose policy is `Stop`.
    - A regression test asserts that a fixture with all-pinned-CLI components produces zero L5 `surface_of` calls under `--max-depth 0`.
    - Wall-time on dull at `--max-depth 0` drops to filesystem-walk-only (single-digit minutes vs the current many-minutes when the cache is cold).

    ## Out of scope

    - Restructuring the policy itself.
    - Caching structural signals more aggressively.
- id: bounded-concurrency-for-l8-map-step-rayon-or-tokio-semaphore
  title: Bounded concurrency for L8 map step (rayon or Tokio + Semaphore)
  category: feature
  status: not_started
  dependencies: []
  description: |
    **Priority: MEDIUM.** Follow-up to the L8 map/reduce redesign (`map-reduce-llm-architecture-with-backend-routing-for-context-light-analysis`). The map step in `l8_recurse::map_reduce_subcarve` currently calls `is_component(db, workspace, dir)` in a serial `for` loop. With HTTP-routed Classify, each map call is ~1s; on a 74-component first iteration with say 10 immediate sub-dirs each, that's ~12 min serial.

    ## Why

    Map calls are independent and idempotent. Salsa 0.26 supports parallel tracked-query execution, and `LlmResponseCache` is already thread-safe via `AtomicU64` CAS. The infrastructure is ready — what's missing is the parallel iterator at the call site.

    ## Scope

    - **Pick a runtime.** Rayon's parallel iterator is the simplest fit because L8 is a sync function called from a sync fixedpoint driver; Tokio + Semaphore is alternative but pulls async into a currently-sync layer.
    - **Bound the concurrency.** Start with 8 in flight; expose as `FixedpointConfig.map_concurrency` so the CLI can tune. Avoid hammering Anthropic / OpenAI rate limits.
    - **Preserve determinism.** Output `sub_dirs` ordering must match the serial path. Sort the verdicts deterministically before assembling the final `Vec<PathBuf>`.
    - **Error isolation.** A panic in one map call must not poison sibling calls. Capture per-subdir errors into the `unknown_classification` path that already exists in L3 — same fallback behaviour as today, just wrapped.

    ## Exit criteria

    - `map_reduce_subcarve` runs N parallel `is_component` calls bounded by `map_concurrency`.
    - Wall-time on dull at depth 1 with a real LLM budget is ≤ 5 min on a freshly-uncached run (the `map-reduce-llm-architecture-...` task's exit criterion).
    - All existing engine tests still pass (no flake from concurrent Salsa access).
    - A new test demonstrates that the same fixture produces byte-identical `sub_dirs` under `map_concurrency = 1` and `map_concurrency = 8`.

    ## Cross-references

    - Memory: `tokencounter-charge-uses-cas-loop-on-atomicu64` — the CAS lock-free counter is what makes this safe today.
    - Spec: `docs/superpowers/specs/2026-05-04-l8-map-reduce-design.md` § Concurrency.
- id: prompt-template-token-coverage-check-at-build-time
  title: Prompt template token-coverage check at build time
  category: infra
  status: not_started
  dependencies: []
  description: |
    **Priority: MEDIUM.** Move the prompt template token-coverage check from test time to build time so mismatches are caught by `cargo build` rather than only when the test suite runs.

    ## Context

    The current bidirectional token-coverage check lives in `crates/atlas-engine/src/prompt_token_coverage.rs` as a runtime test. It covers three prompts (L3 classify, L5 surface, L6 edges) in both directions:

    - **Forward** — every `{{TOKEN}}` in the template maps to a `build_inputs` key.
    - **Inverse** — every `build_inputs` key is referenced in the template; exceptions declared in `Case::cache_only_keys`.

    This check catches template drift only when tests run. The same drift caused a silent data-drop bug (classify/subcarve prompts with no candidate context) that went undetected across multiple development cycles before the test was added.

    Additionally, `collect_template_tokens` is duplicated across three test modules. A fourth prompt layer will introduce a fourth copy.

    ## Scope

    ### Build-time check (primary goal)

    - Add a `build.rs` step (or a `proc-macro`-backed const-eval approach) that reads the embedded prompt templates and validates bidirectional token coverage at compile time.
    - Both forward and inverse directions must be included — the inverse direction is the load-bearing one (it catches silent data-drops).
    - `cache_only_keys` exceptions must be declarable at the call site, not only in test code.

    ### De-duplication

    - Extract `collect_template_tokens` into a shared helper (e.g. `atlas-engine/src/prompt_token_coverage.rs` as a `pub(crate)` utility, or a new `atlas-engine-macros` crate).
    - Remove the three duplicated inline copies in the individual test modules.

    ## Exit criteria

    - `cargo build --workspace` fails fast when a `{{TOKEN}}` in a prompt template has no matching `build_inputs` key, or vice versa (excluding declared `cache_only_keys`).
    - Existing three-layer bidirectional matrix passes under the new mechanism.
    - `collect_template_tokens` duplication eliminated.
    - No remaining test-only coverage matrices that the build-time check could replace.

    ## References

    - Memory: `l5-l6-tests-include-template-token-coverage-check` — current runtime coverage shape and `cache_only_keys` mechanism.
    - `crates/atlas-engine/src/prompt_token_coverage.rs` — current implementation to supersede or augment.
