- id: ravel-lite-migration-m5-consume-atlas-via-atlas-index
  title: 'Ravel-Lite migration M5: consume Atlas via atlas-index'
  category: migration
  status: not_started
  dependencies:
  - implement-atlas-index-crate-yaml-schemas-and-rename-match
  - ravel-lite-migration-m2-switch-to-atlas-component-ontology-crate
  description: |
    **Priority: MEDIUM.** Completes the migration; single `related-components.yaml` in the ecosystem.

    **Design reference:** §9.4 M5.

    ## Scope

    ### Ravel-Lite depends on atlas-index

    - Add `atlas-index = { path = "../Atlas/crates/atlas-index" }` to Ravel-Lite's Cargo.toml.

    ### Refactor projects.rs

    - Ravel-Lite's `ProjectsCatalog` becomes a thin wrapper over Atlas's `ComponentsFile`.
    - `find_by_name(name)` searches `atlas_index::ComponentsFile.components` by `id`.
    - Only *internal* components are valid plan targets — external components (from `external-components.yaml`) are rejected with a helpful error per the user's earlier decision.
    - Existing callers' API preserved as much as possible; public signatures remain backward-compatible where practical (change the import paths but keep the verbs).

    ### Remove Stage 1/2 prompt copies

    - Delete `Ravel-Lite/defaults/discover-stage1.md` and `discover-stage2.md`.
    - Ravel-Lite loads prompts from Atlas's path: either via an env var pointing at Atlas's checkout, or via a helper in `atlas-index` that returns the canonical prompt paths.
    - Decision: `atlas-index` exposes `prompts_dir() -> PathBuf` helper returning the Atlas-shipped prompts directory. Ravel-Lite's `discover` phase reads from there.

    ### CLI surface

    - `ravel-lite state related-components ...` remains as a thin pass-through — the CLI is kept but internally routes through `atlas-index` verbs.
    - `ravel-lite state projects ...` similarly — the verbs still exist but operate on Atlas-produced `components.yaml` via `atlas-index`.
    - Existing tests for these CLI surfaces continue to pass.

    ### Tests

    - End-to-end test: run a discover loop on Ravel-Lite itself using Atlas-produced YAMLs as the project catalog. Verify Stage 1/Stage 2 outputs are identical (modulo the project→component rename) to pre-migration outputs.
    - Compatibility: a Ravel-Lite user who already has a `projects.yaml` at the old path receives a clear migration error directing them to run Atlas.

    ## Out of scope

    - Atlas-side changes (earlier tasks).
    - Performance optimisation.

    ## Exit criteria

    - A single `related-components.yaml` exists in the ecosystem — Ravel-Lite no longer writes its own.
    - `Ravel-Lite/defaults/discover-stage1.md` and `discover-stage2.md` do not exist.
    - Ravel-Lite's test suite passes end to end.
    - `ravel-lite run` on any plan directory can discover and use components produced by Atlas without any hand-authored `projects.yaml`.
- id: verify-atlas-v1-success-criteria-end-to-end
  title: Verify Atlas v1 success criteria end-to-end
  category: eval
  status: not_started
  dependencies:
  - hand-author-second-golden-for-merged-monorepo
  - ravel-lite-migration-m5-consume-atlas-via-atlas-index
  description: |
    **Priority: HIGH.** Signs off v1.

    **Design reference:** §10.3 success criteria 1–6.

    ## Scope

    Execute each of the six v1 success criteria from §10.3 in order, document results in `evaluation/results/v1-signoff-<date>.md`:

    1. Run `atlas index /Users/antony/Development/` on a clean checkout. Assert coverage ≥ 0.9, spurious ≤ 0.1 against the golden.
    2. Re-run with no file changes. Assert 0 LLM calls (check the CLI's summary output) and byte-identical `components.yaml`.
    3. Touch one source file in one component. Re-run. Assert LLM call count equals exactly the affected component's `surface_of` plus its edge-neighbour count for edges. Log the numbers for future reference.
    4. Add a pin to `components.overrides.yaml` for one component (e.g., pin `role: my-custom-role`). Delete `components.yaml`. Re-run. Assert the pin appears in the regenerated `components.yaml` without human intervention.
    5. Run Ravel-Lite's `related-components` workflow against Atlas-produced YAMLs. Assert it runs to completion without schema errors.
    6. Run against the merged monorepo. Assert coverage/spurious/kind/edge metrics are within 5 percentage points of the `~/Development/` run on each axis.

    ### Report

    - `evaluation/results/v1-signoff-<date>.md` contains each criterion, the commands run, the measured values, and pass/fail.
    - On any failure, the criterion lists the specific gap and what next steps would close it.

    ### Follow-up backlog

    - If any criterion fails by a wide margin, open a new backlog task to investigate. Do not silently move on.

    ## Out of scope

    - Everything in §10.2 (deferred).

    ## Exit criteria

    - All six criteria pass or have documented follow-up tasks.
    - Sign-off report committed to the Atlas repo.
    - An announcement-ready short summary written (optional) as `README-v1.md` documenting what Atlas v1 does and does not do.
