tasks:
- id: cross-target-validation-on-dull-via-no-overrides-smoke
  title: Cross-target validation on dull via --no-overrides smoke
  category: eval
  status: blocked
  blocked_reason: 'Stage 1 (--no-overrides CLI flag) implemented, tested, and verified end-to-end. Stages 2-4 require user authorization for ~$5-$35 of live LLM spend on ~/Development/dull/ — paid HTTP API calls plus claude-code/codex subprocess calls. Auto-mode safety rails block unattended spend on shared paid systems. Unblock: user confirms spend, fresh work phase runs the calibration + full-depth pass, captures evaluation/results/<date>-dull-no-pins/, and softens criterion 6 of verify-atlas-v1-success-criteria-end-to-end.'
  dependencies: []
  description: |
    **Priority: HIGH.** Replaces `hand-author-second-golden-for-merged-monorepo` (deleted). Goal: unblock v1 sign-off criterion 6 (cross-target generalisation) without hand-authoring a second golden. Uses a new `--no-overrides` CLI flag to force every candidate through Atlas's full classification path on a real workspace, captures the resulting outputs as the cross-target reference, and replaces criterion 6's metric-comparison bar with a structural-stability bar.

    ## Why this replaces the hand-authored-golden approach

    Hand-authoring a 100+-component golden by reading source and choosing boundaries is high-cost and high-judgement work. It's also recursive: a hand-authored golden for cross-target validation only tests Atlas if Atlas disagrees with the author — and the author's reading of the codebase is itself error-prone. A pin-disabled smoke run on a real workspace (a) exercises every layer of the pipeline end-to-end, (b) produces outputs that can be diffed across runs to detect regressions, and (c) is cheap enough to repeat.

    The unmet condition for criterion 6 ("metrics within 5pp on each axis") becomes a structural-stability bar: pipeline completes without errors, output schema validates, surfaces and edges are populated for ≥80% of components. Quality measurement against a hand-authored ground truth is dropped.

    ## Scope

    ### Stage 1 — Implement `--no-overrides`

    Add a CLI flag to `atlas index` that, when set:

    - Skips loading `components.overrides.yaml` and `subsystems.overrides.yaml` from the output dir.
    - Logs a one-line warning at startup that overrides are disabled.
    - Cache fingerprint encodes "overrides disabled" so cache entries do not bleed between with/without runs.
    - Files on disk are untouched — flag-only behaviour, not destructive.

    Tests:
    - Unit: `pipeline.rs` loads no overrides when flag is set, regardless of file presence.
    - Integration: a fixture with non-trivial pins, run with and without `--no-overrides`, produces different L3 verdicts (deterministic short-circuit vs. LLM-fallback / kind-only path).

    Estimated size: ~30-50 lines + 2 tests.

    ### Stage 2 — Cost-controlled live run on dull

    Edit `~/Development/dull/.atlas/config.yaml`:

    - `providers.anthropic.api_key: ${ANTHROPIC_API_KEY}` (env var must be set).
    - `operations.classify.model: anthropic/claude-haiku-4-5`, `params.max_tokens: 1024` — Haiku via HTTP with prompt caching on the kind-catalogue prefix.
    - `operations.surface.model: claude-code/claude-sonnet-4-6` — Sonnet for cost; Opus is overkill for surface extraction.
    - `operations.edges.model: claude-code/claude-sonnet-4-6` — same reasoning.

    Run sequence:

    1. Calibration: `atlas index ~/Development/dull/ --no-overrides --max-depth 1 --budget 50000`. Read summary; verify call count and token spend project reasonably to full depth.
    2. Full run: `atlas index ~/Development/dull/ --no-overrides --budget 200000`. Capture wall time and final summary.

    Cost envelope (rough):

    | Layer | Calls | Per-call | Subtotal |
    |---|---|---|---|
    | L3 Classify (Haiku/HTTP, prefix-cached) | ~100 | $0.001-$0.005 | $0.10-$0.50 |
    | L5 Surface (Sonnet/claude-code) | ~100 | $0.05-$0.30 | $5-$30 |
    | L6 Edges (Sonnet/claude-code) | 1 batch | $0.50-$2.00 | $0.50-$2.00 |
    | **Total** | | | **~$5-$35** |

    ### Stage 3 — Capture outputs as cross-target reference

    - Stash `components.yaml`, `external-components.yaml`, `related-components.yaml`, `subsystems.yaml`, and `llm-cache.json` under `Atlas/evaluation/results/<date>-dull-no-pins/`.
    - Author `notes.md` documenting: model routing used, budget consumed, wall time, llm-cache.json size, any errors observed, structural metrics (component count, % with non-empty surfaces, edge count).
    - Header `notes.md` with "captured run output, NOT authoritative ground truth — Atlas's own verdicts at this run".

    ### Stage 4 — Soften v1 sign-off criterion 6

    Update `verify-atlas-v1-success-criteria-end-to-end` description to replace criterion 6 with a structural-stability bar:

    - Pipeline completes without `LlmError::Setup` or `LlmError::BudgetExhausted`.
    - ≥10 components emitted (sanity floor).
    - All four output YAMLs schema-validate via `atlas validate-overrides` or equivalent.
    - ≥80% of components have non-empty surface entries.
    - L6 edges file is non-empty (a workspace with 100 components and 0 inferred edges signals an L6 failure).

    The original "metrics within 5pp" bar is dropped from v1; if a hand-authored golden materialises later, the metric bar can be reintroduced as a v1.x.

    ## Exit criteria

    - `--no-overrides` flag implemented, tested, and behind a fingerprint guard.
    - One full run on dull captured under `evaluation/results/<date>-dull-no-pins/` with `notes.md`.
    - All four structural-stability checks pass on that run.
    - `verify-atlas-v1-success-criteria-end-to-end` description updated to reference the captured run as criterion-6 evidence.

    ## Out of scope

    - Hand-authoring a golden. Explicitly not done in this task.
    - Performance optimisation.
    - Migrating L5/L6 to HTTP (separate task: `filesystem-tool-use-loop-for-http-llm-backends-provider-agnostic`).

    ## References

    - Predecessor results: `evaluation/results/2026-05-04-dull-depth0-perf.md` (the analysis that surfaced the dull pin gap and motivated this approach).
    - Memory: `dull-depth-1-skips-llm-path-due-to-dense-pin-coverage` (corrected; "high but not total").
    - Memory: `backendrouter-rejects-http-providers-for-stage1surface-and-stage2edges` (why surface/edges stay on claude-code).
    - Memory: `anthropichttpbackend-already-implemented-...` (HTTP prompt caching for Classify is already on).
  results: |
    **2026-05-04 work phase: Stage 1 (`--no-overrides` CLI flag) complete; Stages 2-4 await user spend authorization.**

    ## What was done — Stage 1 implementation

    **CLI surface** (`crates/atlas-cli/src/main.rs`)

    - `--no-overrides` flag added to `IndexArgs`. clap auto-generates the `--help` entry.
    - Wires into `IndexConfig::no_overrides` alongside the existing flags.

    **Pipeline** (`crates/atlas-cli/src/pipeline.rs`)

    - New `IndexConfig::no_overrides: bool` field (default `false`, so existing callers/tests are unchanged).
    - In `run_index`, when `no_overrides` is true:
      - The `load_or_default_overrides` and `load_or_default_subsystems_overrides` calls are skipped; defaults from `OverridesFile::default()` / `SubsystemsOverridesFile::default()` are installed instead.
      - Validation pass is skipped — there is nothing to validate.
      - A one-line warning is emitted on stderr: `atlas: --no-overrides is set; ignoring components.overrides.yaml and subsystems.overrides.yaml (files on disk are untouched)`.
    - Cache fingerprint guard: `LlmFingerprint::backend_version` is suffixed with `+overrides=disabled` when the flag is set, partitioning the response cache so a no-overrides run cannot hit cache entries from a with-overrides run (and vice versa). Follows the established suffix convention used by `anthropic-http/<ver>+caching=ephemeral` and `openai-http/<ver>+upstream=openrouter`.
    - Files on disk are untouched (verified by integration test).

    **Tests** (`crates/atlas-cli/tests/pipeline_integration.rs`)

    Two new integration tests:

    1. `no_overrides_skips_loading_pins_so_suppress_does_not_apply` — writes a `pins.mylib.suppress: true` override, runs the pipeline twice (with and without `--no-overrides`), and asserts that the no-overrides run produces a strictly higher `component_count` than the baseline. Proves the override-loading path was actually bypassed.
    2. `no_overrides_does_not_modify_overrides_file` — writes an override file, runs `--no-overrides`, and asserts the bytes on disk are byte-identical before and after.

    ## Verification

    - `cargo test -p atlas-cli` — 21 tests pass (19 in `pipeline_integration`, 2 in `subsystems_integration`).
    - `cargo test --workspace` — all 132+ tests pass; no cross-crate regressions.
    - `cargo clippy --workspace --all-targets` — clean, no warnings.
    - `cargo run -p atlas-cli -- index --help | grep no-overrides` confirms the flag is documented in the CLI help surface.
    - End-to-end smoke: built a tiny `mylib` workspace at `/tmp/no-overrides-smoke`, wrote a `pins.mylib.suppress: true` override, ran `atlas index ... --no-overrides --max-depth 0`. Output:

      ```
      atlas: --no-overrides is set; ignoring components.overrides.yaml and subsystems.overrides.yaml (files on disk are untouched)
      atlas index: components=2 externals=0 edges=0 llm_calls=2 ...
      ```

      The warning fired, the suppress pin was bypassed (component appeared in output), and 2 LLM calls were attempted (proving the LLM-fallback path was forced; under the pin the path would have short-circuited to zero calls).

    ## Why blocked, not done

    The task's exit criteria require:

    > One full run on dull captured under `evaluation/results/<date>-dull-no-pins/` with `notes.md`.
    > All four structural-stability checks pass on that run.
    > `verify-atlas-v1-success-criteria-end-to-end` description updated to reference the captured run as criterion-6 evidence.

    These (Stages 2-4) require live LLM spend in the **~$5-$35 envelope** per the cost table in the task description, against a real paid API and live `claude-code` subprocesses. Auto-mode safety rails state explicitly:

    > Anything that ... modifies shared or production systems still needs explicit user confirmation.

    Paid HTTP API calls qualify. Stage 1 is meaningful standalone work — it is the unblocker for everything downstream — but the cross-target *capture* (the artifact criterion 6 will eventually point at) cannot exist until the live runs happen.

    ## Source-file changes left for analyse-work to commit

    - `crates/atlas-cli/src/main.rs` — CLI flag wiring.
    - `crates/atlas-cli/src/pipeline.rs` — `IndexConfig::no_overrides`, conditional override-loading, fingerprint suffix.
    - `crates/atlas-cli/tests/pipeline_integration.rs` — two new integration tests.

    No engine-, llm-, or contracts-crate source changed.

    ## Unblock path

    User confirms authorization for the dull live runs. A fresh work phase then:

    1. Runs `atlas index ~/Development/dull/ --no-overrides --max-depth 1 --budget 50000` for calibration.
    2. Runs the full-depth pass (`--budget 200000`).
    3. Captures the four output YAMLs + `llm-cache.json` + `notes.md` under `evaluation/results/<date>-dull-no-pins/`.
    4. Edits the description of `verify-atlas-v1-success-criteria-end-to-end` to replace criterion 6 with the structural-stability bar (pipeline completes, ≥10 components, schemas validate, ≥80% surfaces, non-empty edges).

    ## Cross-references

    - Memory: `dull-depth-1-skips-llm-path-due-to-dense-pin-coverage` — the gap that motivates the flag.
    - Predecessor: `evaluation/results/2026-05-04-dull-depth0-perf.md` — the audit that surfaced the problem and recommended this approach.
    - Followup-blocker: `verify-atlas-v1-success-criteria-end-to-end` (criterion 6).
- id: verify-atlas-v1-success-criteria-end-to-end
  title: Verify Atlas v1 success criteria end-to-end
  category: eval
  status: not_started
  dependencies:
  - cross-target-validation-on-dull-via-no-overrides-smoke
  description: |
    **Priority: HIGH.** Signs off v1.

    **Design reference:** §10.3 success criteria 1–6.

    ## Scope

    Execute each of the six v1 success criteria from §10.3 in order, document results in `evaluation/results/v1-signoff-<date>.md`:

    1. Run `atlas index /Users/antony/Development/` on a clean checkout. Assert coverage ≥ 0.9, spurious ≤ 0.1 against the golden.
    2. Re-run with no file changes. Assert 0 LLM calls (check the CLI's summary output) and byte-identical `components.yaml`.
    3. Touch one source file in one component. Re-run. Assert LLM call count equals exactly the affected component's `surface_of` plus its edge-neighbour count for edges. Log the numbers for future reference.
    4. Add a pin to `components.overrides.yaml` for one component (e.g., pin `role: my-custom-role`). Delete `components.yaml`. Re-run. Assert the pin appears in the regenerated `components.yaml` without human intervention.
    5. Run Ravel-Lite's `related-components` workflow against Atlas-produced YAMLs. Assert it runs to completion without schema errors.
    6. Run against the synthetic second target selected and evaluated in `hand-author-second-golden-for-merged-monorepo`. Assert coverage/spurious/kind/edge metrics are within 5 percentage points of the `~/Development/` run on each axis.

    ### Cross-plan dependency

    Criterion 5 cannot run until **Ravel-Lite's M5 migration** (`Migration M5: consume Atlas via atlas-index` in Ravel-Lite's backlog, formerly `ravel-lite-migration-m5-consume-atlas-via-atlas-index` in Atlas's) is complete. M5 lives in Ravel-Lite's plan, not Atlas's, so it cannot be expressed as a structural dependency here. Before starting this task, confirm M5 is `done` in Ravel-Lite by running:

    ```
    ravel-lite state backlog list /Users/antony/Development/Ravel-Lite/LLM_STATE/core --category migration
    ```

    If M5 is not done, criterion 5 must be skipped and recorded as "blocked on Ravel-Lite M5" in the sign-off report; the other five criteria can still proceed.

    ### Report

    - `evaluation/results/v1-signoff-<date>.md` contains each criterion, the commands run, the measured values, and pass/fail.
    - On any failure, the criterion lists the specific gap and what next steps would close it.

    ### Follow-up backlog

    - If any criterion fails by a wide margin, open a new backlog task to investigate. Do not silently move on.

    ## Out of scope

    - Everything in §10.2 (deferred).

    ## Exit criteria

    - All six criteria pass or have documented follow-up tasks (criterion 5 may be deferred pending Ravel-Lite M5).
    - Sign-off report committed to the Atlas repo.
    - An announcement-ready short summary written (optional) as `README-v1.md` documenting what Atlas v1 does and does not do.
- id: audit-atlas-cli-against-llm-friendly-cli-design-guide
  title: Audit Atlas CLI against LLM-friendly CLI design guide
  category: infra
  status: not_started
  dependencies:
  - verify-atlas-v1-success-criteria-end-to-end
  description: |
    **Priority: MEDIUM.** Audit Atlas's CLI surface (`atlas`, all subcommands, all flags, all output formats) against the LLM-friendly CLI design guide at `~/Development/Ravel-Lite/defaults/fixed-memory/cli-tool-design.md`. Produce a punch-list of findings, prioritised by ROI per the guide's own ordering (structured output > examples in --help > actionable errors > flag consistency > exit codes > defaults > non-TTY behaviour > capabilities).

    ## Why

    Atlas is increasingly invoked by other agents (Ravel-Lite tooling, future Uplift/Redeveloper consumers, ad-hoc evaluation runs in subagents). Friction in the CLI surface — missing `--json`, prose-only output, vague errors, undocumented exit codes — costs tokens and produces flaky agent loops. The guide is opinionated and ordered by impact; follow its ordering rather than re-deriving it.

    ## Scope

    ### Discovery (read-only audit)

    Walk every code path that produces user-facing output:

    - `atlas --help` and every subcommand's `--help`.
    - `atlas index` — the primary data-producing command. Outputs three YAMLs + `llm-cache.json`. Stdout summary line. Stderr progress.
    - `atlas validate-overrides` — error reporting on malformed config / overrides.
    - `atlas init` — scaffold output.
    - `atlas --version` — version output, `--json` form?
    - Error paths: missing config, missing API key, invalid model string, budget exhausted, filesystem-required prompt routed to HTTP (the new `LlmError::Setup` from `BackendRouter`), `LlmError::Invocation`, `LlmError::Schema`.
    - Exit codes: which subcommands emit which codes for which conditions.

    For each surface, score against the guide's audit checklist (lines 208–252 of `cli-tool-design.md`). Each "no" is a finding.

    ### Output

    A markdown report at `evaluation/results/cli-audit-<date>.md` with:

    - One section per audit-checklist subheading (Output, Help, Errors, Conventions, Behaviour, Discoverability).
    - Each finding tagged `[blocker]` / `[high]` / `[medium]` / `[low]` per the guide's ROI ordering.
    - A prioritised remediation backlog at the bottom — each entry small enough to be its own follow-up backlog task.
    - Explicit "out of scope for v1" calls where appropriate (e.g. `atlas capabilities` is "optional but valuable" — don't block v1 sign-off on it).

    ### Out of scope

    - Implementing fixes. This task ends at the report; remediation work spawns separate backlog tasks per the report's recommendations.
    - Auditing Ravel-Lite or other linkuistics CLIs.
    - Reworking the YAML output schemas — they are separately governed by the components/externals/related-components contracts.

    ## Exit criteria

    - `evaluation/results/cli-audit-<date>.md` exists, walks every guide audit-checklist item against Atlas's current CLI, and identifies findings.
    - Each finding is prioritised per the guide's ROI ordering (structured output > examples > errors > consistency > etc.).
    - A short follow-up backlog of 3–8 remediation tasks is proposed in the report's final section. The user reviews and decides which to file.
    - Atlas v1 sign-off (`verify-atlas-v1-success-criteria-end-to-end`) cross-references the report so anyone reading the v1 announcement understands what is and is not LLM-friendly today.

    ## References

    - Guide: `~/Development/Ravel-Lite/defaults/fixed-memory/cli-tool-design.md`. Treat the audit checklist (lines 208–252) and the anti-patterns list (lines 256–268) as load-bearing.
    - The guide's own remediation order (lines 271–284) — "Add `--json` everywhere it's missing" first, "stabilise the JSON schema" second, "rewrite error messages" third — is the recommended order for any follow-up tasks the report spawns.
- id: filesystem-tool-use-loop-for-http-llm-backends-provider-agnostic
  title: Filesystem tool-use loop for HTTP LLM backends (provider-agnostic)
  category: feature
  status: not_started
  dependencies: []
  description: |
    **Priority: MEDIUM.** Add a generic filesystem-tool-use loop to `AnthropicHttpBackend` and `OpenAiHttpBackend` so HTTP providers can service `Stage1Surface` and `Stage2Edges`. Once landed, the routing rejection in `BackendRouter` (added in `reject-http-providers-for-stage1surface-and-stage2edges-in-backendrouter`) loosens to a per-backend capability check rather than an unconditional ban on `provider in {anthropic, openai}`.

    ## Context

    Today, `Stage1Surface` and `Stage2Edges` only run on subprocess backends (`claude-code`, `codex`) because their rendered prompts ship no file content — surface and edge extraction need to read source. Subprocess backends provide that filesystem access via the upstream agent's built-in tools (Read, Grep, Glob, Bash). HTTP backends carry only the rendered prompt text, so they cannot read files and must currently be rejected for these prompt ids.

    Both Anthropic Messages API and OpenAI Chat Completions support **tool use / function calling** as a first-class part of the wire protocol. With a tool-use loop driven by Atlas, an HTTP backend can delegate filesystem reads back to the host process and produce surfaces/edges with the same fidelity as a subprocess backend — at lower cost (HTTP is cheaper per call than full agent sessions), with prompt caching benefits, and against any provider that speaks the protocol (Anthropic, OpenAI, OpenRouter, Vertex, Bedrock, etc.).

    User-stated motivation: "We could use the http backends if we provided the tools. I think it could be generally useful, not only here but for other projects as well." Design with reusability in mind — the tool-use loop should be liftable to a separate crate (e.g. `linkuistics/llm-tools` or `atlas-llm-tools`) once it has two consumers.

    ## Scope

    ### Tool set (initial)

    Minimum viable filesystem tool surface, mirroring what the agentic backends use:

    - `read_file(path: str, max_bytes: int = 64KiB) -> { content: str, truncated: bool }`
    - `glob(pattern: str, root: str = "<workspace>") -> { paths: [str] }`
    - `grep(pattern: str, paths: [str] | str, max_matches: int = 100) -> { matches: [{path, line, text}] }`
    - `list_dir(path: str) -> { entries: [{name, kind: "file" | "dir"}] }`

    Each tool's input/output JSON schemas live in one place and are exposed in both Anthropic and OpenAI tool-definition shapes via small adapter functions.

    ### Loop semantics

    1. Initial request: prompt + `tools: [...]` definitions.
    2. Receive response. If `stop_reason: "tool_use"` (Anthropic) or `finish_reason: "tool_calls"` (OpenAI), execute each tool call against the host filesystem, append `tool_result` / `tool` messages, send next turn.
    3. Repeat until `stop_reason: "end_turn"` or `finish_reason: "stop"`, or until a hard turn cap (e.g. 25) trips an `LlmError::Invocation`.
    4. Final assistant text is the structured-JSON response — same validation path as today via existing `validate_response`.

    ### Sandboxing

    Tool implementations must restrict filesystem access to a configured root (the Atlas workspace path). Path normalisation rejects `..` escapes and absolute paths outside the root. No write tools — read-only. `grep` and `glob` re-use Atlas's existing `ignore`-crate-aware traversal so `.gitignore` filtering applies (subprocess backends already inherit this from the agent host's defaults).

    ### Configurable budget

    - `max_turns` (default 25): maximum back-and-forth iterations per call.
    - `max_tool_calls_per_turn` (default 10): caps fan-out within one turn.
    - `max_total_bytes_read` (default 1 MiB per call): caps cumulative bytes returned via `read_file` across the whole loop.

    Exhausting any cap returns `LlmError::Invocation` with a clear message; the call is recorded as an error in the existing budget/sentinel stack.

    ### Provider adapters

    - **AnthropicHttpBackend.** Tools are sent under `tools: [{name, description, input_schema}, ...]`; tool results returned as `content: [{type: "tool_result", tool_use_id, content: <json>}]` blocks in the next user message.
    - **OpenAiHttpBackend.** Tools sent under `tools: [{type: "function", function: {name, description, parameters}}, ...]`; tool results returned as `{role: "tool", tool_call_id, content: <json-string>}` messages.
    - Wire-format differences absorbed by per-provider adapters; the engine-facing surface (the `LlmBackend::call` impl) is unchanged.

    ### Reusability shape

    Aim for a clean internal split so the tool-use loop and the tool implementations can be lifted to a sibling crate later:

    - `tool_use::loop::run<Provider, Tools>(provider: &Provider, tools: &Tools, messages, budget) -> Result<String>` — generic over provider adapter and tool implementer traits.
    - `tool_use::filesystem::FilesystemTools` — the concrete read-only filesystem tool set.
    - Atlas's HTTP backends become thin wrappers: parse Atlas's `LlmRequest`, build messages, call `tool_use::loop::run`, validate the final JSON response.

    Don't over-engineer — keep it inline in `atlas-llm` until a second consumer materialises, but design the module boundary so extraction is mechanical.

    ### Cache fingerprint

    `LlmFingerprint::backend_version` must encode "tool-use enabled" + tool-set version (a SHA over the tool definitions). Two runs with different tool sets are not interchangeable; the response cache must invalidate.

    ### Routing relaxation

    Once landed, `reject_http_for_filesystem_required_prompt` in `crates/atlas-llm/src/router.rs` becomes a per-backend capability check. Each backend declares whether it supplies filesystem tools (`fn supports_filesystem_tools(&self) -> bool`); the router asks the resolved backend instead of hard-coding HTTP-provider names.

    ## Cross-references

    - `enable-anthropic-prompt-caching-in-anthropichttpbackend` — caching applies to the static prefix (system + tool definitions); compose the two features so cached prefix benefits stack across tool-use turns.
    - `add-openrouter-as-an-llm-provider` — OpenRouter speaks OpenAI tool-call format verbatim; the OpenAI adapter covers OpenRouter for free.
    - `map-reduce-llm-architecture-with-backend-routing-for-context-light-analysis` — Stage1Surface stays "needs filesystem access" in that design; tool-use HTTP backends become a third option alongside `claude-code` and `codex`.
    - Memory: `backendrouter-rejects-http-providers-for-stage1surface-and-stage2edges` — the rejection's "future relaxation" path points at this task.

    ## Risks

    - **Determinism.** Tool-use loops can take different code paths across runs (the model may pick different files). Cache key remains canonical-input-based; cached-response soundness depends on the fingerprint encoding "tools enabled". Document this; consider a stricter fingerprint that includes tool-set hash.
    - **Cost.** Each round-trip adds prompt + response tokens. A surface extraction that took one agent call may take 5–10 HTTP turns. Budget caps are essential; profile against the dev-workspace before promoting from experimental.
    - **Sandboxing soundness.** Path-traversal escapes via symlinks, `..`, Unicode normalisation, etc. Use `Path::canonicalize` against the workspace root; reject anything outside.
    - **Streaming.** v1 implementation can be non-streaming (`reqwest::blocking`) like the current HTTP backends. Streaming tool-use is a follow-up.

    ## Out of scope

    - Write tools (Edit, Write, Bash). Atlas is read-only against the target codebase by design.
    - Streaming. Block-mode parity with current HTTP backends.
    - Lifting to a separate crate. Design for it; defer until two consumers.

    ## Exit criteria

    - `AnthropicHttpBackend::call` and `OpenAiHttpBackend::call` execute tool-use loops when configured for `Stage1Surface` or `Stage2Edges`.
    - Read-only filesystem tools available: `read_file`, `glob`, `grep`, `list_dir`. Sandboxed to a configured root.
    - `LlmBackend::supports_filesystem_tools(&self) -> bool` declared; default `false` for current backends, `true` for the new tool-using HTTP path; routing layer asks the trait method instead of hard-coding providers.
    - Configuration: `.atlas/config.yaml` `params.tools.enabled: true` (or similar) opts a per-operation HTTP backend into tool-use mode. Default off so existing configs are unchanged.
    - Cache fingerprint encodes "tools enabled" + tool-set hash; existing zero-LLM-call no-op re-runs remain byte-identical.
    - Live end-to-end: `atlas index ~/Development/dull/` with `surface` routed to `anthropic/...` (tools enabled) produces non-empty surfaces and edge proposals; metrics within 5pp of the same run on `claude-code/...`.
    - Memory note added documenting the design and the routing-relaxation that follows.
- id: run-agent-progress-e2e-integration-test-against-real-claude-binary
  title: Run agent-progress e2e integration test against real claude binary
  category: eval
  status: done
  dependencies: []
  description: |
    **Priority: LOW.** The agent-progress e2e integration test (`cargo test -p atlas-cli --test agent_observer_e2e`) skips silently by default. Running it once with `ATLAS_LLM_RUN_CLAUDE_TESTS=1` would close the loop on the full streaming pipeline: `ClaudeCodeBackend` → `parse_stream` → `AgentObserver` → `Reporter` agent sub-line.

    ## What to do

    1. Run: `ATLAS_LLM_RUN_CLAUDE_TESTS=1 cargo test -p atlas-cli --test agent_observer_e2e -- --nocapture`
    2. Verify the test passes end-to-end.
    3. If it fails, investigate and fix before marking done.
    4. Estimated cost: ~$0.05 USD, ~30–90 s.

    ## Context

    The agent sub-line feature (shipped in the prior cycle) is verified only by parser-level fixture tests and `Reporter` rendering unit tests. The full integration path (real `claude -p --output-format stream-json --verbose` invocation → JSONL parse → `AgentEvent` emission → `Reporter` sub-line mount/refresh/unmount) has not been exercised end-to-end since implementation.

    ## Exit criteria

    - Test passes under `ATLAS_LLM_RUN_CLAUDE_TESTS=1`.
    - No regressions in other `atlas-cli` tests.
  results: |
    ## Outcome

    The e2e test now passes against the real `claude -p` binary:

    ```
    ATLAS_LLM_RUN_CLAUDE_TESTS=1 cargo test -p atlas-cli --test agent_observer_e2e
    # 1 passed, ~67s, 3 LLM calls on the 1-component fixture
    ```

    The first run failed and exposed a real regression in the progress
    reporter, which I then fixed before retiring the task.

    ## Bug found and fixed

    `atlas index --progress` exited 0 but emitted nothing on stderr. Root
    cause was a latent bug in `crates/atlas-cli/src/progress.rs` that the
    e2e harness exercises but the existing unit / parser-level tests do
    not.

    Under `--progress` (`ProgressMode::Always`) with **non-TTY stderr**
    (which `assert_cmd::Command` produces — it pipes stderr):

    - `Reporter::drawing == true`, so `main.rs` attached the agent observer.
    - `AgentEvent::CallStart` / `ToolUse` reached `Reporter::on_event`,
      which called `self.agent.set_message(…)`.
    - But indicatif's `ProgressDrawTarget::stderr()` short-circuits to
      "no draw" when the underlying terminal isn't a TTY
      (`indicatif/draw_target.rs:167-169`). `MultiProgress::println` is
      documented to behave the same way.
    - The `↳` sub-line therefore lived only in indicatif's internal state
      and was never rendered to the piped stderr the test was reading.

    The same TTY-gate silently swallowed the `Finished` summary line in
    `Always + non-TTY` mode (only visible today because `main.rs`
    independently writes the summary to stdout via `println!`). `IterEnd`
    lines had the same bug but did not fire on the 1-component fixture.

    ## Fix

    `crates/atlas-cli/src/progress.rs`:

    - Added `plain_stderr: bool` field on `Reporter`. Set true iff
      `drawing && !stderr_is_tty` — i.e. the user explicitly forced
      `--progress` but indicatif cannot render bars.
    - `AgentObserver::on_event` (CallStart, ToolUse, ToolResult-failure)
      still calls `set_message` to keep state consistent for in-process
      test accessors, but **also** `eprintln!`s the rendered line in
      plain mode so it actually reaches piped stderr.
    - `ProgressEvent::IterEnd` and `Finished` handlers now route through
      `eprintln!` in plain mode instead of the silent `multi.println`.

    Behaviour matrix:

    | mode + stderr        | drawing | plain_stderr | output                                  |
    |----------------------|---------|--------------|-----------------------------------------|
    | Always + TTY         | true    | false        | indicatif bars in place (unchanged)     |
    | Always + non-TTY     | true    | true         | `eprintln!` scrollback (was silent)     |
    | Auto + TTY           | true    | false        | indicatif bars in place (unchanged)     |
    | Auto + non-TTY       | false   | false        | only Finished summary, eprintln!        |
    | Never                | false   | false        | only Finished summary, eprintln!        |

    Only the `Always + non-TTY` cell changes — and only from "silent" to
    "visible scrollback", which is what the user asked for when they
    passed `--progress`.

    ## Verification

    - `ATLAS_LLM_RUN_CLAUDE_TESTS=1 cargo test -p atlas-cli --test
      agent_observer_e2e` → **pass** (67s).
    - `cargo test -p atlas-cli` → 65 unit tests + ~21 integration tests,
      all pass.
    - `cargo clippy -p atlas-cli --all-targets` → clean.

    ## What this suggests next

    - The other `ProgressEvent` variants (Started, Phase, IterStart,
      Subcarve, Surface) only update the activity bar via `set_msg`, so
      they remain invisible under `--progress` in piped/CI mode. Adding
      parallel `eprintln!` emission would give CI consumers per-phase
      scrollback. Out of scope for closing this task, but a clear
      follow-up if `--progress`-in-CI becomes a real workflow.
    - A unit-level test that captures stderr would have caught this
      without burning tokens. Existing tests check `agent_msg()` (the
      in-memory bar message string), which never touches the indicatif
      draw path. Refactoring `Reporter` to take an injectable writer
      would unlock cheap coverage of the plain-mode branch.
    - A memory entry is worth adding: indicatif suppresses bar drawing
      *and* `MultiProgress::println` when the underlying terminal isn't
      a TTY — even when explicitly handed `ProgressDrawTarget::stderr()`.
      Future code that wires a `--progress`-style flag must add an
      `eprintln!` fallback or the flag will be silently ineffective in
      pipes / CI.
- id: confirm-l8-perf-win-on-dull-at-max-depth-0
  title: Confirm L8 perf win on dull at --max-depth 0
  category: eval
  status: blocked
  blocked_reason: 'L8 fix verified by code inspection + regression tests (l8_recurse.rs:621, 653); integration-level perf measurement on dull is unobtainable because dull''s components.overrides.yaml has 83 pins but Atlas''s enumeration finds candidates not in the pin set (e.g. session-recording-server/policy_api, shared-backend/Dull.SqlcDal/sql_sanitizer), so L3 Classify fires LLM calls that dominate wall time and obscure the L8 measurement. Unblock: complete dull''s pin coverage, or repurpose the smoke target to a synthetic leaf-Stop fixture. See evaluation/results/2026-05-04-dull-depth0-perf.md.'
  dependencies: []
  description: |
    **Priority: LOW (eval baseline).** After `skip-l8-structural-signal-computation-when-policy-will-stop` landed, the original bug described many-minute cold-cache runs at `--max-depth 0` because `seam_density` was eagerly evaluated before the depth guard fired. The fix should drop wall-time to filesystem-walk-only (single-digit seconds). This smoke run confirms the fix and records a baseline for future regressions.

    ## What to do

    1. Delete `.atlas/llm-cache.json` to ensure a cold cache.
    2. Run: `atlas index ~/Development/dull/ --max-depth 0`
    3. Record wall time and LLM call count from the summary.
    4. Document result in `evaluation/results/<date>-dull-depth0-perf.md`.

    ## Expected outcome

    - Wall time: single-digit seconds (filesystem walk only).
    - LLM calls: 0 (all components short-circuit via depth guard or kind-only policy).
    - Component count: ~105 (consistent with prior pinned run).

    ## Exit criteria

    - Smoke run completed and result documented.
    - Wall time is single-digit seconds; if not, open a new investigation task.

    ## References

    - Done task: `skip-l8-structural-signal-computation-when-policy-will-stop`
    - Memory: `decide-kind-only-skips-structural-signals-for-stop-workspace`
  results: |
    **2026-05-04 work phase: fix verified by code inspection and existing unit tests; integration-level smoke on dull is unobtainable.**

    ## What was checked

    - `subcarve_policy::decide_kind_only` (`crates/atlas-engine/src/subcarve_policy.rs:58`) returns `Some(Stop)` for leaf-like kinds and `Some(Recurse)` for `workspace`, allowing `l8_recurse::compute_decision` (`crates/atlas-engine/src/l8_recurse.rs:121`) to skip `modularity_hint` computation entirely for those kinds. `modularity_hint` transitively pulls L5 `surface_of`, so eliminating the hint call eliminates a chain of expensive work.
    - Two regression tests cover this at unit-test grain in `crates/atlas-engine/src/l8_recurse.rs`:
      - `max_depth_zero_skips_all_l5_surface_calls_on_library_kind` (line 621).
      - `cli_kind_skips_all_llm_calls_under_normal_max_depth` (line 653).
      Both use `RecordingBackend` to assert the recorded `PromptId` list is empty — a structural check.

    ## What the smoke run actually showed

    A cold-cache run of `target/release/atlas index ~/Development/dull/ --max-depth 0 --no-budget` (binary built from clean `385bd75` HEAD) was attempted. Within minutes, parallel `claude -p` subprocesses appeared rendering Classify prompts for at least two candidates that are **not keyed in dull's pins**:

    - `session-recording-server/policy_api`
    - `shared-backend/Dull.SqlcDal/sql_sanitizer`

    dull's `components.overrides.yaml` declares 83 pinned ids; Atlas's enumeration finds at least 85. The gap fires L3 Classify against `claude-code/claude-opus-4-7` (dull's `defaults.model`). The run was killed at ~12 min wall to avoid spending budget on a path that does not measure what the task is trying to confirm. Orphaned `claude -p` children were reaped after the parent atlas process was killed.

    ## What this changes

    - The previously-recorded "0 LLM calls, 7min wall" datapoint was almost certainly captured with a warm `llm-cache.json` (cache hits on every candidate). It is not a true cold-cache measurement.
    - Memory entry `dull-depth-1-skips-llm-path-due-to-dense-pin-coverage` overstated coverage; updated in this phase to read "high but not total; L3 fires on gap" and to cross-reference `evaluation/results/2026-05-04-dull-depth0-perf.md`.

    ## Why blocked, not done

    The L8 fix is verifiably present and tested. But the task's exit criterion — "Wall time is single-digit seconds" — cannot be met on dull until the pin gap is closed, because L3 dominates wall time. Two viable unblock paths:

    1. **Complete dull's pin coverage.** Audit `components.overrides.yaml::pins` against Atlas's enumerated candidate set; pin every uncovered candidate. After full coverage, repeat the smoke run. (This also unblocks the parent task `hand-author-second-golden-for-merged-monorepo`.)
    2. **Author a synthetic leaf-Stop fixture.** A 5–10-component fixture composed entirely of leaf-Stop kinds tests the fix at integration grain without depending on a real workspace's pin coverage. Lower marginal value because unit tests already cover the invariant.

    Path 1 has higher leverage (also unblocks the v1 sign-off chain). Path 2 is cheaper but largely duplicative of the existing unit tests.

    ## Source-file changes left for analyse-work to commit

    - `evaluation/results/2026-05-04-dull-depth0-perf.md` — new, full audit and recommendation.

    No engine or CLI source changed in this phase.
