tasks:
- id: extract-component-ontology-and-possibly-atlas-index-to-a-public-linkuistics-crate
  title: Extract component-ontology (and possibly atlas-index) to a public Linkuistics crate
  category: migration
  status: done
  dependencies: []
  description: |
    **Priority: HIGH.** Unblocks the Ravel-Lite migration tasks (M2 / M4 / M5).

    ## Problem

    Ravel-Lite is open source with external users. Atlas is a private repository. The existing migration design (§9.4 M2) has Ravel-Lite depending on Atlas's `component-ontology` (and later `atlas-index`) via `path = "../Atlas/..."`. That works only for a local sibling checkout and cannot survive outside a developer machine.

    ## Solution

    Extract the public, data-format / vocabulary layer of Atlas into a new Linkuistics repository and reference it as a git dependency. Both Atlas (private) and Ravel-Lite (OSS) depend on it. The IP-sensitive parts of Atlas (`atlas-engine`, prompts, Salsa pipeline, LLM wiring) stay in the private Atlas repo.

    **Distribution model** (confirmed 2026-04-24): Ravel-Lite and Atlas ship as **Homebrew bottles** built by CI. End users never run `cargo build`, so `git = "https://github.com/..."` dependencies are the appropriate and cheapest source for cross-project code. See memory entry `project_distribution_brew_bottles`. Because `cargo publish` is not on the roadmap, the `include_str!` cross-crate path concerns (memory entry `cross-crate-include-str-paths-break-crates-io-publication`) are structurally moot and need no remediation in this task.

    ## Plan

    ### 1. New public repo: `linkuistics/atlas-contracts`

    - Single umbrella Cargo workspace containing all the public, data-format / vocabulary layer of Atlas.
    - Initial members: `component-ontology`, `atlas-index`.
    - License: Apache-2.0 (matches Atlas and Ravel-Lite).
    - Name rationale: "contracts" captures intent — this is the set of data-formats, types, protocols, and standards that Atlas produces/consumes and that external tools need to speak. Distinguishes it from `atlas-engine` (computational / private).
    - Future home for any additional public Atlas crates (prompt-schema crates, results-schema crates, etc.) that emerge later.

    ### 2. Extraction

    - Use `git filter-repo` to carve `crates/component-ontology/`, `crates/atlas-index/`, and `defaults/ontology.yaml` out of Atlas with full history.
    - Layout in `atlas-contracts`:
      - `crates/component-ontology/` (unchanged)
      - `crates/atlas-index/` (unchanged; still depends on `component-ontology` via workspace path dep)
      - `defaults/ontology.yaml` at workspace root, kept at `../../../defaults/ontology.yaml` relative to `crates/component-ontology/src/defaults.rs` — the `include_str!` path is identical under the new workspace root.
    - Root `Cargo.toml` mirrors Atlas's workspace style (shared `[workspace.package]`, `[workspace.dependencies]` for `anyhow`, `serde`, `serde_yaml`, etc., and `[workspace.lints]`).

    ### 3. Wire Atlas up

    - Delete `Atlas/crates/component-ontology/` and `Atlas/crates/atlas-index/` and their workspace entries.
    - In Atlas's root `Cargo.toml` add git deps:
      ```toml
      [workspace.dependencies]
      component-ontology = { git = "https://github.com/linkuistics/atlas-contracts", rev = "<sha>" }
      atlas-index = { git = "https://github.com/linkuistics/atlas-contracts", rev = "<sha>" }
      ```
      Pin by rev for reproducible builds; consider tag-based pinning (`tag = "v0.1.0"`) if ergonomics want a human-readable version.
    - Keep `Atlas/defaults/ontology.yaml` for the moment if anything in Atlas still loads it from disk; otherwise delete. The canonical copy now lives in `atlas-contracts/defaults/ontology.yaml`.
    - Run full Atlas test suite; fix any import-path churn.

    ### 4. Impact on downstream backlog tasks

    After this task lands, rewrite the migration tasks to reference `git = "https://github.com/linkuistics/atlas-contracts"` rather than path deps or crates.io:

    - **M2**: dep source becomes the git dep; the rest (replace imports, delete `Ravel-Lite/src/ontology/`) is unchanged.
    - **M4**: the canonical `ontology.yaml` lives in `atlas-contracts/defaults/`; asset-loading switches to the crate-exposed string.
    - **M5**: `atlas-index` is now available cleanly as a git dep. The earlier `prompts_dir()` open question is unchanged — resolve during M5.

    ### 5. Memory updates

    - Update the `cross-crate-include-str-paths-break-crates-io-publication` memory entry to note that it's structurally moot under the Brew-bottle distribution model.
    - No other memory changes needed (the Brew-bottle memory was saved in this task's pre-work).

    ## Out of scope

    - Actually executing M2/M4/M5 (separate tasks).
    - Making Atlas's prompt templates or `atlas-engine` public.
    - Crates.io publication (explicitly not on the roadmap).
    - `include_str!` path rework.

    ## Exit criteria

    - `github.com/linkuistics/atlas-contracts` exists publicly, is an Apache-2.0 licensed Cargo workspace, and contains `component-ontology` + `atlas-index` with preserved git history.
    - Atlas compiles against the git-dep versions; all Atlas tests pass.
    - `Atlas/crates/component-ontology/` and `Atlas/crates/atlas-index/` are gone.
    - M2/M4/M5 descriptions reference the git dep source; M2 is unblocked (dependency resolved).
    - Memory entry `cross-crate-include-str-paths-break-crates-io-publication` updated to note its structural mootness.
  results: |
    ## What was done

    - Brainstormed distribution constraints with the user. Original task assumed crates.io publication; user clarified Atlas and Ravel-Lite ship as Homebrew bottles built by CI, so git deps are the appropriate source and crates.io constraints do not apply. Saved this as a persistent project memory (`project_distribution_brew_bottles.md`).
    - Rewrote this task's description to drop the crates.io scope and target a single umbrella repo + git-dep source.
    - Created public GitHub repo `linkuistics/atlas-contracts` (Apache-2.0, single Cargo workspace).
    - Extracted `component-ontology` and `atlas-index` crates and `defaults/ontology.yaml` from Atlas, wrote a new top-level `Cargo.toml` mirroring Atlas's workspace-inherit style, plus README and `.gitignore`. Bootstrap commit sha: `337c54368eb1393f2c3f8839a5e9042ce72cf964`.
    - Verified the extracted workspace builds and tests in isolation (80 tests: 33 atlas-index unit, 3 atlas-index golden, 44 component-ontology — all green).
    - Wired Atlas up:
      - Dropped the two crates from `[workspace.members]`.
      - Added both as `[workspace.dependencies]` pinned by sha.
      - Switched `atlas-cli`, `atlas-engine`, `evaluation/harness` from path deps to `workspace = true` deps.
      - Deleted local `crates/component-ontology/`, `crates/atlas-index/`, `defaults/ontology.yaml`.
    - Ran full Atlas test suite: 281 passed, 2 ignored (pre-existing opt-in tests gated on `ATLAS_LLM_RUN_CLAUDE_TESTS=1`), 0 failed.
    - Rewrote M2, M4, M5 task descriptions to reference the new git-dep source. M5 also got an added discussion of the Stage-1/2 prompt question with a revised default recommendation (Ravel-Lite keeps its own prompts, since publishing Atlas prompts to the public contracts repo contradicts the "public contracts, private computation" split).
    - Updated the `cross-crate-include-str-paths-break-crates-io-publication` memory entry to note its structural mootness under the Brew-bottle model, with a clear "if the distribution model changes" escape hatch.

    ## What worked

    - Skipping `git filter-repo` per the user's preference and going straight to a bootstrap commit was much cleaner. The public repo has a single clear "Initial extraction from Atlas" commit; anyone needing history can follow the link back to the private Atlas repo's log.
    - Cargo's git-dep resolution Just Works with an sha pin; no CI configuration or registry coordination needed.
    - Switching the downstream Atlas crates to `workspace = true` deps (instead of repeating the `git = ...` URL three times) centralised the pin in the root `Cargo.toml`. A single sha bump upgrades everything in lockstep.

    ## What didn't work

    - First `cargo check` failed because `evaluation/harness/Cargo.toml` still had a path dep at `../../crates/atlas-index`. Grepping before deletion would have caught this earlier; filed that learning implicitly (the `.grep` I did afterwards did catch it). No lasting harm.
    - Five Edit calls failed at first because the files hadn't been Read in this session yet. Rewrote after reading. Minor friction, no rework.

    ## What this suggests next

    - **M2 is now unblockable.** Its `blocked` status should flip to `not_started` — I'll flip it in the step after this.
    - **M5's prompt question:** the revised default is "Ravel-Lite keeps its own prompt copies." If Ravel-Lite's Stage-1/2 prompts are drifting meaningfully from Atlas's, that's an intentional divergence; they don't need to be the same across projects. The user should decide when M5 is picked up.
    - **`atlas-contracts` versioning:** currently one commit on main, pinned by sha. No tag strategy. If the repo starts taking contributions or gets third-party consumers beyond Atlas/Ravel-Lite, introducing semantic tags (`v0.1.0`, `v0.2.0`) and pinning by tag instead of sha would be worth revisiting.
    - **`atlas-contracts` CI:** not set up. For now Atlas's own CI catches regressions by building against the sha-pinned deps. If the contracts repo grows (more crates, multiple consumers), a minimal CI (just `cargo test --workspace`) becomes worth adding.
    - **`atlas-contracts` README:** points at Atlas for context but doesn't yet say "we accept external contributions" or similar. If the Linkuistics org wants to invite outside maintainers, a CONTRIBUTING.md will be needed.
    - **Atlas's `Cargo.lock`:** the lockfile now includes the git-dep sha. Any future bump of the `atlas-contracts` pin needs to be done in BOTH `Cargo.toml` and the lockfile (or just in `Cargo.toml`, then `cargo update -p component-ontology -p atlas-index`). Document this in a developer-facing note if team members are likely to trip over it.
- id: hand-author-second-golden-for-merged-monorepo
  title: Hand-author second golden for merged monorepo
  category: eval
  status: not_started
  dependencies: []
  description: |
    **Priority: MEDIUM.** Required for success criterion 6 (cross-target generalisation).

    **Design reference:** §8.1, §10.3 criterion 6.

    ## Scope

    ### Golden

    - Hand-author `evaluation/goldens/merged-monorepo/components.golden.yaml` for the merged monorepo (user to provide path or the golden lives alongside the monorepo and is symlinked into `evaluation/goldens/`).
    - Approximate size: several hundred components.
    - For components that are formerly-independent repos, boundary decisions are usually obvious; for internal splits, err on the side of the original repo boundary unless there's a clear lifecycle reason to split further.
    - `notes.md` documents the decisions and particularly the cases where the golden deliberately disagrees with the original `.git` structure.

    ### Cross-target validation

    - Run the tool against the monorepo root; produce `evaluation/results/<date>-merged-monorepo.yaml`.
    - Compare metrics between the two goldens:
      - Component coverage: both ≥ 0.9?
      - Spurious rate: both ≤ 0.1?
      - Kind accuracy: both ≥ 0.85?
      - Edge precision: both ≥ 0.8?
    - Gap between targets ≤ 5 percentage points on each axis (§10.3 criterion 6).

    ### Iteration loop (if gap > 5pp)

    If the gap exceeds the bar, the iteration is permitted as follow-up work on earlier tasks — update prompts, heuristics, or thresholds and re-run. Document changes in a new entry under `evaluation/results/notes/<date>-iteration.md` so the experimental history is traceable.

    ## Out of scope

    - Ravel-Lite migration (separate tasks).
    - Performance optimisation (§10.2 deferred).

    ## Exit criteria

    - Golden exists and passes all invariants.
    - Both goldens' metrics meet their individual targets AND the cross-target gap ≤ 5pp.
    - Report HTML shows both targets with trend lines.
- id: ravel-lite-migration-m2-switch-to-atlas-component-ontology-crate
  title: 'Ravel-Lite migration M2: switch to Atlas component-ontology crate'
  category: migration
  status: not_started
  dependencies:
  - extract-component-ontology-and-possibly-atlas-index-to-a-public-linkuistics-crate
  description: |
    **Priority: MEDIUM.** Unblocks M4 and M5.

    **Design reference:** §9.4 M2.

    ## Scope

    - In Ravel-Lite's root `Cargo.toml`, add a `[workspace.dependencies]` entry (or plain `[dependencies]` if Ravel-Lite is single-crate):
      ```toml
      component-ontology = { git = "https://github.com/linkuistics/atlas-contracts", rev = "<sha>" }
      ```
      Pin by commit sha. The canonical repo is `linkuistics/atlas-contracts` (a public Cargo workspace hosting Atlas's data-format / vocabulary crates — see the extraction task for context).
    - Replace every `use crate::ontology::...` or `use ravel_lite::ontology::...` in Ravel-Lite with `use component_ontology::...`.
    - Delete `Ravel-Lite/src/ontology/` entirely.
    - Keep `Ravel-Lite/defaults/ontology.yaml` for now — the canonical file is shipped by `component-ontology` via `include_str!`, but removing Ravel-Lite's local copy is M4.
    - Run the full Ravel-Lite test suite; fix any breakage from the import path change.
    - Commit as a single PR.

    ### Tests

    - Ravel-Lite's existing tests (targeting the ontology drift assertion, edge validation, etc.) continue to pass.
    - Compatibility test: load an existing `related-components.yaml` produced pre-M2 and verify it parses bit-identical.

    ## Out of scope

    - Removing Ravel-Lite's `defaults/ontology.yaml` (M4).
    - Refactoring Ravel-Lite's `src/projects.rs` (M5).
    - Any behavioural change — this is purely a dep-source switch.

    ## Exit criteria

    - Ravel-Lite compiles and all tests pass with `component-ontology` sourced as a git dep from `linkuistics/atlas-contracts`.
    - `Ravel-Lite/src/ontology/` is gone.
    - A commit in Ravel-Lite titled "Switch component-ontology to atlas-contracts git dep" with a link to the `atlas-contracts` commit it pins.
- id: ravel-lite-migration-m4-delete-in-tree-ontology-copies
  title: 'Ravel-Lite migration M4: delete in-tree ontology copies'
  category: migration
  status: not_started
  dependencies:
  - ravel-lite-migration-m2-switch-to-atlas-component-ontology-crate
  description: |
    **Priority: MEDIUM.** Removes drift risk by eliminating duplicates.

    **Design reference:** §9.4 M4.

    ## Scope

    - Delete `Ravel-Lite/defaults/ontology.yaml`. Ravel-Lite now reads the YAML from the `component-ontology` crate (hosted at `linkuistics/atlas-contracts`) via its exposed `component_ontology::EMBEDDED_ONTOLOGY_YAML` constant.
    - Delete `Ravel-Lite/docs/component-ontology.md`. Ravel-Lite's in-tree doc becomes a stub `component-ontology.md` that just links to `atlas-contracts/crates/component-ontology/README.md` (or equivalent upstream docs).
    - Delete `Ravel-Lite/docs/component-ontology-migration.md` — the migration is done, the doc is obsolete.
    - Update any Ravel-Lite tests that previously loaded `Ravel-Lite/defaults/ontology.yaml` from disk to instead use `component_ontology::EMBEDDED_ONTOLOGY_YAML`.
    - Ravel-Lite's build-time test that asserts `EdgeKind` matches `ontology.yaml` switches to assert against the crate-exposed constant (which is the canonical file).
    - Ravel-Lite's Stage 1 / Stage 2 prompts still exist in `Ravel-Lite/defaults/` for this task; they're removed in M5.

    ### Tests

    - Ravel-Lite test suite passes.
    - Build-time `EdgeKind` vs `ontology.yaml` consistency test still runs and passes.
    - No Ravel-Lite file other than `component-ontology`-sourced strings references `ontology.yaml` at a Ravel-Lite-local path.

    ## Out of scope

    - Removing Ravel-Lite's Stage 1/2 prompt copies (M5).
    - Refactoring `src/projects.rs` (M5).

    ## Exit criteria

    - `Ravel-Lite/defaults/ontology.yaml` does not exist.
    - `Ravel-Lite/docs/component-ontology.md` is a one-line redirect stub or deleted.
    - Ravel-Lite builds and tests pass.
- id: ravel-lite-migration-m5-consume-atlas-via-atlas-index
  title: 'Ravel-Lite migration M5: consume Atlas via atlas-index'
  category: migration
  status: not_started
  dependencies:
  - ravel-lite-migration-m2-switch-to-atlas-component-ontology-crate
  description: |
    **Priority: MEDIUM.** Completes the migration; single `related-components.yaml` in the ecosystem.

    **Design reference:** §9.4 M5.

    ## Scope

    ### Ravel-Lite depends on atlas-index

    - Add `atlas-index = { git = "https://github.com/linkuistics/atlas-contracts", rev = "<sha>" }` to Ravel-Lite's Cargo.toml. Pin the same rev used for `component-ontology` in M2 (both crates live in the same workspace).

    ### Refactor projects.rs

    - Ravel-Lite's `ProjectsCatalog` becomes a thin wrapper over Atlas's `ComponentsFile`.
    - `find_by_name(name)` searches `atlas_index::ComponentsFile.components` by `id`.
    - Only *internal* components are valid plan targets — external components (from `external-components.yaml`) are rejected with a helpful error per the user's earlier decision.
    - Existing callers' API preserved as much as possible; public signatures remain backward-compatible where practical (change the import paths but keep the verbs).

    ### Remove Stage 1/2 prompt copies — resolution of the open question

    The earlier open question was where Ravel-Lite should read Atlas's prompts from once the prompt files live in the private Atlas repo. Resolution options:

    1. **Add prompts to `atlas-contracts`** — promote them to the public contracts repo. Simplest for Ravel-Lite, exposes Atlas prompt IP publicly.
    2. **Ravel-Lite keeps its own prompt copies** — revert the deletion step; Ravel-Lite stays prompt-independent. Reintroduces drift risk.
    3. **Optional env-var / path-based lookup** — Ravel-Lite has no prompts of its own and requires a sibling Atlas checkout via `ATLAS_PROMPTS_DIR` or similar.

    Decide during this task. Default recommendation (revised from original task): **option 2** (Ravel-Lite keeps its own prompt copies). Rationale: prompts are the heart of Atlas's IP; publishing them via `atlas-contracts` contradicts the "public data-formats, private computational parts" split that motivated the whole extraction. Ravel-Lite's Stage-1/2 prompts are lighter than Atlas's discover-* prompts and can diverge intentionally.

    If option 2 is picked, this section collapses to "leave `Ravel-Lite/defaults/discover-stage1.md` and `discover-stage2.md` alone" and the exit criterion below changes accordingly.

    ### CLI surface

    - `ravel-lite state related-components ...` remains as a thin pass-through — the CLI is kept but internally routes through `atlas-index` verbs.
    - `ravel-lite state projects ...` similarly — the verbs still exist but operate on Atlas-produced `components.yaml` via `atlas-index`.
    - Existing tests for these CLI surfaces continue to pass.

    ### Tests

    - End-to-end test: run a discover loop on Ravel-Lite itself using Atlas-produced YAMLs as the project catalog. Verify Stage 1/Stage 2 outputs are identical (modulo the project→component rename) to pre-migration outputs.
    - Compatibility: a Ravel-Lite user who already has a `projects.yaml` at the old path receives a clear migration error directing them to run Atlas.

    ## Out of scope

    - Atlas-side changes (earlier tasks).
    - Performance optimisation.

    ## Exit criteria

    - A single `related-components.yaml` exists in the ecosystem — Ravel-Lite no longer writes its own.
    - Ravel-Lite's test suite passes end to end.
    - `ravel-lite run` on any plan directory can discover and use components produced by Atlas without any hand-authored `projects.yaml`.
    - The Stage-1/2 prompt question is answered and the chosen option's sub-steps are applied.
- id: verify-atlas-v1-success-criteria-end-to-end
  title: Verify Atlas v1 success criteria end-to-end
  category: eval
  status: not_started
  dependencies:
  - hand-author-second-golden-for-merged-monorepo
  - ravel-lite-migration-m5-consume-atlas-via-atlas-index
  description: |
    **Priority: HIGH.** Signs off v1.

    **Design reference:** §10.3 success criteria 1–6.

    ## Scope

    Execute each of the six v1 success criteria from §10.3 in order, document results in `evaluation/results/v1-signoff-<date>.md`:

    1. Run `atlas index /Users/antony/Development/` on a clean checkout. Assert coverage ≥ 0.9, spurious ≤ 0.1 against the golden.
    2. Re-run with no file changes. Assert 0 LLM calls (check the CLI's summary output) and byte-identical `components.yaml`.
    3. Touch one source file in one component. Re-run. Assert LLM call count equals exactly the affected component's `surface_of` plus its edge-neighbour count for edges. Log the numbers for future reference.
    4. Add a pin to `components.overrides.yaml` for one component (e.g., pin `role: my-custom-role`). Delete `components.yaml`. Re-run. Assert the pin appears in the regenerated `components.yaml` without human intervention.
    5. Run Ravel-Lite's `related-components` workflow against Atlas-produced YAMLs. Assert it runs to completion without schema errors.
    6. Run against the merged monorepo. Assert coverage/spurious/kind/edge metrics are within 5 percentage points of the `~/Development/` run on each axis.

    ### Report

    - `evaluation/results/v1-signoff-<date>.md` contains each criterion, the commands run, the measured values, and pass/fail.
    - On any failure, the criterion lists the specific gap and what next steps would close it.

    ### Follow-up backlog

    - If any criterion fails by a wide margin, open a new backlog task to investigate. Do not silently move on.

    ## Out of scope

    - Everything in §10.2 (deferred).

    ## Exit criteria

    - All six criteria pass or have documented follow-up tasks.
    - Sign-off report committed to the Atlas repo.
    - An announcement-ready short summary written (optional) as `README-v1.md` documenting what Atlas v1 does and does not do.
