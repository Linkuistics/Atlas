tasks:
- id: hand-author-second-golden-for-merged-monorepo
  title: Hand-author synthetic second golden for cross-target validation
  category: eval
  status: not_started
  dependencies: []
  description: |
    **Priority: MEDIUM.** Required for success criterion 6 (cross-target generalisation).

    **Context:** The merged monorepo target originally specified for this task is third-party and unavailable. Repurposed to use a synthetic second target from `~/Development/` — a multi-crate Cargo workspace structurally different from the dev-workspace root, sufficient to exercise cross-target stability.

    ## Target selection

    Pick a sibling repo under `~/Development/` that:
    - Is a multi-crate Cargo workspace (sub-carves differently from the top-level dev-workspace)
    - Has ≥ 10 components when Atlas sub-carves it
    - Is not the dev-workspace root itself (must exercise a different sub-carve path)

    Good candidates: any larger workspace-organised repo already present under `~/Development/` (e.g. Ravel, or another multi-crate workspace). Document the selection rationale in `notes.md`.

    ## Scope

    ### Golden

    - Hand-author `evaluation/goldens/<target-name>/components.golden.yaml` for the selected target.
    - Approximate size: tens of components (need not be hundreds — enough to stress the cross-target gap assertion).
    - `notes.md` documents: target selected, why it was chosen, and any boundary decisions that differ from what Atlas naturally produces.

    ### Cross-target validation

    - Run the tool against the synthetic target root; produce `evaluation/results/<date>-<target-name>.yaml`.
    - Compare metrics between the two goldens (dev-workspace and synthetic target):
      - Component coverage: both ≥ 0.9?
      - Spurious rate: both ≤ 0.1?
      - Kind accuracy: both ≥ 0.85?
      - Edge precision: both ≥ 0.8?
    - Gap between targets ≤ 5 percentage points on each axis (criterion 6).

    ### Iteration loop (if gap > 5pp)

    If the gap exceeds the bar, iterate on prompts, heuristics, or thresholds and re-run. Document changes in `evaluation/results/notes/<date>-iteration.md`.

    ## Out of scope

    - Ravel-Lite migration (separate tasks).
    - Performance optimisation.

    ## Exit criteria

    - Target selected and documented in `notes.md`.
    - Golden exists and passes all invariants.
    - Both goldens' metrics meet their individual targets AND cross-target gap ≤ 5pp.
    - Report HTML shows both targets with trend lines.
  results: |
    Repurposed in triage (2026-04-25): merged monorepo target is third-party and unavailable. Task pivoted to synthetic second target from `~/Development/` per option 2 in the blocked-cycle recommendation. Prior blocked-cycle context: `component-ontology` at `linkuistics/atlas-contracts` SHA `337c54368eb1393f2c3f8839a5e9042ce72cf964` matches Ravel-Lite's ontology surface 1:1; M2 migration is a pure import-path swap once Ravel-Lite is quiescent.
- id: verify-atlas-v1-success-criteria-end-to-end
  title: Verify Atlas v1 success criteria end-to-end
  category: eval
  status: not_started
  dependencies:
  - hand-author-second-golden-for-merged-monorepo
  description: |
    **Priority: HIGH.** Signs off v1.

    **Design reference:** §10.3 success criteria 1–6.

    ## Scope

    Execute each of the six v1 success criteria from §10.3 in order, document results in `evaluation/results/v1-signoff-<date>.md`:

    1. Run `atlas index /Users/antony/Development/` on a clean checkout. Assert coverage ≥ 0.9, spurious ≤ 0.1 against the golden.
    2. Re-run with no file changes. Assert 0 LLM calls (check the CLI's summary output) and byte-identical `components.yaml`.
    3. Touch one source file in one component. Re-run. Assert LLM call count equals exactly the affected component's `surface_of` plus its edge-neighbour count for edges. Log the numbers for future reference.
    4. Add a pin to `components.overrides.yaml` for one component (e.g., pin `role: my-custom-role`). Delete `components.yaml`. Re-run. Assert the pin appears in the regenerated `components.yaml` without human intervention.
    5. Run Ravel-Lite's `related-components` workflow against Atlas-produced YAMLs. Assert it runs to completion without schema errors.
    6. Run against the synthetic second target selected and evaluated in `hand-author-second-golden-for-merged-monorepo`. Assert coverage/spurious/kind/edge metrics are within 5 percentage points of the `~/Development/` run on each axis.

    ### Cross-plan dependency

    Criterion 5 cannot run until **Ravel-Lite's M5 migration** (`Migration M5: consume Atlas via atlas-index` in Ravel-Lite's backlog, formerly `ravel-lite-migration-m5-consume-atlas-via-atlas-index` in Atlas's) is complete. M5 lives in Ravel-Lite's plan, not Atlas's, so it cannot be expressed as a structural dependency here. Before starting this task, confirm M5 is `done` in Ravel-Lite by running:

    ```
    ravel-lite state backlog list /Users/antony/Development/Ravel-Lite/LLM_STATE/core --category migration
    ```

    If M5 is not done, criterion 5 must be skipped and recorded as "blocked on Ravel-Lite M5" in the sign-off report; the other five criteria can still proceed.

    ### Report

    - `evaluation/results/v1-signoff-<date>.md` contains each criterion, the commands run, the measured values, and pass/fail.
    - On any failure, the criterion lists the specific gap and what next steps would close it.

    ### Follow-up backlog

    - If any criterion fails by a wide margin, open a new backlog task to investigate. Do not silently move on.

    ## Out of scope

    - Everything in §10.2 (deferred).

    ## Exit criteria

    - All six criteria pass or have documented follow-up tasks (criterion 5 may be deferred pending Ravel-Lite M5).
    - Sign-off report committed to the Atlas repo.
    - An announcement-ready short summary written (optional) as `README-v1.md` documenting what Atlas v1 does and does not do.
- id: draft-implementation-plan-for-engine-side-progressevent-indicatif-rendering
  title: Draft implementation plan for engine-side ProgressEvent + indicatif rendering
  category: feature
  status: done
  dependencies: []
  description: |
    Draft a step-by-step implementation plan from the approved design spec at
    `docs/superpowers/specs/2026-05-01-engine-progress-events-design.md` (commit
    `22d6324`).

    The spec covers replacing the current per-call progress tally (commit
    `6fc46b1`) with:

    - A structured `ProgressEvent` enum + `ProgressSink` trait emitted from
      `atlas-engine` (`run_fixedpoint` fires `IterStart`/`Subcarve`/`IterEnd`).
    - An `indicatif`-backed multi-region renderer in `atlas-cli` (activity
      bar + token gauge, `MultiProgress::println` for per-iteration scrollback
      history).
    - Decomposition of L5 demand in `pipeline.rs` so the Project phase emits
      per-component `Surface{k/n}` events while preserving byte-identical
      YAML output.

    **Exit criteria for this task:**

    1. Use the `superpowers:writing-plans` skill to produce the plan.
    2. Save the plan to `docs/superpowers/plans/2026-05-01-engine-progress-events.md`.
    3. Plan covers every section of the spec (12 sections — see `## Self-Review`
       in the writing-plans skill for the spec-coverage checklist).
    4. Plan is bite-sized (TDD-shaped: failing test → impl → passing test →
       commit per concrete step). No placeholders/TBDs.
    5. Plan committed.

    **Do NOT implement the feature in this session — just produce the plan.**
    Implementation lands as a follow-up backlog task once the plan is reviewed.

    **Context to load at start of session:**

    - Read the spec end-to-end before drafting tasks.
    - Re-read `crates/atlas-engine/src/fixedpoint.rs`, `crates/atlas-cli/src/pipeline.rs`,
      and `crates/atlas-cli/src/progress.rs` so file paths and signatures in the
      plan match what's actually in the tree.
    - Memory notes that bear on the work: `phase-level-progress-needs-engine-side-hooks-in-run-fixedpoint`
      (the deferral being closed), `progressbackend-sits-outside-llmresponsecache-counts-cache-misses-only`
      (don't disturb this property), `is-component-not-salsa-tracked-salsa-0-26-lacks-downcast`
      (why the design avoids in-query instrumentation), `l5-l6-llm-calls-must-route-through-call-llm-cached-not-backend-call-directly`
      (byte-identity argument).
  results: |
    Drafted the implementation plan at
    `docs/superpowers/plans/2026-05-01-engine-progress-events.md` (~2120 lines,
    19 tasks plus a Final Verification section).

    ## What was done

    - Read the spec end-to-end (`docs/superpowers/specs/2026-05-01-engine-progress-events-design.md`)
      along with the three files it touches (`atlas-engine/src/fixedpoint.rs`,
      `atlas-cli/src/pipeline.rs`, `atlas-cli/src/progress.rs`) plus
      `atlas-cli/src/main.rs` for the existing reporter wiring and
      `atlas-contracts/.../schema.rs` for the `ComponentEntry` shape.
    - Used the `superpowers:writing-plans` skill to structure the document.
    - Plan is bite-sized and TDD-shaped: every behavioural task has
      failing-test → impl → passing-test → commit steps with concrete code
      blocks and exact `cargo test -p <crate> <selector>` invocations.
    - Spec coverage matrix at the end of the plan maps every section
      (§1–§12, including subsections) to the task(s) that implement it.

    ## Plan shape (19 tasks)

    1. Workspace + atlas-cli `indicatif` dep.
    2. `crates/atlas-engine/src/progress.rs` — `ProgressEvent`,
       `ProgressSink`, `Phase`, `PromptBreakdown`, `RecordingSink` test helper.
    3. `relpath_of` helper.
    4. `FixedpointConfig::progress` field (no events fired yet).
    5. `run_fixedpoint` fires `IterStart` / `Subcarve` / `IterEnd`, with
       `Subcarve` emitted *before* the LLM call (§7.2 ordering test).
    6. `PathologicalBackend` test extended for IterStart-per-iteration.
    7. Rewrite `atlas-cli/src/progress.rs` skeleton — new `Reporter`
       (impl `ProgressSink`), kept `ProgressMode`/`ProgressBackend`,
       `make_stderr_reporter` always returns `Arc<Reporter>`.
    8. `render_activity_msg` pure function covering the §6.1 message table.
    9. Reporter handles `Started` + `Phase`.
    10. Reporter handles `IterStart` + `IterEnd` (+ scrollback line via
        `MultiProgress::println`).
    11. Reporter handles `Subcarve` + `Surface` (sets sticky k/n,
        activates ETA via `set_length`/`set_position`).
    12. Reporter handles `Finished` (summary + breakdown line).
    13. `Reporter::on_llm_call` side-channel + sticky-k/n priority
        (engine k/n wins over LLM-tap msg).
    14. Token gauge bar tracks `TokenCounter`; hidden when `--no-budget`.
    15. Regression tests for `ProgressMode` → draw target + `finish`
        idempotence.
    16. Pipeline owns the Reporter; fires `Started` + `Phase(Seed/Fixedpoint
        /Project/Edges)` + `Finished` markers; passes sink in
        `FixedpointConfig`.
    17. Decompose L5 demand: pipeline runs a per-component
        `surface_of(&db, id)` loop emitting `Surface{k,n}` events before the
        final snapshot demand.
    18. `main.rs` wires the new Reporter API; drops legacy
        `announce_start` / `record` / `finish` calls.
    19. Integration regression test `byte_identity_l5_demand.rs` —
        pipeline run twice on a `TestBackend` fixture must produce
        byte-identical `components.yaml`.

    Final Verification section runs `cargo test --workspace`,
    `cargo clippy --workspace --all-targets`, and a hand-eyeballed real run.

    ## Self-review pass

    - Searched for placeholders (`TBD`/`TODO`/`implement later`/`similar to`):
      one false-positive on a narrative line was reworded; no real
      placeholders left.
    - Type-consistency check: every type, method, and accessor name
      introduced in early tasks (`Reporter`, `ProgressSink`,
      `breakdown_snapshot`, `current_msg`, `iter_history`,
      `activity_length`/`tokens_length`, `MsgInput`, `render_activity_msg`,
      `format_iter_end_line`, `format_finished_line`, `abbreviate`,
      `relpath_of`, `last_iteration`, `iter_live`, `sticky_kn`) is referenced
      consistently in later tasks.
    - Caught and fixed: tests originally accessed private `r.activity` /
      `r.tokens` directly; added `#[cfg(test)] pub(crate)` accessors in
      Task 7 and updated the test code in Tasks 11/14/15 accordingly.
    - Caught and fixed: `last_iteration` is read in Task 11 but is set on
      `IterStart`, which was implemented in Task 10. Made Task 11 explicitly
      modify the existing `IterStart` arm rather than adding a new one.

    ## Suggested follow-ups (next backlog cycles)

    - **Implementation task** — pick up the new plan and run it via
      `superpowers:subagent-driven-development` (recommended) or
      `superpowers:executing-plans`. The plan's exit criteria (workspace
      tests + clippy + visual smoke run) double as the implementation
      task's exit criteria.
    - **Memory note to write after impl lands** — close the existing memory
      `phase-level-progress-needs-engine-side-hooks-in-run-fixedpoint`
      (deferral closed) and add a new note capturing the
      `ProgressEvent` / `ProgressSink` design-shape decision so future
      L4-and-up event additions follow the same pattern.

    ## Did not commit

    Per the work-phase instructions, I did not commit the plan file —
    analyse-work will pick it up via `git status` and commit it.
- id: implement-engine-side-progressevent-and-run-fixedpoint-hooks
  title: Implement engine-side ProgressEvent and run_fixedpoint hooks
  category: feature
  status: not_started
  dependencies: []
  description: |
    Implement plan tasks 1–6 from
    `docs/superpowers/plans/2026-05-01-engine-progress-events.md`. This is the
    engine-side half of the design: the CLI side and pipeline wiring land in
    follow-up backlog items.

    **Scope (plan task numbers in parens):**

    1. Add `indicatif = "0.17"` to `[workspace.dependencies]` and to
       `crates/atlas-cli/Cargo.toml` (T1). The dep is consumed by atlas-cli
       later; declaring it now keeps T1 a clean prep step.
    2. Create `crates/atlas-engine/src/progress.rs` with `ProgressSink`
       trait, `ProgressEvent` enum, `Phase` enum, `PromptBreakdown`, and a
       `RecordingSink` test helper (T2). Re-export from `lib.rs`.
    3. Add `relpath_of(&ComponentEntry) -> PathBuf` helper in the same
       module; re-export (T3).
    4. Add `progress: Option<Arc<dyn ProgressSink>>` field to
       `FixedpointConfig`; hand-roll `Debug` because `dyn ProgressSink` is
       not `Debug` (T4).
    5. Modify `run_fixedpoint` to emit `IterStart` / `Subcarve` / `IterEnd`
       events, with `Subcarve` fired *before* the `subcarve_decision` call
       (spec §7.2 — the activity bar must show the in-flight target while
       the LLM call is in flight) (T5).
    6. Extend the existing `PathologicalBackend` test with a parallel
       assertion that `IterStart{n}` fires for each iteration up to the
       hard cap (T6).

    **Exit criteria:**

    - `cargo test -p atlas-engine` is green, including the new
      `recording_sink_captures_events_in_order`,
      `relpath_of_*`, `engine_emits_iter_start_subcarve_iter_end_in_order`,
      `engine_emits_subcarve_event_before_calling_decision`, and
      `pathological_backend_emits_iter_start_for_each_iteration_until_cap`
      tests.
    - `cargo check --workspace` is clean — `atlas-cli/pipeline.rs` and the
      evaluation harness still compile because they construct
      `FixedpointConfig` via `..FixedpointConfig::default()`, absorbing the
      new field.
    - No behavioural change observable from `atlas index`: the CLI does not
      yet install a sink, so `config.progress = None` and the new branches
      are silent.

    **Out of scope (handled in follow-up items):**

    - Anything inside `crates/atlas-cli/src/progress.rs` beyond the new
      indicatif dep.
    - Pipeline wiring of a `Reporter`.
    - L5 demand decomposition.

    **Plan reference:** `docs/superpowers/plans/2026-05-01-engine-progress-events.md`,
    sections "Task 1" through "Task 6". The plan contains every code block
    verbatim — execute step-by-step.
- id: implement-cli-reporter-and-indicatif-rendering
  title: Implement CLI Reporter and indicatif rendering
  category: feature
  status: not_started
  dependencies:
  - implement-engine-side-progressevent-and-run-fixedpoint-hooks
  description: |
    Implement plan tasks 7–15 from
    `docs/superpowers/plans/2026-05-01-engine-progress-events.md`. This
    delivers the CLI-side `Reporter` and indicatif rendering. Pipeline
    integration is a separate follow-up item (already backlog'd).

    Depends on the engine-side ProgressEvent item — this task consumes
    `atlas_engine::{Phase, ProgressEvent, ProgressSink, PromptBreakdown}`.

    **Scope (plan task numbers in parens):**

    7. Rewrite `crates/atlas-cli/src/progress.rs` with the new skeleton:
       `Reporter` (owns `MultiProgress` + activity bar + token gauge,
       implements `ProgressSink` as a stub for now), `ProgressMode`
       preserved, `make_stderr_reporter` always returns `Arc<Reporter>`
       (no longer `Option`), `ProgressBackend` retained but its `record`
       call replaced by a no-op `on_llm_call` stub. Apply the
       minimum-viable patch to `main.rs` so the binary still compiles (T7).
    8. Add `MsgInput` enum and `render_activity_msg` pure function covering
       every row of the spec §6.1 message table (T8).
    9. Reporter handles `Started` and `Phase` events — sets `last_msg`
       via `set_msg`/`render_activity_msg` (T9).
    10. Reporter handles `IterStart` (sets `iter_live`, `last_iteration`,
        resets activity bar length to 0 to suppress ETA outside k/n
        phases) and `IterEnd` (writes a permanent scrollback line via
        `MultiProgress::println` + appends to `iter_history`) (T10).
    11. Reporter handles `Subcarve` and `Surface` (sets sticky k/n,
        activates ETA via `set_length`/`set_position`). Uses
        `last_iteration` set in T10 (T11).
    12. Reporter handles `Finished` (formats summary line + breakdown line
        via `format_finished_line`/`abbreviate`; uses `multi.println`
        when drawing, plain `eprintln!` when hidden) (T12).
    13. Implement `Reporter::on_llm_call` side-channel: increments
        `breakdown` counters and updates `last_llm_target` but **does not
        clobber sticky k/n** — engine-set k/n wins. Tests assert this
        priority (spec §6.3) (T13).
    14. Token gauge bar tracks `TokenCounter` on every event; hides itself
        when budget is 0 (the `--no-budget` case) (T14).
    15. Regression tests for `ProgressMode` → draw target mapping
        (`Never` → hidden, `Always` → visible) and `finish` idempotence
        after `Finished` (T15).

    **Exit criteria:**

    - `cargo test -p atlas-cli progress::tests` is green: every test added
      in T7–T15 passes (~16 new tests).
    - `cargo build -p atlas-cli` is clean. `cargo clippy -p atlas-cli
      --all-targets` is clean (workspace `warnings = "deny"`).
    - The binary still runs end-to-end (no pipeline wiring yet, but
      `atlas index` should compile and behave exactly as before because
      no sink is passed through `FixedpointConfig`).
    - `Reporter` exposes `breakdown_snapshot()` plus the `#[cfg(test)]`
      accessors `current_msg`, `breakdown`, `iter_history`, `summary`,
      `activity_length`, `activity_position`, `tokens_length`,
      `tokens_position`, `drawing` — these are consumed by tests in this
      item and the next.

    **Out of scope (handled in follow-up item):**

    - Anything inside `pipeline.rs`. `Reporter` is constructed and tested
      in isolation; pipeline ownership lands in the next backlog item.
    - L5 demand decomposition.
    - Byte-identity regression test.

    **Plan reference:** `docs/superpowers/plans/2026-05-01-engine-progress-events.md`,
    sections "Task 7" through "Task 15". The plan contains every code
    block verbatim — execute step-by-step.
- id: wire-reporter-into-pipeline-decompose-l5-demand-and-add-byte-identity-regression
  title: Wire Reporter into pipeline, decompose L5 demand, and add byte-identity regression
  category: feature
  status: not_started
  dependencies:
  - implement-cli-reporter-and-indicatif-rendering
  description: |
    Implement plan tasks 16–19 from
    `docs/superpowers/plans/2026-05-01-engine-progress-events.md`. This is
    the integration step that wires the CLI `Reporter` into the pipeline,
    decomposes the L5 surface demand into per-component events, updates
    `main.rs`, and adds the byte-identity regression test.

    Depends on the CLI Reporter item — this task consumes the new
    `Reporter` API and assumes engine events fire correctly.

    **Scope (plan task numbers in parens):**

    16. Modify `pipeline::run_index` to take `reporter: Arc<Reporter>` as a
        new parameter (T16). Inside the function:
        - Fire `Started { root }` and `Phase(Seed)` after the
          `BudgetSentinel` is built but before priors load.
        - Fire `Phase(Fixedpoint)` immediately before `run_fixedpoint`;
          pass the reporter as `progress: Some(sink.clone())` in
          `FixedpointConfig`.
        - Fire `Phase(Project)` and (later) `Phase(Edges)` around the
          projection block.
        - Fire `Finished { … }` at the end of the success path,
          populating from `summary` and `reporter.breakdown_snapshot()`.
    17. Decompose the L5 demand inside the projection block: iterate
        `all_components(&db).filter(!deleted)`, emit `Surface{k,n,…}`
        per component, call `surface_of(&db, comp.id.clone())` per
        component before the final
        `components_yaml_snapshot_with_prompt_shas` call (T17). The
        snapshot then hits the now-warm cache. Output bytes must remain
        identical (spec §7.3).
    18. Update `main.rs` to construct `Reporter` via
        `make_stderr_reporter`, pass it through `run_index`, and call
        `reporter.finish()` after `run_index` returns. Drop the legacy
        `announce_start` / `r.finish()` / `Option<Reporter>` handling
        that the Task 7 minimum-viable patch left behind (T18).
    19. Add an integration test
        `crates/atlas-cli/tests/byte_identity_l5_demand.rs` that runs the
        pipeline twice on the same `TestBackend` fixture and asserts
        byte-equal `components.yaml` (T19). This is the regression that
        locks in §7.3.

    **Exit criteria:**

    - `cargo test --workspace` is green, including the new
      `byte_identity_l5_demand::pipeline_run_twice_produces_identical_components_yaml`
      integration test.
    - `cargo clippy --workspace --all-targets` is clean.
    - Hand-eyeballed live run on a real-sized repo (~20+ components) shows:
      - activity bar updates with `iter N · subcarve k/n (relpath)` while
        a subcarve LLM call is in flight,
      - token gauge reflects `tokens_used / budget`,
      - per-iteration `✓ iter N · X components · +Y sub-dirs · MM:SS`
        line lands in scrollback after each iteration,
      - final `[atlas] done · …` summary line is visible.
    - Memory note `phase-level-progress-needs-engine-side-hooks-in-run-fixedpoint`
      can now be retired (the deferral is closed). Do that as part of
      triage after this item lands.

    **Plan reference:** `docs/superpowers/plans/2026-05-01-engine-progress-events.md`,
    sections "Task 16" through "Task 19" plus the "Final verification"
    section.
