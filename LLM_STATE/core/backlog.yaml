tasks:
- id: commit-atlas-contracts-pinvalue-schema-changes
  title: Commit atlas-contracts PinValue schema changes
  category: feature
  status: done
  dependencies: []
  description: |
    **Priority: HIGH.** The atlas-contracts PinValue schema rewrite (custom `Serialize`/`Deserialize` via `deserialize_any` Visitor, replacing `#[serde(untagged)]`) was implemented in `/Users/antony/Development/atlas-contracts` but left uncommitted. The Atlas-side state update was committed separately; the atlas-contracts diff is the only outstanding piece.

    ## Context

    The PinValue serde rewrite spans two repos:
    - **atlas-contracts** (`/Users/antony/Development/atlas-contracts`) — three files changed: `crates/atlas-index/src/schema.rs`, `crates/atlas-index/src/yaml_io.rs`, `crates/atlas-index/tests/snapshots/components.overrides.yaml`.
    - **Atlas** — no source changes (only backlog state).

    The atlas-contracts diff is not yet committed. Until it is, the work is at risk of loss and any future `cargo update` or git+rev flip in Atlas will not include the fix.

    ## What to do

    1. `cd /Users/antony/Development/atlas-contracts`
    2. Verify the expected three files are dirty: `git status`
    3. Run `cargo test --workspace` to confirm all 55 tests pass.
    4. Run `cargo clippy --workspace --all-targets -- -D warnings` and `cargo fmt --check` — both should be clean.
    5. Commit with a message describing the PinValue natural-form deserialiser.
    6. Push to origin.

    ## Exit criteria

    - `git status` in atlas-contracts is clean.
    - Commit is on origin.
    - `cargo test --workspace` still passes post-commit.
  results: |
    ## Outcome: done

    The atlas-contracts PinValue serde rewrite is now committed to `origin/main` of `Linkuistics/atlas-contracts` as `d5d0dac` ("Replace PinValue serde(untagged) with deserialize_any Visitor").

    ## What was done

    1. Verified the three expected files were dirty: `crates/atlas-index/src/schema.rs`, `crates/atlas-index/src/yaml_io.rs`, `crates/atlas-index/tests/snapshots/components.overrides.yaml`.
    2. Ran `cargo test --workspace`: **102 tests pass** (52 + 3 + 47, plus 0 doc tests). The task description's "55 tests" was a stale snapshot — the workspace has grown since the description was written.
    3. Ran `cargo clippy --workspace --all-targets -- -D warnings` and `cargo fmt --check` — both clean.
    4. Staged the three files and committed with a substantive message describing:
       - why `#[serde(untagged)]` failed on natural-form input (untagged dispatch keys on field names, not scalar shape — `suppress_children: [...]` produced "did not match any variant"),
       - the new shape-based dispatch (bool → `Suppress`, seq → `SuppressChildren`, map → `Value`),
       - the legacy doubly-nested forms still accepted on input for backward compat,
       - the snapshot regeneration as a canonicalisation receipt.
    5. Pushed `c78bb39..d5d0dac` to `origin/main`.
    6. Re-ran `cargo test --workspace` post-commit: still 102/102 green.

    ## Exit criteria — all met

    - `git status` in atlas-contracts: clean, on `main`, up to date with `origin/main`.
    - Commit `d5d0dac` is on origin (local HEAD == origin/main hash confirmed).
    - `cargo test --workspace` passes post-commit.

    ## What worked

    - The natural input/output asymmetry the deserialiser implements (accept legacy + natural; emit natural only) is the right migration shape — pre-existing override files in the wild keep loading, fresh writes normalise to the new form.
    - The `components.overrides.yaml` snapshot edit is a forced canonicalisation: once the serialiser changed, any round-trip resave would diverge from the stored snapshot. Updating it inline keeps tests deterministic.
    - The new test `overrides_load_accepts_natural_inline_suppress_children_form` in `yaml_io.rs` directly pins the regression that motivated the rewrite — anyone removing the `visit_map` "suppress_children" arm in the future will see this test fail.

    ## What didn't / surprises

    - The task description claimed 55 tests; the workspace actually runs 102 across three test binaries. Not a problem — just a sign that the description was written some commits ago. Worth noting for triage if other backlog tasks anchor numeric expectations.
    - No Atlas-side changes were needed (or made). The whole task body was a sibling-repo commit, so this work-phase ran with a clean Atlas tree throughout.

    ## What this suggests next

    - **Memory entry already covers the lesson.** The existing memory "Serde untagged enum variants need unique field names" (`serde-untagged-enum-variants-need-unique-field-names.md`) already captures the rule. No memory update needed.
    - **Atlas does not yet consume this fix.** Atlas's `Cargo.lock` still pins the previous atlas-contracts revision (this commit is brand new on origin). When the natural-inline-form override regression matters in Atlas (likely via the `atlas index` CLI fed a hand-authored overrides file), a `cargo update -p atlas-contracts` or git+rev bump in Atlas's `Cargo.toml` will be needed. That's a small follow-on but not part of this task's exit criteria — leaving it for whoever next touches Atlas's contracts dependency.
    - **No follow-up task needed** for this regression itself; it is closed end-to-end on the contracts side.
- id: l3-prototype-map-style-classify-via-plain-anthropic-http-backend
  title: 'L3 prototype: map-style classify via plain Anthropic HTTP backend'
  category: feature
  status: not_started
  dependencies: []
  description: |
    **Priority: HIGH.** Direct path to unblocking large-monorepo analysis (currently a single L8 subcarve takes >15 min, agent-progress shows context-rotted exploratory reads). Validates the architectural shift in the companion epic before we commit to the full conversion.

    ## Context

    Atlas's current LLM runs go through `ClaudeCodeBackend`, which spawns a `claude -p --output-format stream-json --verbose` subprocess for every call. The agent has full tool access (Read, Grep, Glob, Bash) and a persistent conversation. For small classification queries — e.g. "is `crates/foo` a `rust-library`?" — this is structurally pessimised: each call has multi-second subprocess startup, the agent reads many files before answering, and context grows monotonically (rot risk).

    The cheapest, most-targeted prompt to convert is **L3 `is_component`**: it's already per-candidate, the inputs are bounded (manifest + doc headings + shebangs), and the output schema is a single JSON object. If a plain HTTP API call produces equivalent classifications in a fraction of the time, the case for converting L8 subcarve next is settled.

    ## Goal

    Prove that L3 classification can be served by a plain Anthropic HTTP API call with:

    - **Wall-time improvement: ≥5× median speedup** per call vs `ClaudeCodeBackend`.
    - **Accuracy preserved: kind-accuracy on the dev-workspace golden unchanged within 2 percentage points.**

    ## Scope

    ### Implementation

    - Add a minimal `AnthropicHttpBackend` in `crates/atlas-llm/src/`. Uses the Anthropic Rust SDK (or raw `reqwest`) — no Claude Code subprocess, no tool use.
    - Build the request from the existing L3 inputs (`build_llm_inputs` in `l3_classify.rs`): system prompt + ontology + manifest snippets, then the candidate-specific user prompt.
    - Output parses against the existing classify response schema (`crates/atlas-cli/src/prompts.rs` JSON-schema enforcement stays).
    - Wire it as an opt-in alternative: a new `--l3-backend http|claude-code` CLI flag, default `claude-code` so the spike is non-disruptive.
    - Read `ANTHROPIC_API_KEY` from env; fail-loud if missing when `--l3-backend http` is selected.

    ### Benchmark

    - Run `atlas index ~/Development/dev-workspace --budget <N> --l3-backend http` and record wall-time per L3 call from `latest-session.yaml`.
    - Run with `--l3-backend claude-code` for the same fixture as a baseline.
    - Compute median per-call wall-time for each backend.
    - Run `atlas-eval` against both result sets; compare `kind_accuracy` against the golden.
    - Record numbers in `evaluation/results/<date>-l3-http-spike.yaml`.

    ### Decision

    Spike succeeds (and unblocks the epic) when:

    - Median per-call wall-time drops by ≥5× under `--l3-backend http`.
    - `kind_accuracy` is within 2pp of the `claude-code` baseline.
    - LLM cache behaviour is unchanged (a re-run with no source changes is still byte-identical for the L3 outputs).

    If accuracy regresses materially, the spike's secondary deliverable is a list of L3 cases that needed the agentic backend's exploration — input for whether to keep an agentic L3 fallback or rework the prompt.

    ## Out of scope

    - L8 subcarve conversion (separate epic — this spike is what de-risks it).
    - L5 surface, L6 edges — those keep the agentic backend.
    - Prompt caching (the epic adds it; spike is "does the simple form work?").
    - Concurrency / parallelism (one call at a time is enough to measure speedup).
    - Extracting a router abstraction (the `--l3-backend` flag is good enough for the spike; the epic generalises).

    ## Exit criteria

    - `AnthropicHttpBackend` exists in atlas-llm and is selected via `--l3-backend http`.
    - Benchmark numbers recorded in `evaluation/results/`.
    - Brief notes in `docs/superpowers/specs/<date>-l3-http-spike-findings.md` with the verdict and any prompt-quality observations.
    - The follow-on epic (`map-reduce-llm-architecture`) either gets the green light, or gets concrete pivot guidance based on what didn't work.
- id: hand-author-second-golden-for-merged-monorepo
  title: Hand-author synthetic second golden for cross-target validation
  category: eval
  status: not_started
  dependencies: []
  description: |
    **Priority: MEDIUM.** Required for success criterion 6 (cross-target generalisation).

    **Context:** The merged monorepo target originally specified for this task is third-party and unavailable. Repurposed to use a synthetic second target from `~/Development/` — a multi-crate Cargo workspace structurally different from the dev-workspace root, sufficient to exercise cross-target stability.

    ## Target selection

    Pick a sibling repo under `~/Development/` that:
    - Is a multi-crate Cargo workspace (sub-carves differently from the top-level dev-workspace)
    - Has ≥ 10 components when Atlas sub-carves it
    - Is not the dev-workspace root itself (must exercise a different sub-carve path)

    Good candidates: any larger workspace-organised repo already present under `~/Development/` (e.g. Ravel, or another multi-crate workspace). Document the selection rationale in `notes.md`.

    ## Scope

    ### Golden

    - Hand-author `evaluation/goldens/<target-name>/components.golden.yaml` for the selected target.
    - Approximate size: tens of components (need not be hundreds — enough to stress the cross-target gap assertion).
    - `notes.md` documents: target selected, why it was chosen, and any boundary decisions that differ from what Atlas naturally produces.

    ### Cross-target validation

    - Run the tool against the synthetic target root; produce `evaluation/results/<date>-<target-name>.yaml`.
    - Compare metrics between the two goldens (dev-workspace and synthetic target):
      - Component coverage: both ≥ 0.9?
      - Spurious rate: both ≤ 0.1?
      - Kind accuracy: both ≥ 0.85?
      - Edge precision: both ≥ 0.8?
    - Gap between targets ≤ 5 percentage points on each axis (criterion 6).

    ### Iteration loop (if gap > 5pp)

    If the gap exceeds the bar, iterate on prompts, heuristics, or thresholds and re-run. Document changes in `evaluation/results/notes/<date>-iteration.md`.

    ## Out of scope

    - Ravel-Lite migration (separate tasks).
    - Performance optimisation.

    ## Exit criteria

    - Target selected and documented in `notes.md`.
    - Golden exists and passes all invariants.
    - Both goldens' metrics meet their individual targets AND cross-target gap ≤ 5pp.
    - Report HTML shows both targets with trend lines.
  results: |
    Repurposed in triage (2026-04-25): merged monorepo target is third-party and unavailable. Task pivoted to synthetic second target from `~/Development/` per option 2 in the blocked-cycle recommendation. Prior blocked-cycle context: `component-ontology` at `linkuistics/atlas-contracts` SHA `337c54368eb1393f2c3f8839a5e9042ce72cf964` matches Ravel-Lite's ontology surface 1:1; M2 migration is a pure import-path swap once Ravel-Lite is quiescent.
- id: verify-atlas-v1-success-criteria-end-to-end
  title: Verify Atlas v1 success criteria end-to-end
  category: eval
  status: not_started
  dependencies:
  - hand-author-second-golden-for-merged-monorepo
  description: |
    **Priority: HIGH.** Signs off v1.

    **Design reference:** §10.3 success criteria 1–6.

    ## Scope

    Execute each of the six v1 success criteria from §10.3 in order, document results in `evaluation/results/v1-signoff-<date>.md`:

    1. Run `atlas index /Users/antony/Development/` on a clean checkout. Assert coverage ≥ 0.9, spurious ≤ 0.1 against the golden.
    2. Re-run with no file changes. Assert 0 LLM calls (check the CLI's summary output) and byte-identical `components.yaml`.
    3. Touch one source file in one component. Re-run. Assert LLM call count equals exactly the affected component's `surface_of` plus its edge-neighbour count for edges. Log the numbers for future reference.
    4. Add a pin to `components.overrides.yaml` for one component (e.g., pin `role: my-custom-role`). Delete `components.yaml`. Re-run. Assert the pin appears in the regenerated `components.yaml` without human intervention.
    5. Run Ravel-Lite's `related-components` workflow against Atlas-produced YAMLs. Assert it runs to completion without schema errors.
    6. Run against the synthetic second target selected and evaluated in `hand-author-second-golden-for-merged-monorepo`. Assert coverage/spurious/kind/edge metrics are within 5 percentage points of the `~/Development/` run on each axis.

    ### Cross-plan dependency

    Criterion 5 cannot run until **Ravel-Lite's M5 migration** (`Migration M5: consume Atlas via atlas-index` in Ravel-Lite's backlog, formerly `ravel-lite-migration-m5-consume-atlas-via-atlas-index` in Atlas's) is complete. M5 lives in Ravel-Lite's plan, not Atlas's, so it cannot be expressed as a structural dependency here. Before starting this task, confirm M5 is `done` in Ravel-Lite by running:

    ```
    ravel-lite state backlog list /Users/antony/Development/Ravel-Lite/LLM_STATE/core --category migration
    ```

    If M5 is not done, criterion 5 must be skipped and recorded as "blocked on Ravel-Lite M5" in the sign-off report; the other five criteria can still proceed.

    ### Report

    - `evaluation/results/v1-signoff-<date>.md` contains each criterion, the commands run, the measured values, and pass/fail.
    - On any failure, the criterion lists the specific gap and what next steps would close it.

    ### Follow-up backlog

    - If any criterion fails by a wide margin, open a new backlog task to investigate. Do not silently move on.

    ## Out of scope

    - Everything in §10.2 (deferred).

    ## Exit criteria

    - All six criteria pass or have documented follow-up tasks (criterion 5 may be deferred pending Ravel-Lite M5).
    - Sign-off report committed to the Atlas repo.
    - An announcement-ready short summary written (optional) as `README-v1.md` documenting what Atlas v1 does and does not do.
- id: map-reduce-llm-architecture-with-backend-routing-for-context-light-analysis
  title: Map/reduce LLM architecture with backend routing for context-light analysis
  category: feature
  status: not_started
  dependencies:
  - l3-prototype-map-style-classify-via-plain-anthropic-http-backend
  description: |
    **Priority: MEDIUM (HIGH once spike unblocks).** Foundational architectural shift for Atlas's LLM strategy. Replaces the per-component agentic-Claude-Code model with a routed two-backend design: plain Anthropic HTTP for fixed-shape classification queries, agentic Claude Code only for genuinely exploratory work. Combines this with map/reduce for L8 subcarve so a component with N immediate sub-directories costs N small parallel calls instead of one long-context-rotted agent run.

    ## Context

    Atlas's current LLM strategy:

    - Every L3, L5, and L8 prompt runs through `ClaudeCodeBackend`, which spawns a Claude Code subprocess with full tool access for each call.
    - One agent call covers the entire scope of the prompt (one component for L5, one whole subcarve decision for L8).
    - A single L8 subcarve on a real monorepo takes >15 min in observed practice (agent-progress sub-line shows extensive exploratory reads).

    Three structural problems:

    1. **Context rot.** As the agent reads files within one call, its context grows monotonically; attention smears, decisions degrade, latency climbs.
    2. **No reuse across components.** Two Rust crates with near-identical evidence each pay full agent-call cost. There is no caching across components because the per-call prompt is so large that no two prompts are byte-equal.
    3. **No parallelism.** Per-iteration loops are serial: `iter 0 · subcarve 1/74` runs to completion before 2/74 starts.

    The diagnostic lever is the agent-progress sub-line shipped in v1.2.0: when it shows the agent reading hundreds of files for one decision, the call is doing work that small fixed-shape prompts could each answer in seconds.

    ## Goal

    Re-architect Atlas's LLM dispatch with the right scope per prompt — narrow where the question is genuinely local, broad where it is genuinely cross-cutting:

    - **Per-candidate / per-component classification prompts** (L3 `is_component`, L8 per-subdir verdict): run on a plain Anthropic HTTP backend with prompt caching and structured JSON output. No subprocess, no tool use, sub-second per call.
    - **Per-component surface extraction** (L5 `Stage1Surface`): keep agentic — extracting an API surface needs to read source files, but the scope is bounded to one component's tree.
    - **Cross-component edge synthesis** (L6 `Stage2Edges`): **stays cross-component, agentic, and broadly contextual.** This is where Atlas earns its keep on tech-debt-heavy codebases — components are linked through protocols, schemas, formats, APIs, communication patterns, and endpoints, none of which are visible in any single component's surface alone. Narrowing this prompt would defeat Atlas's core value. Map/reduce simplification applies *only* to prompts whose answer is a property of one candidate; L6 synthesises a relation across many.
    - **L8 subcarve becomes map/reduce:** one HTTP call per immediate subdirectory of the component being carved (the "map"); deterministic Rust assembles per-subdir verdicts into the subcarve plan (the "reduce"). Map calls run in parallel under a bounded concurrency limit.

    Target: a 74-subcarve first-iteration on a real monorepo completes in **≤ 5 min** (current state: >>15 min), without sacrificing edge-detection quality at L6.

    ## Scope

    ### Backend routing

    - `LlmBackend` trait gains routing semantics — either a `BackendRouter` decorator that dispatches by `PromptId`, or a per-`PromptId` policy table consulted by the engine before calling.
    - Default routing reflects the prompt's *scope*, not just its model:
      - `Classify` (per-candidate, local) → HTTP backend.
      - `Subcarve` (per-subdir, local) → HTTP backend with map/reduce.
      - `Stage1Surface` (per-component, bounded local) → Claude Code backend, scoped to one component tree.
      - `Stage2Edges` (cross-component, global) → Claude Code backend, full multi-component context. This is the layer that finds protocol/schema/API links and must see surfaces across components together.
    - Configurable via CLI / env for testing, but the defaults encode the design.

    ### Plain HTTP backend

    - New `AnthropicHttpBackend` in `crates/atlas-llm/`. Uses the Anthropic Rust SDK (or raw `reqwest` + `serde_json`). Reads `ANTHROPIC_API_KEY`.
    - **Prompt caching enabled** — system prompt + ontology + component-kinds vocabulary become a `cache_control` block, so the static prefix is paid once per ~5 minutes across all calls.
    - **Structured JSON output** validated against the existing per-prompt JSON schemas in `crates/atlas-cli/src/prompts.rs`.

    ### L8 subcarve map/reduce

    - Replace today's "one agent call asks 'what are the sub-components of X'" with:
      - Map: for each immediate sub-directory of X, build a prompt containing only that subdir's name, listing of top-level entries, and primary manifest snippet (~500 tokens). Fire one HTTP call. Output: `{ is_component, kind, role, evidence }`.
      - Reduce: deterministic — collect verdicts, build the `SubcarvePlan`. No second LLM call.
    - Bounded concurrency executor (start with 8-16 in flight; tune empirically) so 74 map calls parallelise safely.

    ### Cache compatibility

    - Existing `llm-cache.json` is content-addressed — small map prompts produce small, deterministic cache keys, which is what we want. Verify the cache fingerprint includes the *post-truncation* prompt body so behaviour is reproducible.
    - A monorepo with N nearly-identical Rust crates should see most of those N L3 calls collapse to **one cache entry on first run** because the sanitised prompt is byte-equal. Quantify the hit-rate change.

    ### Per-call context budget

    - Each map call has a hard input cap (e.g., 4 KB pre-prompt content). Request builder enforces it deterministically (top-N entries by lexicographic sort, then "this is a sample" suffix). Keeps prompts cheap and reproducible.

    ### Execution / concurrency

    - Add a Tokio runtime in atlas-cli (or use the existing one if Claude Code's backend already drives one) and a bounded `mpsc` / `Semaphore` to gate concurrent HTTP calls.
    - Errors per map-call are isolated: one failure marks one subdir's verdict as `unknown` rather than poisoning the whole subcarve. Plan-assembly degrades gracefully.

    ### Goldens / eval

    - Re-run dev-workspace and the synthetic-second target through the new pipeline. Update goldens only where structural divergence is intentional (e.g., the map-step is more granular than the agent-step would have been).
    - Record before/after wall-time and accuracy in `evaluation/results/`.

    ## Risks and unknowns

    - **Cross-cutting reasoning loss within map calls.** A map-step subagent looking at `crates/foo/src/io/` doesn't see `crates/foo/src/db/`. For L8 per-subdir verdicts this is the right shape; for L3 verify the existing prompt doesn't lean on cross-file context the new shape can't supply. Spike feedback feeds this.
    - **L6 edge-synthesis quality must not regress.** The architectural change narrows L3 and L8 specifically because their answer is local; L6 has to remain *broader*, not narrower. A regression here would mean Atlas misses the cross-component links (shared protocols, schemas, REST endpoints, message-bus topics) that motivate the project. Track L6's `edge_precision` and `edge_recall` against the goldens through the conversion and treat any drop ≥ 2pp as a blocker.
    - **API rate limits.** 74 concurrent calls × multiple iterations could hit per-minute limits on the Anthropic API. Bounded concurrency is the lever; calibrate against published limits.
    - **`llm-cache.json` byte-identity.** With map/reduce the cache file shape may change (smaller entries, more of them). Verify `--dry-run` re-runs are still byte-identical post-conversion.
    - **Mixed-backend `LlmFingerprint`.** Today the fingerprint encodes one backend per run. The router needs to merge two backends' fingerprints into a stable composite, or each `Classification` records the backend used.

    ## Out of scope

    - L5 surface and L6 edges conversion — keep agentic, address in a follow-on if/when needed.
    - Replacing Claude Code itself; `ClaudeCodeBackend` stays for the genuinely exploratory prompts.
    - A user-pluggable backend system (Ollama / OpenAI / etc.) — useful but a larger surface.

    ## Exit criteria

    - `AnthropicHttpBackend` lands and is wired as the default for `Classify` and `Subcarve` prompt ids.
    - L8 subcarve runs in map/reduce mode with bounded concurrency.
    - Real-monorepo first-iteration L8 wall-time **≤ 5 min** (current >>15 min) on the user's target.
    - `kind_accuracy` against the dev-workspace golden is within 2pp of the pre-conversion baseline.
    - `--dry-run` re-run produces byte-identical outputs to the prior run.
    - Documentation: a section in the design spec (`docs/superpowers/specs/`) describing the routing rules, map/reduce shape, and concurrency model.
