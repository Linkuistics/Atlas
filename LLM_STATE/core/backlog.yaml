tasks:
- id: hand-author-second-golden-for-merged-monorepo
  title: Hand-author synthetic second golden for cross-target validation
  category: eval
  status: not_started
  dependencies: []
  description: |
    **Priority: MEDIUM.** Required for success criterion 6 (cross-target generalisation).

    **Context:** The merged monorepo target originally specified for this task is third-party and unavailable. Repurposed to use a synthetic second target from `~/Development/` — a multi-crate Cargo workspace structurally different from the dev-workspace root, sufficient to exercise cross-target stability.

    ## Target selection

    Pick a sibling repo under `~/Development/` that:
    - Is a multi-crate Cargo workspace (sub-carves differently from the top-level dev-workspace)
    - Has ≥ 10 components when Atlas sub-carves it
    - Is not the dev-workspace root itself (must exercise a different sub-carve path)

    Good candidates: any larger workspace-organised repo already present under `~/Development/` (e.g. Ravel, or another multi-crate workspace). Document the selection rationale in `notes.md`.

    ## Scope

    ### Golden

    - Hand-author `evaluation/goldens/<target-name>/components.golden.yaml` for the selected target.
    - Approximate size: tens of components (need not be hundreds — enough to stress the cross-target gap assertion).
    - `notes.md` documents: target selected, why it was chosen, and any boundary decisions that differ from what Atlas naturally produces.

    ### Cross-target validation

    - Run the tool against the synthetic target root; produce `evaluation/results/<date>-<target-name>.yaml`.
    - Compare metrics between the two goldens (dev-workspace and synthetic target):
      - Component coverage: both ≥ 0.9?
      - Spurious rate: both ≤ 0.1?
      - Kind accuracy: both ≥ 0.85?
      - Edge precision: both ≥ 0.8?
    - Gap between targets ≤ 5 percentage points on each axis (criterion 6).

    ### Iteration loop (if gap > 5pp)

    If the gap exceeds the bar, iterate on prompts, heuristics, or thresholds and re-run. Document changes in `evaluation/results/notes/<date>-iteration.md`.

    ## Out of scope

    - Ravel-Lite migration (separate tasks).
    - Performance optimisation.

    ## Exit criteria

    - Target selected and documented in `notes.md`.
    - Golden exists and passes all invariants.
    - Both goldens' metrics meet their individual targets AND cross-target gap ≤ 5pp.
    - Report HTML shows both targets with trend lines.
  results: |
    Repurposed in triage (2026-04-25): merged monorepo target is third-party and unavailable. Task pivoted to synthetic second target from `~/Development/` per option 2 in the blocked-cycle recommendation. Prior blocked-cycle context: `component-ontology` at `linkuistics/atlas-contracts` SHA `337c54368eb1393f2c3f8839a5e9042ce72cf964` matches Ravel-Lite's ontology surface 1:1; M2 migration is a pure import-path swap once Ravel-Lite is quiescent.
- id: verify-atlas-v1-success-criteria-end-to-end
  title: Verify Atlas v1 success criteria end-to-end
  category: eval
  status: not_started
  dependencies:
  - hand-author-second-golden-for-merged-monorepo
  description: |
    **Priority: HIGH.** Signs off v1.

    **Design reference:** §10.3 success criteria 1–6.

    ## Scope

    Execute each of the six v1 success criteria from §10.3 in order, document results in `evaluation/results/v1-signoff-<date>.md`:

    1. Run `atlas index /Users/antony/Development/` on a clean checkout. Assert coverage ≥ 0.9, spurious ≤ 0.1 against the golden.
    2. Re-run with no file changes. Assert 0 LLM calls (check the CLI's summary output) and byte-identical `components.yaml`.
    3. Touch one source file in one component. Re-run. Assert LLM call count equals exactly the affected component's `surface_of` plus its edge-neighbour count for edges. Log the numbers for future reference.
    4. Add a pin to `components.overrides.yaml` for one component (e.g., pin `role: my-custom-role`). Delete `components.yaml`. Re-run. Assert the pin appears in the regenerated `components.yaml` without human intervention.
    5. Run Ravel-Lite's `related-components` workflow against Atlas-produced YAMLs. Assert it runs to completion without schema errors.
    6. Run against the synthetic second target selected and evaluated in `hand-author-second-golden-for-merged-monorepo`. Assert coverage/spurious/kind/edge metrics are within 5 percentage points of the `~/Development/` run on each axis.

    ### Cross-plan dependency

    Criterion 5 cannot run until **Ravel-Lite's M5 migration** (`Migration M5: consume Atlas via atlas-index` in Ravel-Lite's backlog, formerly `ravel-lite-migration-m5-consume-atlas-via-atlas-index` in Atlas's) is complete. M5 lives in Ravel-Lite's plan, not Atlas's, so it cannot be expressed as a structural dependency here. Before starting this task, confirm M5 is `done` in Ravel-Lite by running:

    ```
    ravel-lite state backlog list /Users/antony/Development/Ravel-Lite/LLM_STATE/core --category migration
    ```

    If M5 is not done, criterion 5 must be skipped and recorded as "blocked on Ravel-Lite M5" in the sign-off report; the other five criteria can still proceed.

    ### Report

    - `evaluation/results/v1-signoff-<date>.md` contains each criterion, the commands run, the measured values, and pass/fail.
    - On any failure, the criterion lists the specific gap and what next steps would close it.

    ### Follow-up backlog

    - If any criterion fails by a wide margin, open a new backlog task to investigate. Do not silently move on.

    ## Out of scope

    - Everything in §10.2 (deferred).

    ## Exit criteria

    - All six criteria pass or have documented follow-up tasks (criterion 5 may be deferred pending Ravel-Lite M5).
    - Sign-off report committed to the Atlas repo.
    - An announcement-ready short summary written (optional) as `README-v1.md` documenting what Atlas v1 does and does not do.
- id: add-push-state-check-to-release-build-sh-and-release-publish-sh
  title: Add push-state check to release-build.sh and release-publish.sh
  category: release
  status: done
  dependencies: []
  description: |
    **Status at start of session:** local `main` was 33 commits ahead of `origin/main` (32 from prior work + the upcoming bug-fix commit). `release-build.sh::require_clean_tagged_tree` only validated (a) clean tree and (b) HEAD on a tagged commit; nothing checked whether HEAD or the tag had been pushed to origin. `release-publish.sh::preflight` likewise only checked tooling/auth and dist artifacts. Result: forgetting `git push --follow-tags` between `cargo release --execute` and `./scripts/release-build.sh` would publish a GitHub Release whose underlying commit was absent from `origin/main`.

    **Fix:** added a shared-shape `require_pushed_to_origin <version>` helper to both scripts. It does:

    1. `git fetch --quiet --tags origin` — refresh remote refs and tags without pruning.
    2. `git merge-base --is-ancestor HEAD origin/main` — HEAD must be reachable from `origin/main`.
    3. `git ls-remote --exit-code --tags origin refs/tags/v<version>` — the release tag must exist on origin.

    `release-build.sh` calls it after `require_clean_tagged_tree` (fail-fast before the cold zigbuild). `release-publish.sh` calls it after `verify_tag_matches_artifacts` for defense in depth (the build's check could go stale if tags were moved between build and publish).

    **Choice points worth recording:**

    - **Ancestry over equality.** Used `merge-base --is-ancestor HEAD origin/main` rather than `HEAD == origin/main` SHA equality. Strict equality would reject benign cases (e.g. someone else lands a commit on origin/main between push and build); ancestry catches the actual bug — "I forgot to push" — without false positives.
    - **Helper duplicated in both scripts** rather than sourced from a shared `scripts/lib/`. Each script is self-contained today; a 10-line helper doesn't justify introducing a `lib/` layer.
    - **No prune flag on fetch.** `git fetch --quiet --tags origin` (no `--prune`/`--prune-tags`) — a release script shouldn't impose tag-pruning side effects on the operator's working tree.
  results: |
    Implemented and verified end-to-end as part of cutting v1.1.0.

    **Done:**

    - Added `require_pushed_to_origin` to both `scripts/release-build.sh` and `scripts/release-publish.sh`. Each invocation: `git fetch --quiet --tags origin`, then `merge-base --is-ancestor HEAD origin/main`, then `ls-remote --exit-code --tags origin refs/tags/v<version>`. Failure messages name the exact remediation (`git push origin main --follow-tags` / `git push origin v<version>`).
    - `release-build.sh::main` calls it after `require_clean_tagged_tree` so the cold zigbuild never starts on an unpushed commit.
    - `release-publish.sh::main` calls it after `verify_tag_matches_artifacts` for defense in depth.
    - Committed in `eeb7736` ("fix(release): verify HEAD and tag are pushed before building/publishing").
    - Both scripts pass `bash -n` syntax check.

    **Verified end-to-end against a real release:**

    - 33 commits (32 prior + the bug-fix) pushed cleanly to `origin/main` before `cargo release minor --execute` (1.0.1 → 1.1.0, commit `615b554`, annotated tag `v1.1.0`).
    - After `git push origin main --follow-tags`, the new check ran silently and passed during `release-build.sh`. Built four tarballs (aarch64/x86_64 macOS + Linux), rendered formula at `target/dist/atlas.rb` with version `1.1.0` and SHA-256 sums matching the tarballs.
    - `release-publish.sh` created GitHub Release at https://github.com/Linkuistics/Atlas/releases/tag/v1.1.0 and pushed the formula to `linkuistics/homebrew-taps` (`04504f9`).
    - `brew reinstall linkuistics/taps/atlas` succeeded; `atlas --version` reports `atlas 1.1.0 (v1.1.0, built 2026-05-01T01:21:35Z)` — clean, no `-dirty` suffix.

    **Suggests next:**

    - Future cleanup: if the release scripts grow more shared helpers, extract `scripts/lib/release-checks.sh` and source from both. Single helper today doesn't justify the structure.
    - Worth considering: a similar push check could guard `cargo release` itself via a `pre-release-hook` in `release.toml`, so the bug is caught even earlier (at `cargo release` invocation rather than at build time). Out of scope for this task; surface in triage if the failure mode recurs.
