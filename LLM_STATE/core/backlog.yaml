tasks:
- id: hand-author-second-golden-for-merged-monorepo
  title: Hand-author synthetic second golden for cross-target validation
  category: eval
  status: not_started
  dependencies: []
  description: |
    **Priority: MEDIUM.** Required for success criterion 6 (cross-target generalisation).

    **Context:** The merged monorepo target originally specified for this task is third-party and unavailable. Repurposed to use a synthetic second target from `~/Development/` — a multi-crate Cargo workspace structurally different from the dev-workspace root, sufficient to exercise cross-target stability.

    ## Target selection

    Pick a sibling repo under `~/Development/` that:
    - Is a multi-crate Cargo workspace (sub-carves differently from the top-level dev-workspace)
    - Has ≥ 10 components when Atlas sub-carves it
    - Is not the dev-workspace root itself (must exercise a different sub-carve path)

    Good candidates: any larger workspace-organised repo already present under `~/Development/` (e.g. Ravel, or another multi-crate workspace). Document the selection rationale in `notes.md`.

    ## Scope

    ### Golden

    - Hand-author `evaluation/goldens/<target-name>/components.golden.yaml` for the selected target.
    - Approximate size: tens of components (need not be hundreds — enough to stress the cross-target gap assertion).
    - `notes.md` documents: target selected, why it was chosen, and any boundary decisions that differ from what Atlas naturally produces.

    ### Cross-target validation

    - Run the tool against the synthetic target root; produce `evaluation/results/<date>-<target-name>.yaml`.
    - Compare metrics between the two goldens (dev-workspace and synthetic target):
      - Component coverage: both ≥ 0.9?
      - Spurious rate: both ≤ 0.1?
      - Kind accuracy: both ≥ 0.85?
      - Edge precision: both ≥ 0.8?
    - Gap between targets ≤ 5 percentage points on each axis (criterion 6).

    ### Iteration loop (if gap > 5pp)

    If the gap exceeds the bar, iterate on prompts, heuristics, or thresholds and re-run. Document changes in `evaluation/results/notes/<date>-iteration.md`.

    ## Out of scope

    - Ravel-Lite migration (separate tasks).
    - Performance optimisation.

    ## Exit criteria

    - Target selected and documented in `notes.md`.
    - Golden exists and passes all invariants.
    - Both goldens' metrics meet their individual targets AND cross-target gap ≤ 5pp.
    - Report HTML shows both targets with trend lines.
  results: |
    Repurposed in triage (2026-04-25): merged monorepo target is third-party and unavailable. Task pivoted to synthetic second target from `~/Development/` per option 2 in the blocked-cycle recommendation. Prior blocked-cycle context: `component-ontology` at `linkuistics/atlas-contracts` SHA `337c54368eb1393f2c3f8839a5e9042ce72cf964` matches Ravel-Lite's ontology surface 1:1; M2 migration is a pure import-path swap once Ravel-Lite is quiescent.
- id: verify-atlas-v1-success-criteria-end-to-end
  title: Verify Atlas v1 success criteria end-to-end
  category: eval
  status: not_started
  dependencies:
  - hand-author-second-golden-for-merged-monorepo
  description: |
    **Priority: HIGH.** Signs off v1.

    **Design reference:** §10.3 success criteria 1–6.

    ## Scope

    Execute each of the six v1 success criteria from §10.3 in order, document results in `evaluation/results/v1-signoff-<date>.md`:

    1. Run `atlas index /Users/antony/Development/` on a clean checkout. Assert coverage ≥ 0.9, spurious ≤ 0.1 against the golden.
    2. Re-run with no file changes. Assert 0 LLM calls (check the CLI's summary output) and byte-identical `components.yaml`.
    3. Touch one source file in one component. Re-run. Assert LLM call count equals exactly the affected component's `surface_of` plus its edge-neighbour count for edges. Log the numbers for future reference.
    4. Add a pin to `components.overrides.yaml` for one component (e.g., pin `role: my-custom-role`). Delete `components.yaml`. Re-run. Assert the pin appears in the regenerated `components.yaml` without human intervention.
    5. Run Ravel-Lite's `related-components` workflow against Atlas-produced YAMLs. Assert it runs to completion without schema errors.
    6. Run against the synthetic second target selected and evaluated in `hand-author-second-golden-for-merged-monorepo`. Assert coverage/spurious/kind/edge metrics are within 5 percentage points of the `~/Development/` run on each axis.

    ### Cross-plan dependency

    Criterion 5 cannot run until **Ravel-Lite's M5 migration** (`Migration M5: consume Atlas via atlas-index` in Ravel-Lite's backlog, formerly `ravel-lite-migration-m5-consume-atlas-via-atlas-index` in Atlas's) is complete. M5 lives in Ravel-Lite's plan, not Atlas's, so it cannot be expressed as a structural dependency here. Before starting this task, confirm M5 is `done` in Ravel-Lite by running:

    ```
    ravel-lite state backlog list /Users/antony/Development/Ravel-Lite/LLM_STATE/core --category migration
    ```

    If M5 is not done, criterion 5 must be skipped and recorded as "blocked on Ravel-Lite M5" in the sign-off report; the other five criteria can still proceed.

    ### Report

    - `evaluation/results/v1-signoff-<date>.md` contains each criterion, the commands run, the measured values, and pass/fail.
    - On any failure, the criterion lists the specific gap and what next steps would close it.

    ### Follow-up backlog

    - If any criterion fails by a wide margin, open a new backlog task to investigate. Do not silently move on.

    ## Out of scope

    - Everything in §10.2 (deferred).

    ## Exit criteria

    - All six criteria pass or have documented follow-up tasks (criterion 5 may be deferred pending Ravel-Lite M5).
    - Sign-off report committed to the Atlas repo.
    - An announcement-ready short summary written (optional) as `README-v1.md` documenting what Atlas v1 does and does not do.
- id: set-up-homebrew-release-pipeline-for-atlas-binary
  title: Set up Homebrew release pipeline for atlas binary
  category: release
  status: done
  dependencies: []
  description: |
    **Priority: MEDIUM.** Sets up Atlas's release pipeline so the binary can be installed via Homebrew using the same local-build flow already in place for Ravel-Lite and TestAnyware.

    ## Context

    Atlas's distribution model is "Homebrew bottles built locally, formula pushed to a tap" (see memory: `project_distribution_brew_bottles`). Ravel-Lite is the closer analogue (pure Rust, multi-target via `cargo-zigbuild` for Linux, native `cargo build` for macOS, single CLI binary). TestAnyware is a single-target Swift bundle and not a fit.

    Atlas's binary is named `atlas` (defined in `crates/atlas-cli/Cargo.toml` as `[[bin]] name = "atlas"`). Repo: `linkuistics/Atlas`. License: Apache-2.0.

    ## Scope

    Mirror Ravel-Lite's release pipeline, name-swapping `ravel-lite` → `atlas`:

    - `release.toml` at repo root — `cargo-release` configuration (publish=false, push=false, tag-name `v{{version}}`).
    - `scripts/release-doctor.sh` — preflight check for `zig`, `cargo-zigbuild`, four rustup targets (aarch64/x86_64 × apple-darwin/unknown-linux-gnu), and `gh` auth.
    - `scripts/release-build.sh` — for the current git tag, build all four targets, stage `bin/atlas` plus `LICENSE` and `README.md`, produce `target/dist/atlas-v<ver>-<target>.tar.xz` per target, and render `target/dist/atlas.rb` from the template.
    - `scripts/release-publish.sh` — create GitHub Release on `linkuistics/Atlas` for `v<ver>`, upload all tarballs, copy formula into `$ATLAS_TAP_DIR/Formula/atlas.rb`, commit, push.
    - `scripts/templates/atlas.rb.tmpl` — Homebrew formula template with on_macos/on_linux/on_arm/on_intel branches.
    - `chmod +x` on the three scripts.

    ## Out of scope

    - Running an actual release (no tag exists yet).
    - CI workflow changes.
    - Cross-crate path-dep flip to git+rev (separate concern, only at first publication).

    ## Exit criteria

    - `scripts/release-doctor.sh` is runnable and reports its findings (it checks only — never installs).
    - `scripts/release-build.sh` is syntactically valid (`bash -n`) and passes its non-build preflight.
    - Formula template substitution variables match what `release-build.sh` renders (no missing `@TOKEN@`).
    - The set of files matches Ravel-Lite's pipeline 1:1 with name swaps.
    - Any generated paths (`target/dist/`) are already covered by `.gitignore` (likely already, via `target/`).
  results: |
    ## What was done

    Mirrored Ravel-Lite's release pipeline 1:1 with name swaps. Files added at the Atlas repo root:

    - `release.toml` — `cargo-release` config (publish=false, push=false, tag pattern `v{{version}}`).
    - `scripts/release-doctor.sh` — preflight: `zig`, `cargo-zigbuild`, four rustup targets, `gh` auth.
    - `scripts/release-build.sh` — for each of the four targets, native `cargo build --release` (Darwin) or `cargo zigbuild --release` (Linux, glibc 2.17 floor); stages `bin/atlas` + `LICENSE` + `README.md`; produces `target/dist/atlas-v<ver>-<target>.tar.xz`; renders `target/dist/atlas.rb`.
    - `scripts/release-publish.sh` — creates GitHub Release on `linkuistics/Atlas`, uploads tarballs, copies formula into `$ATLAS_TAP_DIR/Formula/atlas.rb` (default `~/Development/homebrew-taps`), commits, pushes.
    - `scripts/templates/atlas.rb.tmpl` — Homebrew formula template (`class Atlas`, on_macos/on_linux × on_arm/on_intel branches).

    All three shell scripts are executable.

    ## Verification

    - `bash -n` syntax-check on all three scripts: pass.
    - `scripts/release-doctor.sh` runs and reports all prerequisites already met on this machine (zig 0.16.0, cargo-zigbuild available, all four rustup targets installed, gh authenticated).
    - Template substitution tokens (`@VERSION@`, four `@SHA_<TARGET>@`) match the `sed` substitutions in `release-build.sh` exactly — no orphaned tokens would survive a render.
    - `target/` is already in `.gitignore`, so `target/dist/` is implicitly ignored. No `.gitignore` change needed.

    ## What works

    - Doctor is runnable today and exits 0 on this machine.
    - Scripts produce a buildable artefact tree once a `v<x.y.z>` tag exists. A first release would go: `cargo install cargo-release` → `cargo release patch --execute` → `git push origin main --follow-tags` → `scripts/release-build.sh` → inspect `target/dist/` → `scripts/release-publish.sh`.

    ## What didn't / what to watch

    - **No actual release was attempted.** Atlas has no tag yet (`crates/atlas-cli/Cargo.toml` is at version `0.1.0` with no `v0.1.0` tag), so `release-build.sh` would fail at `require_clean_tagged_tree`. That's expected — it's the operator's call to cut the first tag.
    - **Path deps to `atlas-contracts` resolve at build time.** Per memory `cross-crate-include-str-paths-break-crates-io-publication`, this is fine for Homebrew bottles (cargo build resolves locally); only `cargo publish` would care.
    - **First publication needs a tap.** `release-publish.sh` requires `$ATLAS_TAP_DIR` to be a git checkout (default `~/Development/homebrew-taps`). The tap repo (e.g. `linkuistics/homebrew-taps`) must already exist with at least an empty `Formula/` directory.

    ## Suggested next steps

    - When ready to cut a first release: `cargo release patch --execute` (or pick a version), then run the build/publish scripts.
    - Optionally: add a tiny README section under "Status" or a new "Installation" section pointing at `brew install linkuistics/taps/atlas` once a release exists. Deferred to keep this task scoped.
    - Optionally: a `cargo dist`-style GitHub Actions workflow if Linkuistics ever wants the build to run in CI rather than on a developer machine. Out of scope for the local-build pattern this task replicated.
