tasks:
- id: verify-atlas-v1-success-criteria-end-to-end
  title: Verify Atlas v1 success criteria end-to-end
  category: eval
  status: not_started
  dependencies: []
  description: |
    **Priority: HIGH.** Signs off v1.

    **Design reference:** §10.3 success criteria 1–6.

    ## Scope

    Execute each of the six v1 success criteria from §10.3 in order, document results in `evaluation/results/v1-signoff-<date>.md`:

    1. Run `atlas index /Users/antony/Development/` on a clean checkout. Assert coverage ≥ 0.9, spurious ≤ 0.1 against the golden.
    2. Re-run with no file changes. Assert 0 LLM calls (check the CLI's summary output) and byte-identical `components.yaml`.
    3. Touch one source file in one component. Re-run. Assert LLM call count equals exactly the affected component's `surface_of` plus its edge-neighbour count for edges. Log the numbers for future reference.
    4. Add a pin to `components.overrides.yaml` for one component (e.g., pin `role: my-custom-role`). Delete `components.yaml`. Re-run. Assert the pin appears in the regenerated `components.yaml` without human intervention.
    5. Run Ravel-Lite's `related-components` workflow against Atlas-produced YAMLs. Assert it runs to completion without schema errors.
    6. **Cross-target structural stability.** Captured run reference: `evaluation/results/2026-05-04-dull-no-pins/`. The structural-stability bar (replacing the original "metrics within 5pp" bar after `hand-author-second-golden-for-merged-monorepo` was deleted):
       - Pipeline completes without `LlmError::Setup` or `LlmError::BudgetExhausted`.
       - ≥10 components emitted (sanity floor).
       - All four output YAMLs are valid YAML with the expected top-level keys (`components`, `externals`, `edges`, `subsystems`).
       - ≥80% of components have non-empty surface entries (counted from `llm-cache.json` entries with `prompt: stage1-surface` whose response body has at least one populated `SurfaceRecord` field).
       - L6 edges file has populated edges (`edges:` list non-empty in `related-components.yaml`).

       The 2026-05-04 captured run on dull passed 4 of 5 of these checks: the L6 edges check failed because the Stage 2 `claude -p` subprocess hung at tool 13 and had to be killed (forcing the soft-fail `Vec::new()` path). The other four pipeline-stability checks all passed (162 components emitted, 99% surface coverage, schemas valid). For v1 sign-off, treat the captured run's structural metrics as the criterion-6 reference; if a fresh run can complete L6 cleanly the criterion lifts to 5/5.

    ### Cross-plan dependency

    Criterion 5 cannot run until **Ravel-Lite's M5 migration** (`Migration M5: consume Atlas via atlas-index` in Ravel-Lite's backlog, formerly `ravel-lite-migration-m5-consume-atlas-via-atlas-index` in Atlas's) is complete. M5 lives in Ravel-Lite's plan, not Atlas's, so it cannot be expressed as a structural dependency here. Before starting this task, confirm M5 is `done` in Ravel-Lite by running:

    ```
    ravel-lite state backlog list /Users/antony/Development/Ravel-Lite/LLM_STATE/core --category migration
    ```

    If M5 is not done, criterion 5 must be skipped and recorded as "blocked on Ravel-Lite M5" in the sign-off report; the other five criteria can still proceed.

    ### Report

    - `evaluation/results/v1-signoff-<date>.md` contains each criterion, the commands run, the measured values, and pass/fail.
    - On any failure, the criterion lists the specific gap and what next steps would close it.

    ### Follow-up backlog

    - If any criterion fails by a wide margin, open a new backlog task to investigate. Do not silently move on.

    ## Out of scope

    - Everything in §10.2 (deferred).

    ## Exit criteria

    - All six criteria pass or have documented follow-up tasks (criterion 5 may be deferred pending Ravel-Lite M5; criterion 6 may stand at 4/5 PASS pending the L6-hang follow-up bug).
    - Sign-off report committed to the Atlas repo.
    - An announcement-ready short summary written (optional) as `README-v1.md` documenting what Atlas v1 does and does not do.
- id: investigate-and-fix-l6-edges-subprocess-hang-on-large-prompt
  title: Investigate and fix L6 edges subprocess hang on large prompt
  category: eval
  status: not_started
  dependencies: []
  description: |
    **Priority: HIGH.** The L6 Stage 2 `claude -p` subprocess hung at tool 13 with 0.3% CPU for 5+ minutes during the 2026-05-04 dull `--no-overrides` run. The soft-fail `Vec::new()` path let the pipeline continue, but `related-components.yaml` shows `edges: []`. This caused v1 sign-off criterion 6 to pass only 4/5 structural-stability checks (L6 edges check FAIL).

    ## Context

    Run: `atlas index ~/Development/dull/ --output-dir .atlas-no-overrides/ --no-overrides --max-depth 1 --budget 200000`

    Artifacts: `evaluation/results/2026-05-04-dull-no-pins/`

    The subprocess hung at tool 13 — well into the tool-use loop, not at startup. The prompt to L6 at that point contained ~150 inline surface records (all components surfaced during the run). The subprocess was killed after 5+ min; its sibling workers completed normally.

    Possible causes:
    1. **Prompt size:** ~150 surface records may push the L6 prompt past a context threshold or into a slow-to-process region for claude-code.
    2. **claude-code regression:** A hanging tool 13 could indicate a regression in the `claude -p` subprocess that only manifests under large prompts.

    ## Scope

    ### Stage 1 — Reproduce with warmed cache

    1. Ensure `evaluation/results/2026-05-04-dull-no-pins/llm-cache.json` is present (cache is already warmed from the prior run).
    2. Re-run: `atlas index ~/Development/dull/ --output-dir .atlas-repro/ --no-overrides --max-depth 1 --budget 200000` from `~/Development/dull/`.
    3. Observe: does L6 hang again? Record tool count and wall time.

    If the hang does NOT reproduce: the prior hang may have been a transient subprocess anomaly. Mark as resolved; update v1 criterion 6 to 5/5.

    If the hang DOES reproduce: proceed to Stage 2.

    ### Stage 2 — Isolate the cause

    - Count surface records in the L6 prompt: how many components have non-empty `SurfaceRecord` entries? (Check `llm-cache.json` entries with `prompt: stage1-surface`.)
    - Estimate the L6 prompt token count by passing the rendered prompt to a tokeniser or checking the `total_cost_usd` line of the preceding `atlas index` run.
    - Try reducing the prompt: run with `--max-depth 0` (fewer components → fewer surface records → smaller L6 input) and check if L6 completes.
    - Check if the latest `claude` CLI version has changed: `claude --version`.

    ### Stage 3 — Fix or mitigate

    Depending on findings:
    - If **prompt size** is the cause: add a component-count cap or batch L6 into smaller slices. Design a batched L6 loop similar to the tool-use loop in `filesystem-tool-use-loop-for-http-llm-backends-provider-agnostic`.
    - If **claude-code regression** is the cause: file a bug with Anthropic; add a timeout to the L6 subprocess spawn (mirror the `connect_timeout` + `timeout` fix applied to HTTP backends in the prior cycle).
    - If **transient**: document as transient; no code change required.

    ## Exit criteria

    - Hang is either reproducible or confirmed transient.
    - If reproducible: root cause identified and either fixed or a follow-up task is filed with the specific fix scope.
    - v1 sign-off criterion 6 updated to reflect the current status (5/5 if fixed, 4/5 with documented follow-up if not).

    ## References

    - Memory: `l6-claude-p-hangs-with-large-prompt-under-no-overrides`
    - Artifacts: `evaluation/results/2026-05-04-dull-no-pins/notes.md`
    - v1 sign-off: `verify-atlas-v1-success-criteria-end-to-end` criterion 6
- id: filesystem-tool-use-loop-for-http-llm-backends-provider-agnostic
  title: Filesystem tool-use loop for HTTP LLM backends (provider-agnostic)
  category: feature
  status: blocked
  blocked_reason: 'Phase 1 of 4 complete (sandboxed FS tool surface + LlmBackend::supports_filesystem_tools capability method, all 161 atlas-llm tests green, full workspace clean). Phases 2-4 remain: Anthropic tool-use loop, OpenAI tool-use loop, router relaxation + config + fingerprint + live e2e on dull (Phase 4''s live verification needs ~- LLM spend authorization). Continuation guide for each phase is in this task''s Results block. Unblock: schedule a fresh work phase to pick up Phase 2.'
  dependencies: []
  description: |
    **Priority: MEDIUM.** Add a generic filesystem-tool-use loop to `AnthropicHttpBackend` and `OpenAiHttpBackend` so HTTP providers can service `Stage1Surface` and `Stage2Edges`. Once landed, the routing rejection in `BackendRouter` (added in `reject-http-providers-for-stage1surface-and-stage2edges-in-backendrouter`) loosens to a per-backend capability check rather than an unconditional ban on `provider in {anthropic, openai}`.

    ## Context

    Today, `Stage1Surface` and `Stage2Edges` only run on subprocess backends (`claude-code`, `codex`) because their rendered prompts ship no file content — surface and edge extraction need to read source. Subprocess backends provide that filesystem access via the upstream agent's built-in tools (Read, Grep, Glob, Bash). HTTP backends carry only the rendered prompt text, so they cannot read files and must currently be rejected for these prompt ids.

    Both Anthropic Messages API and OpenAI Chat Completions support **tool use / function calling** as a first-class part of the wire protocol. With a tool-use loop driven by Atlas, an HTTP backend can delegate filesystem reads back to the host process and produce surfaces/edges with the same fidelity as a subprocess backend — at lower cost (HTTP is cheaper per call than full agent sessions), with prompt caching benefits, and against any provider that speaks the protocol (Anthropic, OpenAI, OpenRouter, Vertex, Bedrock, etc.).

    User-stated motivation: "We could use the http backends if we provided the tools. I think it could be generally useful, not only here but for other projects as well." Design with reusability in mind — the tool-use loop should be liftable to a separate crate (e.g. `linkuistics/llm-tools` or `atlas-llm-tools`) once it has two consumers.

    ## Scope

    ### Tool set (initial)

    Minimum viable filesystem tool surface, mirroring what the agentic backends use:

    - `read_file(path: str, max_bytes: int = 64KiB) -> { content: str, truncated: bool }`
    - `glob(pattern: str, root: str = "<workspace>") -> { paths: [str] }`
    - `grep(pattern: str, paths: [str] | str, max_matches: int = 100) -> { matches: [{path, line, text}] }`
    - `list_dir(path: str) -> { entries: [{name, kind: "file" | "dir"}] }`

    Each tool's input/output JSON schemas live in one place and are exposed in both Anthropic and OpenAI tool-definition shapes via small adapter functions.

    ### Loop semantics

    1. Initial request: prompt + `tools: [...]` definitions.
    2. Receive response. If `stop_reason: "tool_use"` (Anthropic) or `finish_reason: "tool_calls"` (OpenAI), execute each tool call against the host filesystem, append `tool_result` / `tool` messages, send next turn.
    3. Repeat until `stop_reason: "end_turn"` or `finish_reason: "stop"`, or until a hard turn cap (e.g. 25) trips an `LlmError::Invocation`.
    4. Final assistant text is the structured-JSON response — same validation path as today via existing `validate_response`.

    ### Sandboxing

    Tool implementations must restrict filesystem access to a configured root (the Atlas workspace path). Path normalisation rejects `..` escapes and absolute paths outside the root. No write tools — read-only. `grep` and `glob` re-use Atlas's existing `ignore`-crate-aware traversal so `.gitignore` filtering applies (subprocess backends already inherit this from the agent host's defaults).

    ### Configurable budget

    - `max_turns` (default 25): maximum back-and-forth iterations per call.
    - `max_tool_calls_per_turn` (default 10): caps fan-out within one turn.
    - `max_total_bytes_read` (default 1 MiB per call): caps cumulative bytes returned via `read_file` across the whole loop.

    Exhausting any cap returns `LlmError::Invocation` with a clear message; the call is recorded as an error in the existing budget/sentinel stack.

    ### Provider adapters

    - **AnthropicHttpBackend.** Tools are sent under `tools: [{name, description, input_schema}, ...]`; tool results returned as `content: [{type: "tool_result", tool_use_id, content: <json>}]` blocks in the next user message.
    - **OpenAiHttpBackend.** Tools sent under `tools: [{type: "function", function: {name, description, parameters}}, ...]`; tool results returned as `{role: "tool", tool_call_id, content: <json-string>}` messages.
    - Wire-format differences absorbed by per-provider adapters; the engine-facing surface (the `LlmBackend::call` impl) is unchanged.

    ### Reusability shape

    Aim for a clean internal split so the tool-use loop and the tool implementations can be lifted to a sibling crate later:

    - `tool_use::loop::run<Provider, Tools>(provider: &Provider, tools: &Tools, messages, budget) -> Result<String>` — generic over provider adapter and tool implementer traits.
    - `tool_use::filesystem::FilesystemTools` — the concrete read-only filesystem tool set.
    - Atlas's HTTP backends become thin wrappers: parse Atlas's `LlmRequest`, build messages, call `tool_use::loop::run`, validate the final JSON response.

    Don't over-engineer — keep it inline in `atlas-llm` until a second consumer materialises, but design the module boundary so extraction is mechanical.

    ### Cache fingerprint

    `LlmFingerprint::backend_version` must encode "tool-use enabled" + tool-set version (a SHA over the tool definitions). Two runs with different tool sets are not interchangeable; the response cache must invalidate.

    ### Routing relaxation

    Once landed, `reject_http_for_filesystem_required_prompt` in `crates/atlas-llm/src/router.rs` becomes a per-backend capability check. Each backend declares whether it supplies filesystem tools (`fn supports_filesystem_tools(&self) -> bool`); the router asks the resolved backend instead of hard-coding HTTP-provider names.

    ## Cross-references

    - `enable-anthropic-prompt-caching-in-anthropichttpbackend` — caching applies to the static prefix (system + tool definitions); compose the two features so cached prefix benefits stack across tool-use turns.
    - `add-openrouter-as-an-llm-provider` — OpenRouter speaks OpenAI tool-call format verbatim; the OpenAI adapter covers OpenRouter for free.
    - `map-reduce-llm-architecture-with-backend-routing-for-context-light-analysis` — Stage1Surface stays "needs filesystem access" in that design; tool-use HTTP backends become a third option alongside `claude-code` and `codex`.
    - Memory: `backendrouter-rejects-http-providers-for-stage1surface-and-stage2edges` — the rejection's "future relaxation" path points at this task.

    ## Risks

    - **Determinism.** Tool-use loops can take different code paths across runs (the model may pick different files). Cache key remains canonical-input-based; cached-response soundness depends on the fingerprint encoding "tools enabled". Document this; consider a stricter fingerprint that includes tool-set hash.
    - **Cost.** Each round-trip adds prompt + response tokens. A surface extraction that took one agent call may take 5–10 HTTP turns. Budget caps are essential; profile against the dev-workspace before promoting from experimental.
    - **Sandboxing soundness.** Path-traversal escapes via symlinks, `..`, Unicode normalisation, etc. Use `Path::canonicalize` against the workspace root; reject anything outside.
    - **Streaming.** v1 implementation can be non-streaming (`reqwest::blocking`) like the current HTTP backends. Streaming tool-use is a follow-up.

    ## Out of scope

    - Write tools (Edit, Write, Bash). Atlas is read-only against the target codebase by design.
    - Streaming. Block-mode parity with current HTTP backends.
    - Lifting to a separate crate. Design for it; defer until two consumers.

    ## Exit criteria

    - `AnthropicHttpBackend::call` and `OpenAiHttpBackend::call` execute tool-use loops when configured for `Stage1Surface` or `Stage2Edges`.
    - Read-only filesystem tools available: `read_file`, `glob`, `grep`, `list_dir`. Sandboxed to a configured root.
    - `LlmBackend::supports_filesystem_tools(&self) -> bool` declared; default `false` for current backends, `true` for the new tool-using HTTP path; routing layer asks the trait method instead of hard-coding providers.
    - Configuration: `.atlas/config.yaml` `params.tools.enabled: true` (or similar) opts a per-operation HTTP backend into tool-use mode. Default off so existing configs are unchanged.
    - Cache fingerprint encodes "tools enabled" + tool-set hash; existing zero-LLM-call no-op re-runs remain byte-identical.
    - Live end-to-end: `atlas index ~/Development/dull/` with `surface` routed to `anthropic/...` (tools enabled) produces non-empty surfaces and edge proposals; metrics within 5pp of the same run on `claude-code/...`.
    - Memory note added documenting the design and the routing-relaxation that follows.
  results: |
    **2026-05-04 work phase: Phase 1 of 4 complete — sandboxed filesystem tool surface + `LlmBackend::supports_filesystem_tools` capability method. Phases 2–4 (provider tool-use loops, router relaxation, live verification) remain.**

    ## What was done

    ### `crates/atlas-llm/src/tool_use.rs` (new, ~520 lines)

    Pure tool-surface module, decoupled from any provider wire format. Public API:

    - `FilesystemTools` trait — four read-only methods: `read_file`, `glob`, `grep`, `list_dir`.
    - `SandboxedFilesystem` — concrete impl rooted at one workspace dir, with cumulative byte-budget tracking shared across calls (atomic `bytes_read` counter).
    - `ToolBudget` config struct: `max_total_bytes_read` (default 1 MiB), `max_glob_results` (1000), `max_grep_matches` (100), `default_read_max_bytes` (64 KiB).
    - Output types: `ReadFileOutput`, `GlobOutput`, `GrepOutput`/`GrepMatch`, `ListDirOutput`/`DirEntryInfo`/`DirEntryKind` — all `serde::Serialize/Deserialize` for easy JSON wire-format adapters in Phase 2/3.
    - `ToolError` enum (thiserror): `SandboxEscape`, `BudgetExceeded`, `InvalidArgument`, `Io`, `NotFound`.

    ### Sandboxing

    Three-layer defense against escape:

    1. **Lexical rejection** — `is_absolute()` paths and any `Component::ParentDir`/`Component::RootDir`/`Component::Prefix` segment fail with `SandboxEscape` before any FS call.
    2. **Symlink defense** — when the resolved path exists, we `canonicalize()` and check `starts_with(self.root)`; the root itself is canonicalised at construction so the comparison is apples-to-apples.
    3. **Pattern-level rejection** — `glob` rejects absolute patterns and `..` segments in the pattern itself.

    ### Budget semantics

    `read_file` enforces cumulative bytes by *truncating to `min(user_cap, remaining_budget)`* and returning `BudgetExceeded` only when remaining=0. This means:

    - The user's `truncated: bool` signal covers both "file > requested cap" and "file > remaining budget" — one consumer-facing signal regardless of which cap kicked in.
    - A pathological tool-use loop cannot exceed the budget by even a single byte.
    - `bytes_read()` getter exposes the running counter for observation.

    ### `glob` and `grep`

    - `glob` uses `globset::Glob` with `literal_separator(true)` (so `*` does not cross `/`), walks via `ignore::WalkBuilder` so `.gitignore` is honoured when the workspace is git-rooted (per memory `ignore-crate-requires-git-root-for-gitignore-filtering`, the walker still works fine outside `.git` — just doesn't filter).
    - `grep` uses `regex::RegexBuilder` with `size_limit(1024 * 1024)` to bound regex compilation. Each path is sandbox-checked before reading. Result count caps at `max_matches`.

    ### `LlmBackend` trait extension

    Added `fn supports_filesystem_tools(&self) -> bool { false }` with rustdoc explaining the contract. Default `false` keeps every existing impl compiling; subprocess backends override:

    | Backend | `supports_filesystem_tools` |
    |---|---|
    | `ClaudeCodeBackend` | `true` (overrides) |
    | `CodexBackend` | `true` (overrides) |
    | `AnthropicHttpBackend` | `false` (default — flips to `true` in Phase 2) |
    | `OpenAiHttpBackend` | `false` (default — flips to `true` in Phase 3) |
    | `TestBackend` | `false` (default) |
    | `BudgetedBackend` | delegates to inner |
    | `BudgetSentinel` (atlas-cli) | delegates to inner |
    | `ProgressBackend` (atlas-cli) | delegates to inner |
    | `BackendRouter` | `true` iff *any* registered backend supports it |

    ### `BackendRouter::backend_for(prompt_id)` accessor (new)

    Public method returning `Option<&Arc<dyn LlmBackend>>` for a given prompt id. Lets the eventual routing relaxation ask the per-prompt backend its capability rather than relying on the composite router's "any-of" answer. Cleaner than exposing the internal `HashMap`.

    ### Cargo.toml

    Added `globset`, `ignore`, `regex` to atlas-llm's regular `[dependencies]` (all already on workspace; `regex` was previously declared as a test-only workspace dep but the comment was a soft convention, and grep is a real production tool). No new transitive crates pulled in beyond what was already on the build graph.

    ## Tests added

    **~24 new unit tests** (atlas-llm test count: 132 → 161, all green):

    - `tool_use::tests` (22 tests) covering sandboxing, read_file, list_dir, glob, grep paths.
    - Trait/wrapper coverage: `test_backend_does_not_support_filesystem_tools_by_default`, `budgeted_backend_delegates_supports_filesystem_tools`, `supports_filesystem_tools_is_true_when_any_backend_does` (router any-semantic), `supports_filesystem_tools_is_false_when_no_backend_does`, `backend_for_returns_per_prompt_capability`.

    ## Verification

    - `cargo build -p atlas-llm` — clean.
    - `cargo build --workspace` — clean across `atlas-llm`, `atlas-engine`, `atlas-cli`, `atlas-eval`.
    - `cargo clippy --workspace --all-targets` — clean, no warnings (workspace lint level: `warnings = "deny"`).
    - `cargo test --workspace` — every crate's test result line reads `0 failed`. atlas-llm: 161 passed, 0 failed, 4 ignored.
    - No live LLM spend; every test is hermetic on tempdirs.

    ## Why blocked, not done

    Of the eight exit criteria in the task description, this work satisfies the foundational subset:

    | Exit criterion | Status |
    |---|---|
    | `LlmBackend::supports_filesystem_tools(&self) -> bool` declared with default false | done |
    | Subprocess backends override to true; HTTP backends default false | done |
    | Read-only filesystem tools available, sandboxed to a configured root | done |
    | `AnthropicHttpBackend::call` executes tool-use loop when configured | Phase 2 |
    | `OpenAiHttpBackend::call` executes tool-use loop when configured | Phase 3 |
    | Routing layer asks the trait method instead of hard-coding providers | Phase 4 |
    | `.atlas/config.yaml` `params.tools.enabled: true` opts in per-operation | Phase 4 |
    | Cache fingerprint encodes "tools enabled" + tool-set hash | Phase 4 |
    | Live e2e: `atlas index ~/Development/dull/` with surface routed to anthropic | Phase 4 (LLM spend gate) |

    ## Phases 2–4 continuation guide

    ### Phase 2 — Anthropic tool-use loop (~150–250 lines + tests)

    In `crates/atlas-llm/src/http_anthropic.rs` (or new `tool_use_anthropic.rs` if it grows), gated behind a constructor flag (e.g. `with_filesystem_tools(SandboxedFilesystem)`):

    1. When tools are enabled, send `tools: [{name, description, input_schema}, ...]` in the request body. Tool definitions: small static catalog mapping the four `FilesystemTools` methods to JSON Schema input shapes.
    2. Loop: receive response → if `stop_reason: "tool_use"`, extract `tool_use` blocks, dispatch each via `FilesystemTools` impl, append a user message with `content: [{type: "tool_result", tool_use_id, content: <json>}]`, send next turn. Continue until `stop_reason: "end_turn"` or the `max_turns` cap (default 25) trips an `LlmError::Invocation`.
    3. Final assistant text goes through existing `parse_anthropic_response` then `validate_response` path.
    4. Cache boundary lives **above** the tools (tools are static across the run); ephemeral caching on the system+tools prefix already composes per-existing `build_user_content` adapter.
    5. Override `supports_filesystem_tools` to `true` on the new code path.

    ### Phase 3 — OpenAI tool-use loop (~150–250 lines + tests)

    Mirror Phase 2 in `crates/atlas-llm/src/http_openai.rs`. Wire format differences:

    - Tools sent under `tools: [{type: "function", function: {name, description, parameters}}, ...]`.
    - Tool results returned as `{role: "tool", tool_call_id, content: <json-string>}` messages.
    - `finish_reason: "tool_calls"` triggers iteration; `finish_reason: "stop"` ends.
    - OpenRouter rides this path verbatim (existing `with_base_url` adapter pattern).

    The two adapters share enough shape that — once both work — the loop body could be lifted into a generic `tool_use::loop::run<Provider>(...)` (per the task's "design for liftability" guidance). Defer that refactor until both are landed and stable.

    ### Phase 4 — Router relaxation, config plumbing, fingerprint, live run

    1. **Router relaxation** — `crates/atlas-llm/src/router.rs::reject_http_for_filesystem_required_prompt` becomes a check that asks the resolved backend `.supports_filesystem_tools()` rather than hard-coding HTTP-provider names. Existing tests need updating; `BackendRouter::backend_for` already lets the router check per-prompt capability.
    2. **Config plumbing** — add `params.tools.enabled: bool` (default false) reading; thread through `BackendRouter::new` to construct HTTP backends with the FS tool seed when enabled. The `params.tools.budget.*` knobs map to `ToolBudget` fields.
    3. **Fingerprint** — append `+tools=enabled+sha=<sha8>` to `backend_version` when tools are on, where `<sha8>` is the first 8 hex chars of SHA-256 over the JSON-serialised tool definitions list. Two runs with different tool sets are not interchangeable; existing zero-LLM-call no-op re-runs stay byte-identical.
    4. **Live e2e** — gated on user spend authorization. Suggested run:
       ```
       # Edit ~/Development/dull/.atlas/config.yaml:
       #   operations.surface.model: anthropic/claude-sonnet-4-6
       #   operations.surface.params.tools.enabled: true
       atlas index ~/Development/dull/ --no-overrides --max-depth 1 --budget 50000
       ```
       Capture `evaluation/results/<date>-tool-use-anthropic-surface/` with notes on metric parity vs. claude-code/sonnet baseline.

    ## Source-file changes left for analyse-work to commit

    - `crates/atlas-llm/Cargo.toml` — added globset/ignore/regex deps.
    - `crates/atlas-llm/src/lib.rs` — `tool_use` module decl; `LlmBackend::supports_filesystem_tools` default-method addition.
    - `crates/atlas-llm/src/tool_use.rs` — new module.
    - `crates/atlas-llm/src/claude_code.rs` — `supports_filesystem_tools = true` override.
    - `crates/atlas-llm/src/codex.rs` — `supports_filesystem_tools = true` override.
    - `crates/atlas-llm/src/budget.rs` — `BudgetedBackend` delegation + delegation test.
    - `crates/atlas-llm/src/router.rs` — `BackendRouter` "any-of" delegation, `backend_for` accessor, three new tests.
    - `crates/atlas-llm/src/test_backend.rs` — default-false coverage test.
    - `crates/atlas-cli/src/backend.rs` — `BudgetSentinel` delegation.
    - `crates/atlas-cli/src/progress.rs` — `ProgressBackend` delegation.
    - `Cargo.lock` — re-resolved lockfile.

    ## Cross-references

    - Memory: `backendrouter-rejects-http-providers-for-stage1surface-and-stage2edges` — the rejection that Phase 4's router relaxation will rewrite.
