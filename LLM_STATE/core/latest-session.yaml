body: |
  ### Session 5 (2026-04-24T07:53:46Z) тАФ Implement atlas-engine L2 and L3: candidate generation and classification

  - What was attempted: Full implementation of task `implement-atlas-engine-l2-and-l3-candidate-generation-and-classification` тАФ L2 candidate generation, L3 classification, deterministic heuristics table, manifest parsing, shared types, component-kinds YAML vocabulary, classification prompt, and integration tests.
  - What worked: All scope landed. `cargo test -p atlas-engine` passes with 60 tests (30 unit + 14 L0/L1 + 16 L2/L3), exceeding the тЙе15 new-test exit criterion. `defaults/prompts/classify.md` is 403 words (limit 600), references both `{{COMPONENT_KINDS}}` and `{{LIFECYCLE_SCOPES}}`. `defaults/component-kinds.yaml` enumerates all 13 `ComponentKind` variants. The `l3_deterministic_fixtures_never_dispatch_to_llm` test uses a panic-on-call `TestBackend` and passes тАФ confirming deterministic rules never invoke the LLM. `cargo clippy --workspace --all-targets` is clean.
  - What didn't work / design constraints: `is_component` is not yet `#[salsa::tracked]` because the LLM backend lives on `AtlasDatabase` outside Salsa storage; accessing it from inside a tracked function taking `&dyn salsa::Database` would require a downcast that Salsa 0.26 does not expose. Deterministic and pin paths have no memoisation need; L1 caching covers signal reads. LLM-call memoisation is deferred to task 9.
  - What this suggests trying next: Task L4 (tree assembly and rename-match integration) is now unblocked; it walks `candidate_components_at(root)`, filters by `is_component(...).is_boundary`, allocates ids, and wires rename-match. When calling `is_component` from inside a tracked `all_components` query, the cleanest option is to restructure so the LLM call itself is a tracked function keyed by canonicalised `LlmRequest` тАФ see design note in task results.
  - Key learnings:
    - L3 keys by `(workspace, dir)` primitives rather than `Candidate` тАФ avoids forcing `salsa::Update` onto `RationaleBundle` fields; rebuilding the rationale bundle inside L3 is free because L1 queries are memoised.
    - Line-scanning `Cargo.toml` for section headers (`[lib]`, `[[bin]]`, `[workspace]`) avoids pulling in the `toml` crate and is robust to Cargo's section rules; the manifest_parse module uses serde-json for `package.json` only.
    - Pin lookup accepts three key forms (relative path, basename, additions entry id) because L4 has not yet allocated final ids; permissive matching lets test authors and users write pins naturally without knowing the eventual canonical id.
    - `lifecycle_roles` reuses `Vec<LifecycleScope>` from `component-ontology` rather than inventing a parallel `LifecycleRole` type тАФ keeps the vocabulary single-sourced across atlas-index and atlas-engine.
