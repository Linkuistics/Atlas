  ### Session 61 (2026-05-04T12:44:47Z) — Fix ClaudeCodeBackend subprocess cwd

  - **Attempted:** Thread `workspace_path` through `ClaudeCodeBackend`, `BackendRouter`, and `build_production_backend_with_counter` so every spawned `claude -p` subprocess runs with `.current_dir` set to the indexed workspace root.
  - **What worked:** All five files modified cleanly: `claude_code.rs` gained the `workspace_path: PathBuf` field and `Command::current_dir` call; `router.rs` gained the `workspace_path: &Path` parameter and forwards it to `ClaudeCodeBackend::new`; `backend.rs` gained the `workspace_path: &Path` parameter and passes it to `BackendRouter::new`; `main.rs` passes `&index_config.root`; `evaluation/results/2026-05-04-dull-no-pins/notes.md` updated the deviation #2 entry from "worked around" to "*fixed*". Build, tests (0 failures across workspace), and clippy all passed.
  - **What didn't work / deferred:** The `.current_dir` call cannot be unit-tested without spawning the real binary — no `Command` mock layer exists. An integration test assertion (`assert_eq!(backend.workspace_path(), workspace.path())`) was added as a coverage point. Full manual end-to-end verification (running `atlas index ~/Development/dull/` from a non-workspace cwd) is deferred to the next `verify-atlas-v1-success-criteria-end-to-end` run. `CodexBackend` has the same cwd bug but was out of scope.
  - **What this suggests next:** Apply the identical one-line fix to `CodexBackend` — `workspace_path` is already plumbed into `BackendRouter::new`. Then re-run `verify-atlas-v1-success-criteria-end-to-end` from `~/Development/Atlas/` to confirm correct surface resolution without the cwd workaround.
  - **Key learnings:** The multi-arg constructor pattern (`ClaudeCodeBackend::new(model, prompts, workspace)`) established here is now the load-bearing convention for all subprocess backends; every future subprocess backend that exposes filesystem tools must receive an explicit workspace path.
