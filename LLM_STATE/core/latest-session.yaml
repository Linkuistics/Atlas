  ### Session 16 (2026-04-30T00:56:59Z) — Add Homebrew release pipeline for atlas binary

  - Attempted: Mirror Ravel-Lite's Homebrew release pipeline into Atlas (release.toml + three shell scripts + formula template), adapting all name tokens from `ravel-lite` to `atlas`.
  - What worked: All five pipeline artefacts landed — `release.toml` (cargo-release config), `scripts/release-doctor.sh` (preflight checker), `scripts/release-build.sh` (four-target build + dist packaging), `scripts/release-publish.sh` (GitHub Release + tap push), `scripts/templates/atlas.rb.tmpl` (Homebrew formula template with on_macos/on_linux × on_arm/on_intel branches). All three shell scripts passed `bash -n` syntax check. `release-doctor.sh` ran successfully and reported all prerequisites met (zig 0.16.0, cargo-zigbuild, four rustup targets, gh auth). Template substitution tokens match `sed` substitutions in `release-build.sh` exactly — no orphaned `@TOKEN@` lines.
  - What didn't: No actual release was cut; `crates/atlas-cli/Cargo.toml` is at version `0.1.0` with no `v0.1.0` tag, so `release-build.sh` would fail its `require_clean_tagged_tree` guard (expected behaviour — the operator's call).
  - What this suggests trying next: Backlog is now focused on the two remaining eval tasks (`hand-author-second-golden-for-merged-monorepo` → `verify-atlas-v1-success-criteria-end-to-end`). The release pipeline is ready to use once a tag exists.
  - Key learnings: `target/` already covers `target/dist/` in `.gitignore` — no extra ignore rule needed. First publication requires a tap repo (`linkuistics/homebrew-taps`) with at least an empty `Formula/` directory; `release-publish.sh` defaults `$ATLAS_TAP_DIR` to `~/Development/homebrew-taps`.
