body: |
  ### Session 51 (2026-05-03T14:25:15Z) — L8 map/reduce subcarve redesign

  - **Attempted and completed**: replaced the single large `Subcarve` LLM prompt with a map/reduce architecture in `l8_recurse.rs`. Instead of asking the LLM to propose sub-dirs, the engine now enumerates each component's immediate sub-dirs (`enumerate_immediate_subdirs`), calls `l3_classify::is_component` on each via the `Classify` prompt (the "map" step), and reduces the verdicts into a `SubcarveDecision`.
  - **L3 caching wired in**: `classify_via_llm` in `l3_classify.rs` now routes through `db.call_llm_cached()` rather than calling `backend.call()` directly. This means the L8 map step benefits from cache reuse — two components with byte-equal immediate sub-dir layouts share one cache entry.
  - **`EMBEDDED_SUBCARVE_PROMPT` removed** from `l8_recurse.rs` and its re-export in `lib.rs` dropped. The `subcarve.md` template remains in `EMBEDDED_PROMPTS` (contributing its sha to the run-wide fingerprint) but is no longer rendered, and its token-coverage case was removed from `prompt_token_coverage.rs`.
  - **Test suite updated** to the new prompt shape: `fixedpoint.rs` now uses `AlwaysBoundaryBackend` (answers `Classify` with `is_boundary: true`) and the `PathologicalBackend`/`pathological_backend_panics_at_hard_cap` test was removed (the engine no longer generates novel sub-dirs via the LLM). `tests/l7_l8_fixedpoint.rs` back-edge, convergence, and depth-cap tests all updated to `PromptId::Classify` responses.
  - **Design spec written**: `docs/superpowers/specs/2026-05-04-l8-map-reduce-design.md` captures the settled architecture.
  - **Two follow-on tasks added** to the backlog: bounded concurrency for the L8 map step (rayon or Tokio semaphore), and skipping L7 structural-signal computation when policy will Stop.
  - **What's next**: the `bounded-concurrency-for-l8-map-step-rayon-or-tokio-semaphore` task unlocks wall-time improvement on large targets like dull; once that lands, the `hand-author-second-golden-for-merged-monorepo` block condition (`0 LLM calls via pin short-circuit`) can be re-tested with HTTP-routed classify at depth 1.
