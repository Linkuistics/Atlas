body: |
  ### Session 23 (2026-05-01T00:34:57Z) — Wire Reporter through pipeline, decompose L5 demand, add byte-identity regression

  - Implemented Tasks 16–19 of `docs/superpowers/plans/2026-05-01-engine-progress-events.md` in six commits on `main`.
  - `run_index` in `crates/atlas-cli/src/pipeline.rs` gained a fourth `reporter: Arc<Reporter>` parameter; fires `Started`/`Phase(Seed/Fixedpoint/Project/Edges)`/`Finished` at pipeline boundaries and passes `Some(reporter.clone())` as `FixedpointConfig::progress`.
  - The L5 projection block now pre-walks `all_components(&db)` (non-deleted) and emits one `ProgressEvent::Surface { k, n, … }` per component before calling `surface_of` — warming the cache so the terminal `components_yaml_snapshot_with_prompt_shas` hits it.
  - `main.rs` simplified: constructs `Reporter` via `make_stderr_reporter`, passes it through `run_index`, calls `reporter.finish()` after. Removed legacy `announce_start`/`Option<Reporter>` handling left from T7.
  - New `crates/atlas-cli/tests/byte_identity_l5_demand.rs`: runs pipeline twice on a `TestBackend` fixture, asserts byte-equal `components.yaml` across runs AND that the per-component demand loop issued at least one `Stage1Surface` backend call (via a `CountingBackend` wrapper).
  - Two code-quality fixes from dual subagent review: `Finished` emission moved past `save_*_atomic` block (spec §6.2 "done line is final"); test causality strengthened with `PromptId::Stage1Surface` filter to ensure the counter proves the L5 loop fired, not just any backend call.
  - All 329 tests pass; clippy and fmt clean.
  - The progress feature is now end-to-end: engine fires `IterStart`/`Subcarve`/`IterEnd`, CLI fires `Started`/`Phase`/`Surface`/`Finished`, Reporter renders both into a `MultiProgress`.

  What's next: `verify-atlas-v1-success-criteria-end-to-end` is now materially closer (criterion 4 — operator UX during long runs — is addressed). Criterion 5 still blocked on Ravel-Lite M5 migration.
