body: |
  ### Session 11 (2026-04-24T12:53:34Z) — Build evaluation harness and first golden

  - Implemented the `atlas-eval` crate at `evaluation/harness/` with structural invariant checks, metric computation (coverage, spurious rate, kind accuracy, edge precision/recall), differential evaluation, and a small HTML trend reporter.
  - Created `evaluation/invariants/` with standalone Rust integration-test sources for all six invariants: path coverage, manifest coverage, edge participant existence, rename round-trip, and fixedpoint termination.
  - Hand-authored the first golden dataset at `evaluation/goldens/dev-workspace/`: components.golden.yaml, external-components.golden.yaml, related-components.golden.yaml, and notes.md documenting boundary decisions.
  - Added `evaluation/results/.gitkeep` and wired evaluation/harness into the workspace Cargo.toml; registered trend.html in .gitignore.
  - A new backlog task was added to extract component-ontology (and possibly atlas-index) to a public Linkuistics crate, unblocking Ravel-Lite OSS migration tasks.
  - The task was flipped to `done`; no structural invariant test failures were recorded in the results.
  - Next step: run atlas-eval against a live Atlas run on ~/Development/ to validate goldens against real output and measure initial coverage/spurious metrics.
