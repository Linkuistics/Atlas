  ### Session 57 (2026-05-04T02:16:12Z) — Add --no-overrides flag to atlas index CLI

  - Attempted: Stage 1 of cross-target validation — implement `--no-overrides` CLI flag that forces every candidate through the full classification path by bypassing pin loading
  - What worked: Flag implemented end-to-end; `main.rs` wires `--no-overrides` into `IndexConfig.no_overrides`; `pipeline.rs` skips `load_or_default_overrides` and `load_or_default_subsystems_overrides` when the flag is set, logs a one-line stderr warning, and appends `+overrides=disabled` to `fingerprint.backend_version` for cache isolation; two integration tests added covering (a) suppress pins are bypassed so suppressed components reappear, and (b) the overrides file on disk is untouched
  - What didn't: Stages 2–4 of the task (live run on ~/Development/dull/, output capture, criterion-6 update) are blocked — auto-mode safety rails block unattended LLM spend (~$5–$35 estimated) on shared paid systems without explicit user authorization
  - What this suggests trying next: User confirms spend authorization; a fresh work phase runs the two-step calibration + full-depth `atlas index ~/Development/dull/ --no-overrides` sequence, captures outputs under `evaluation/results/<date>-dull-no-pins/`, and softens criterion 6 in `verify-atlas-v1-success-criteria-end-to-end`
  - Key learnings: Cache isolation via fingerprint suffix is the correct pattern here — it piggybacks on the existing `fingerprint_override` mechanism without adding a new cache-key dimension; appending to `backend_version` is sufficient because the fingerprint hash covers all fields
