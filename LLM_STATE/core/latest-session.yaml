  ### Session 40 (2026-05-02T11:55:14Z) — Document subsystem pre-seeding; research Codex CLI backend

  - Attempted: two tasks — (1) write the README section for subsystem pre-seeding, (2) research the Codex CLI interface to settle the CodexBackend implementation approach
  - What worked: both tasks completed. README gained a "Pre-seeding subsystems" section covering the YAML shape, glob-vs-id resolution, collision detection, and `atlas validate-overrides`. Codex research produced a full findings document at `docs/superpowers/specs/2026-05-02-codex-backend-research.md`, covering binary identity (`codex-cli 0.125.0`), `codex exec` flags, auth model, JSONL event schema, the subprocess-vs-HTTP-vs-library trade-off (subprocess chosen), and a complete implementation sketch. The `CodexBackend` stub comment in `codex.rs` was updated to point at the research doc. Two new backlog tasks were added: `implement-codexbackend-subprocess-driver` (with full implementation spec inlined) and `add-openrouter-as-an-llm-provider`.
  - What this suggests trying next: pick up `implement-codexbackend-subprocess-driver` — the research doc settles every flag choice and the JSONL event schema; no re-discovery needed
  - Key learnings: Codex version string has prefix `codex-cli`, not `codex`; the `--output-schema` flag enforces response shape at the Codex layer; `codex login status` is the auth precheck command; subprocess approach confirmed as the right choice (no HTTP server, `codex-core` library not recommended for embedding)
