  ### Session 50 (2026-05-03T13:21:50Z) — Prompt caching for Anthropic HTTP backend and OpenRouter provider

  - **Attempted:** Two feature tasks: (1) enable Anthropic ephemeral prompt caching in `AnthropicHttpBackend`; (2) add OpenRouter as an LLM provider backed by the OpenAI Chat Completions wire format.
  - **What worked:** Both tasks completed cleanly. Anthropic caching is now active for `Classify` and `Subcarve` via a `CACHE_BOUNDARY_MARKER` split in `prompt::render_split`; the two prompt templates were restructured to place stable catalog sections above the marker and per-call inputs below. OpenRouter routes through `OpenAiHttpBackend` with a `with_base_url` override and distinct `provider_label` so the Salsa LLM cache fingerprint distinguishes it from the plain OpenAI provider.
  - **What this suggests next:** The `map-reduce-llm-architecture-with-backend-routing-for-context-light-analysis` task is now the next highest-leverage item — it extends HTTP routing to L5/L6 analysis. The `hand-author-second-golden-for-merged-monorepo` task remains blocked on the three LLM-error-surfacing bugs filed in the previous session.
  - **Key learnings:** `OpenAiHttpBackend::with_base_url` takes a builder-style approach so the default OpenAI path is unchanged; only the `base_url` and `provider_label` fields differ for OpenRouter. The `provider_label` is folded into the `backend_version` fingerprint (`openai-http/<ver>+upstream=openrouter`) to keep Salsa cache entries from colliding across providers sharing the same model id string. The `HTTP_PROVIDERS` constant was promoted from a local `const` to `pub const` in `config.rs` so `router.rs` and `config.rs` share a single source of truth without duplication.
