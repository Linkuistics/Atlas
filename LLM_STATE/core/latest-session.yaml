  ### Session 54 (2026-05-03T23:58:34Z) — Drop vestigial seam_density/cliques_touching from SubcarveSignals

  - Removed `seam_density` (f32) and `cliques_touching` (Vec<Clique>) fields from `SubcarveSignals` in `subcarve_policy.rs` — neither field was read by `subcarve_policy::decide`; only `modularity_hint` feeds into depth-cap logic.
  - Removed their computation from `compute_decision` in `l8_recurse.rs`: dropped `seam_density_value`, the `cliques_touching_id` helper, and the `CLIQUES_TOUCHING_MIN_K` constant.
  - Updated the import in `l8_recurse.rs` from `{cliques, modularity_hint, seam_density, Clique}` to `modularity_hint` only.
  - Updated all affected comments and test doc-strings to remove references to the removed fields (three comment blocks in `l8_recurse.rs`, two in `subcarve_policy.rs`).
  - All tests pass; no behavioural change — the removed fields were computed but never used in any policy branch.

  What worked: the removal was clean and mechanical — no call sites referenced the dropped fields outside of `compute_decision`, so no cascading changes were required beyond the two files.

  What this suggests trying next: the next structural task is to ensure the L8 bidirectional token-coverage test (added in session 53) correctly covers the trimmed `SubcarveSignals`; that test is already in tree and references the struct, so it will catch any future field drift.
