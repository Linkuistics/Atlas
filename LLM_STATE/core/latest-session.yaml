body: |
  ### Session 24 (2026-05-01T01:26:44Z) — Add push-state guard to release scripts and ship v1.1.0

  - **Attempted:** Add `require_pushed_to_origin` guard to `scripts/release-build.sh` and `scripts/release-publish.sh` so that a forgotten `git push --follow-tags` between `cargo release --execute` and the build step is caught early, before the cold zigbuild runs or a GitHub Release is created with an absent commit.
  - **What worked:** Both scripts received the shared-shape helper (duplicated rather than extracted to `scripts/lib/` since a single 10-line helper doesn't justify a new `lib/` layer). The guard calls `git fetch --quiet --tags origin`, then `merge-base --is-ancestor HEAD origin/main`, then `ls-remote --exit-code --tags origin refs/tags/v<version>`. The version was simultaneously bumped to 1.1.0 via `cargo release minor --execute` (Cargo.toml and Cargo.lock updated across four crates: atlas-cli, atlas-engine, atlas-eval, atlas-llm). The v1.1.0 release was successfully cut, published, and verified: four tarballs built, GitHub Release at v1.1.0 created, formula pushed to homebrew-taps, and `brew reinstall` confirmed `atlas 1.1.0` clean.
  - **What didn't work:** Nothing — the fix was straightforward and end-to-end verified on the real release run.
  - **What this suggests trying next:** If the release scripts grow more shared helpers, extract `scripts/lib/release-checks.sh` and source from both. A similar push-state guard could be wired into `cargo release` itself via `pre-release-hook` in `release.toml` to catch the failure earlier (at the release step rather than at build time) — surface in triage if the failure mode recurs.
  - **Key learnings:** Using ancestry (`merge-base --is-ancestor HEAD origin/main`) rather than SHA equality avoids false positives when someone else lands a commit on origin/main between push and build.
