  ### Session 47 (2026-05-03T11:41:50Z) — Fix stale fixture: uppercase keys in L3 LLM fallback test

  - **What was attempted:** Investigate and fix the pre-existing `l3_ambiguous_candidate_calls_llm_fallback` test failure that had been failing since the `build_llm_inputs` key-casing change uppercased the per-call JSON keys.
  - **What worked:** Root cause confirmed as a stale-fixture cache miss. `TestBackend` keys canned responses on byte-identical serialised `LlmRequest`; when production uppercased `dir_relative` → `DIR_RELATIVE`, `rationale_bundle` → `RATIONALE_BUNDLE`, `manifest_contents` → `MANIFEST_CONTENTS`, this test fixture's lowercase keys stopped matching. Updated `crates/atlas-engine/tests/l2_l3_queries.rs::l3_ambiguous_candidate_calls_llm_fallback` input map to use the uppercase shape. Test now passes.
  - **What didn't work:** Nothing; the fix was minimal and surgical (3 key renames in the JSON fixture).
  - **What this suggests trying next:** The L3/L8 test suite is now clean. `verify-atlas-v1-success-criteria-end-to-end` against `dull` is the next natural step.
  - **Key learnings:** The `TestBackend` byte-exact matching requirement means every key rename in `build_llm_inputs` must be mirrored in every test fixture that constructs the matching `LlmRequest`. A helper or macro that assembles the canonical fixture inputs from the same source-of-truth as the production function would prevent this class of drift.
