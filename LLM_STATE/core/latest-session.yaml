  ### Session 60 (2026-05-04T12:16:21Z) — Complete dull no-overrides run; ship HTTP timeouts, cache persist hook, and L5 rayon prewarm

  - Attempted: Stages 2–4 of cross-target validation on dull (`~/Development/dull/`) — live LLM run with `--no-overrides`, capture artifacts, soften v1 criterion 6.
  - What worked: The full run cleared with 7/8 structural-stability checks PASS. 162 components emitted, 99% surface coverage, four output YAMLs schema-validate. Three source fixes were required and shipped during the session: (1) HTTP backends gained `connect_timeout(30s)` + `timeout(60s)` — the original `Client::new()` had no timeout and a TCP stall hung the pipeline indefinitely; (2) `LlmResponseCache::set_persist_hook` was added so the cache is written on every insert rather than only at run end — a previous 4-hour subprocess-only attempt lost all responses when killed; (3) L9 surface pre-warm was parallelised via rayon using `par_iter().for_each_with(db.clone())`, mirroring the L8 map step, reducing serial wall time from 4+ hours to ~40 min. Artifacts captured under `evaluation/results/2026-05-04-dull-no-pins/`. v1 criterion 6 softened from "metrics within 5pp" to a structural-stability bar in `verify-atlas-v1-success-criteria-end-to-end`.
  - What didn't: The L6 edges check (5th structural-stability check) FAILED — the Stage 2 `claude -p` subprocess hung at tool 13 with low CPU for 5+ minutes. Killing that subprocess let the soft-fail `Vec::new()` path proceed, so `related-components.yaml` shows `edges: []`. Whether this is a claude-code regression or atlas's prompt size (~150 inline surface records) is open.
  - What this suggests trying next: (a) L6 hang investigation — run the same command again with warmed cache to see if reproducible; if so, instrument prompt size and narrow on the subprocess side. (b) `ClaudeCodeBackend` cwd inheritance — subprocesses inherit atlas's cwd; the workaround of running atlas from the target workspace is fragile. Needs a subprocess `cwd` field wired from the workspace root. (c) `verify-atlas-v1-success-criteria-end-to-end` can move toward sign-off once L6 hang is resolved.
  - Key learnings: `reqwest::blocking::Client::new()` has no timeout by default — on networks with occasional TCP stalls this causes infinite hangs. Always set both `connect_timeout` and `timeout`. The `set_persist_hook` pattern (register a callback on `LlmResponseCache` that fires on each insert) allows the CLI layer to control persistence strategy without the cache needing to know about file paths. Rayon's `par_iter().for_each_with(seed_value, |handle, item|)` pattern distributes a cloneable resource (here, `AtlasDatabase`) across workers without a shared mutex; each worker gets its own clone of the seed and mutates it locally.
