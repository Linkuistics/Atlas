body: |
  ### Session 31 (2026-05-01T10:58:13Z) — Design subsystem-seeding feature: spec and implementation plan

  - What was attempted: Complete design phase for `first-class-subsystem-seeding-in-overrides-yaml` — produce a full feature spec and a phased implementation plan before writing any code.
  - What worked: Full design produced and locked. Key decisions: separate `subsystems.overrides.yaml` input file (decomplected from `components.overrides.yaml`), separate `subsystems.yaml` output, L9-only placement (pure projection, no influence on L1–L8), membership via globs and ids, shared participant namespace with uniqueness validation, two-stage validation (shape pre-LLM, namespace/resolution post-L4), `atlas validate-overrides` extended rather than new subcommand. A v1.2.1 → v1.3.0 release was also published out-of-band before the design work began (`Cargo.toml` and `Cargo.lock` bump from 1.2.1 to 1.3.0).
  - What didn't: Implementation not started — by design. The feature spans cross-repo schema changes (atlas-contracts) and Atlas engine/CLI/test changes; the design phase deliberately exits before code to keep each work phase reviewable end-to-end.
  - What this suggests next: Phase 1 of the implementation plan — schema additions in `atlas-contracts/crates/atlas-index` (Subsystem, SubsystemMember, SubsystemsInput types) and the `validate_participant_namespace` helper in `component-ontology`. Self-contained: ends with a commit + push to atlas-contracts before Atlas itself is touched.
  - Key learnings: Keeping subsystems as a pure projection at L9 avoids the complexity of lifecycle propagation or kind inheritance that would require changes to L1–L8 classification logic. Two-stage validation (shape vs. namespace) is necessary because early resolution errors (unknown id) should fail fast, while late resolution issues (empty glob match) may legitimately represent forward-looking authorship.
