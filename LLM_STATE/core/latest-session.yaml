  ### Session 59 (2026-05-04T03:33:25Z) — Add sandboxed filesystem tools and `supports_filesystem_tools` trait method

  - Attempted: Phase 1 of the provider-agnostic filesystem tool-use loop — the foundational layer that decouples tool surface from any HTTP provider wire format.
  - What worked: All Phase 1 deliverables landed and verified clean. New `crates/atlas-llm/src/tool_use.rs` (630 lines) implements `SandboxedFilesystem`, `ToolBudget`, and the `FilesystemTools` trait with four read-only operations: `read_file`, `list_dir`, `glob`, `grep`. Sandboxing rejects absolute paths, `..` segments, and symlink escapes; budget caps cumulative bytes on `read_file` and result counts on `glob`/`grep`. The `LlmBackend::supports_filesystem_tools() -> bool` default-false trait method was added to `lib.rs`; subprocess backends (`ClaudeCodeBackend`, `CodexBackend`) override to `true`; all wrapper backends (`BudgetedBackend`, `BudgetSentinel`, `ProgressBackend`) delegate to their inner. `BackendRouter` uses any-of semantics and exposes a new `backend_for(PromptId)` accessor for per-prompt capability checks. Added `globset`, `ignore`, `regex` to atlas-llm `[dependencies]`. ~24 new unit tests; workspace build and test suite green (`cargo test --workspace` 161 passed in atlas-llm, 0 failed).
  - What didn't: The remaining phases (2: Anthropic tool-use loop, 3: OpenAI tool-use loop, 4: router relaxation + config plumbing + live e2e) were not started this session. The task is appropriately `blocked` pending a Phase 2 work session.
  - What this suggests trying next: Phase 2 — add the Anthropic tool-use loop in `crates/atlas-llm/src/http_anthropic.rs` (~150–250 lines + tests). The continuation guide in the task's results block is detailed; no additional design work needed.
  - Key learnings: `SandboxedFilesystem::check_path` double-canonicalises (resolves symlinks after the string-level checks) to catch escapes that pass the `..`-segment filter. `ToolBudget` uses `AtomicU64` so it can be shared across concurrent tool dispatch without a mutex. The `ignore::WalkBuilder` handles `.gitignore` filtering when the workspace has a `.git` root; outside `.git` it walks without filtering, which is the correct fallback.
