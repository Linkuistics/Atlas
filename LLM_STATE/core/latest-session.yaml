body: |
  ### Session 22 (2026-04-30T16:01:12Z) — Implement CLI Reporter and indicatif rendering

  - Implemented plan tasks 7–15 from `docs/superpowers/plans/2026-05-01-engine-progress-events.md`, delivering the full CLI-side `Reporter` and indicatif rendering in `crates/atlas-cli/src/progress.rs`.
  - Replaced the old single-line `ProgressReporter` tally with `Reporter`: owns a `MultiProgress` with two `ProgressBar`s (activity spinner + token gauge), state behind a `Mutex<ReporterState>`.
  - Implements `atlas_engine::ProgressSink::on_event` for all `ProgressEvent` variants: `Started`, `Phase`, `IterStart`, `IterEnd`, `Subcarve`, `Surface`, `Finished`.
  - `on_llm_call` side-channel increments `PromptBreakdown` counters; engine-set k/n from `Subcarve`/`Surface` wins over LLM-tap refreshes (spec §6.3 priority).
  - Token gauge hides itself when budget == 0 (`--no-budget` case).
  - `crates/atlas-cli/src/main.rs` simplified: `make_stderr_reporter` now always returns `Arc<Reporter>` (no longer `Option`), removing the match arms.
  - All 16 regression tests pass (`cargo test -p atlas-cli progress::tests` green); clippy clean; binary still compiles and runs end-to-end.
  - Pipeline wiring (passing the `Reporter` into `FixedpointConfig`) remains as the next backlog item.
