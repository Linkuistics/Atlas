  ### Session 12 (2026-04-24T14:12:28Z) — Extract component-ontology and atlas-index to linkuistics/atlas-contracts

  - Extracted the `component-ontology` and `atlas-index` crates (plus `defaults/ontology.yaml`) from Atlas into a new public GitHub repo `linkuistics/atlas-contracts`, a Cargo workspace mirroring Atlas's workspace style. Bootstrap commit sha: `337c54368eb1393f2c3f8839a5e9042ce72cf964`.
  - Verified the extracted workspace builds and all 80 tests pass in isolation (33 atlas-index unit, 3 atlas-index golden, 44 component-ontology).
  - Wired Atlas up: dropped the two crates from `[workspace.members]`, added git deps pinned by sha in `[workspace.dependencies]`, switched `atlas-cli`, `atlas-engine`, `evaluation/harness` to `workspace = true` deps, deleted local `crates/component-ontology/`, `crates/atlas-index/`, `defaults/ontology.yaml`.
  - Ran full Atlas test suite: 281 passed, 2 ignored (pre-existing opt-in), 0 failed.
  - Rewrote M2, M4, M5 task descriptions to reference the git-dep source rather than path deps or crates.io; unblocked M2.
  - Updated the `cross-crate-include-str-paths-break-crates-io-publication` memory entry to note its structural mootness under the Brew-bottle distribution model.
  - Key decision: skipped `git filter-repo` history transplant per user preference — a clean "Initial extraction" bootstrap commit is cleaner for a public repo; Atlas history is still accessible via the private Atlas log.
  - Key learning: `evaluation/harness/Cargo.toml` still had a direct path dep on `atlas-index` that was missed in the initial sweep; grepping before deletion would have caught it earlier.
